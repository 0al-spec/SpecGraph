repos:
  - repo: local
    hooks:
      - id: spec-yaml-format
        name: spec-yaml-format
        entry: python tools/spec_yaml_format.py
        language: python
        additional_dependencies: [pyyaml>=6]
        files: ^specs/nodes/.*\.ya?ml$
        require_serial: true
      - id: spec-yaml-lint
        name: spec-yaml-lint
        entry: python tools/spec_yaml_lint.py
        language: python
        additional_dependencies: [pyyaml>=6]
        files: ^specs/nodes/.*\.ya?ml$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

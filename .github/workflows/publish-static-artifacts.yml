name: Publish Static Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "landing/**"
      - "ontology/**"
      - "specs/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/publish-static-artifacts.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "landing/**"
      - "ontology/**"
      - "specs/**"
      - "tools/**"
      - "Makefile"
      - ".github/workflows/publish-static-artifacts.yml"

permissions:
  contents: read

concurrency:
  group: specgraph-static-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build static artifact bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout Metrics sibling
        uses: actions/checkout@v6
        with:
          repository: 0al-spec/Metrics
          path: external/Metrics

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install Agent Passport CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_tag="$(
            gh release view \
              --repo 0al-spec/agent-passport \
              --json tagName \
              --jq '.tagName'
          )"
          if [ -z "$release_tag" ]; then
            echo "No Agent Passport release tag found." >&2
            exit 1
          fi
          version="${release_tag#v}"
          host="x86_64-unknown-linux-gnu"
          asset="agent-passport-${version}-${host}"
          artifact_dir="$RUNNER_TEMP/agent-passport-linux-amd64"
          install_dir="$RUNNER_TEMP/agent-passport-bin"
          mkdir -p "$artifact_dir" "$install_dir"

          gh release download "$release_tag" \
            --repo 0al-spec/agent-passport \
            --pattern "${asset}*" \
            --dir "$artifact_dir"

          (
            cd "$artifact_dir"
            sha256sum -c "${asset}.sha256"
          )
          install -m 0755 "$artifact_dir/$asset" "$install_dir/agent-passport"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/agent-passport" --help >/dev/null

      - name: Build bundle
        env:
          SPECGRAPH_EXTERNAL_CHECKOUT_ROOT: ${{ github.workspace }}/external
        run: make publish-bundle PUBLISH_BUNDLE_FLAGS=

      - name: Build Team Decision Log product workspace bundle
        env:
          SPECGRAPH_EXTERNAL_CHECKOUT_ROOT: ${{ github.workspace }}/external
        run: |
          make product-workspace-team-decision-log-happy-path-repair-pack
          python tools/build_static_artifact_bundle.py \
            --output-dir dist/specgraph-public/workspaces/team-decision-log

      - name: Build Hosted Operation Canary product workspace bundle
        run: |
          python tools/build_static_artifact_bundle.py \
            --workspace-bootstrap-run-dir runs/hosted-operation-canary \
            --output-dir dist/specgraph-public/workspaces/hosted-operation-canary

      - name: Upload bundle as GitHub Actions artifact
        uses: actions/upload-artifact@v7
        with:
          name: specgraph-static-artifacts
          path: dist/specgraph-public
          if-no-files-found: error

  deploy:
    name: Deploy bundle to static host
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: FTP
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
      SFTP_REMOTE_ROOT: ${{ secrets.SFTP_REMOTE_ROOT }}
      FTPS_ALLOW_UNVERIFIED_CERT: ${{ secrets.FTPS_ALLOW_UNVERIFIED_CERT }}
      STATIC_ARTIFACT_PUBLIC_BASE_URL: https://specgraph.tech
      INCREMENTAL_STAGE_DIR: ${{ github.workspace }}/.specgraph-incremental-upload

    steps:
      - name: Checkout deploy tooling
        uses: actions/checkout@v6

      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: specgraph-static-artifacts
          path: dist/specgraph-public

      - name: Validate deploy contract
        if: env.SFTP_HOST != ''
        run: python tools/static_artifact_deploy_plan.py --bundle-dir dist/specgraph-public

      - name: Stage changed artifact payloads
        if: env.SFTP_HOST != ''
        run: |
          rm -rf "$INCREMENTAL_STAGE_DIR"
          mkdir -p "$INCREMENTAL_STAGE_DIR" "$RUNNER_TEMP/specgraph-incremental-reports"
          python tools/static_artifact_incremental_stage.py stage \
            --bundle-dir dist/specgraph-public \
            --remote-manifest-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL/artifact_manifest.json" \
            --staging-dir "$INCREMENTAL_STAGE_DIR" \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/root.json"
          python tools/static_artifact_incremental_stage.py stage \
            --bundle-dir dist/specgraph-public/workspaces/team-decision-log \
            --remote-manifest-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL/workspaces/team-decision-log/artifact_manifest.json" \
            --staging-dir "$INCREMENTAL_STAGE_DIR" \
            --staging-prefix workspaces/team-decision-log \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/team-decision-log.json"
          python tools/static_artifact_incremental_stage.py stage \
            --bundle-dir dist/specgraph-public/workspaces/hosted-operation-canary \
            --remote-manifest-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL/workspaces/hosted-operation-canary/artifact_manifest.json" \
            --staging-dir "$INCREMENTAL_STAGE_DIR" \
            --staging-prefix workspaces/hosted-operation-canary \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/hosted-operation-canary.json"

      - name: Install transfer client
        if: env.SFTP_HOST != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Upload changed artifact payloads and metadata
        if: env.SFTP_HOST != ''
        run: |
          test -n "$SFTP_USER"
          test -n "$SFTP_REMOTE_ROOT"
          DEPLOY_PORT="${SFTP_PORT:-22}"
          REMOTE_ROOT="${SFTP_REMOTE_ROOT%/}"

          if [ "$DEPLOY_PORT" = "21" ]; then
            test -n "$SFTP_PASSWORD"
            FTPS_VERIFY_CERT_LINE=""
            if [ "${FTPS_ALLOW_UNVERIFIED_CERT:-}" = "true" ]; then
              FTPS_VERIFY_CERT_LINE="set ssl:verify-certificate false"
            fi
            lftp -u "$SFTP_USER,$SFTP_PASSWORD" "ftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          $FTPS_VERIFY_CERT_LINE
          set net:max-retries 2
          set net:timeout 30
          lcd "$INCREMENTAL_STAGE_DIR"
          mirror -R --parallel=4 --verbose . "$REMOTE_ROOT"
          mkdir -p "$REMOTE_ROOT/workspaces/team-decision-log"
          mkdir -p "$REMOTE_ROOT/workspaces/hosted-operation-canary"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/checksums.sha256" -o "$REMOTE_ROOT/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/checksums.sha256" -o "$REMOTE_ROOT/workspaces/team-decision-log/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/checksums.sha256" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/artifact_manifest.json" -o "$REMOTE_ROOT/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/team-decision-log/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/artifact_manifest.json"
          bye
          EOF
            exit 0
          fi

          DEPLOY_PASSWORD="${SFTP_PASSWORD:-$SFTP_PRIVATE_KEY}"
          test -n "$SFTP_KNOWN_HOSTS"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SFTP_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"

          if printf '%s\n' "$SFTP_PRIVATE_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$SFTP_PRIVATE_KEY" > "$HOME/.ssh/specgraph_publish_key"
            chmod 600 "$HOME/.ssh/specgraph_publish_key"
            lftp -u "$SFTP_USER," "sftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set sftp:connect-program "ssh -a -x -i $HOME/.ssh/specgraph_publish_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          lcd "$INCREMENTAL_STAGE_DIR"
          mirror -R --parallel=4 --verbose . "$REMOTE_ROOT"
          mkdir -p "$REMOTE_ROOT/workspaces/team-decision-log"
          mkdir -p "$REMOTE_ROOT/workspaces/hosted-operation-canary"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/checksums.sha256" -o "$REMOTE_ROOT/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/checksums.sha256" -o "$REMOTE_ROOT/workspaces/team-decision-log/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/checksums.sha256" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/artifact_manifest.json" -o "$REMOTE_ROOT/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/team-decision-log/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/artifact_manifest.json"
          bye
          EOF
          else
            test -n "$DEPLOY_PASSWORD"
            lftp -u "$SFTP_USER,$DEPLOY_PASSWORD" "sftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set sftp:connect-program "ssh -a -x -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          lcd "$INCREMENTAL_STAGE_DIR"
          mirror -R --parallel=4 --verbose . "$REMOTE_ROOT"
          mkdir -p "$REMOTE_ROOT/workspaces/team-decision-log"
          mkdir -p "$REMOTE_ROOT/workspaces/hosted-operation-canary"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/checksums.sha256" -o "$REMOTE_ROOT/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/checksums.sha256" -o "$REMOTE_ROOT/workspaces/team-decision-log/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/checksums.sha256" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/checksums.sha256"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/artifact_manifest.json" -o "$REMOTE_ROOT/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/team-decision-log/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/team-decision-log/artifact_manifest.json"
          put "$GITHUB_WORKSPACE/dist/specgraph-public/workspaces/hosted-operation-canary/artifact_manifest.json" -o "$REMOTE_ROOT/workspaces/hosted-operation-canary/artifact_manifest.json"
          bye
          EOF
          fi

      - name: Verify published artifact digests
        if: env.SFTP_HOST != ''
        run: |
          python tools/static_artifact_incremental_stage.py verify \
            --bundle-dir dist/specgraph-public \
            --remote-base-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL" \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/root-verification.json"
          python tools/static_artifact_incremental_stage.py verify \
            --bundle-dir dist/specgraph-public/workspaces/team-decision-log \
            --remote-base-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL/workspaces/team-decision-log" \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/team-decision-log-verification.json"
          python tools/static_artifact_incremental_stage.py verify \
            --bundle-dir dist/specgraph-public/workspaces/hosted-operation-canary \
            --remote-base-url "$STATIC_ARTIFACT_PUBLIC_BASE_URL/workspaces/hosted-operation-canary" \
            --output "$RUNNER_TEMP/specgraph-incremental-reports/hosted-operation-canary-verification.json"

      - name: Upload incremental deployment reports
        if: always() && env.SFTP_HOST != ''
        uses: actions/upload-artifact@v7
        with:
          name: specgraph-incremental-deployment-reports
          path: ${{ runner.temp }}/specgraph-incremental-reports
          if-no-files-found: warn

      - name: Report skipped SFTP upload
        if: env.SFTP_HOST == ''
        run: |
          echo "SFTP_HOST is not configured; built bundle only."

  deploy_landing:
    name: Deploy landing page to static host
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: FTP
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
      SFTP_REMOTE_ROOT: ${{ secrets.SFTP_REMOTE_ROOT }}
      FTPS_ALLOW_UNVERIFIED_CERT: ${{ secrets.FTPS_ALLOW_UNVERIFIED_CERT }}

    steps:
      - name: Checkout landing page
        uses: actions/checkout@v6

      - name: Validate deploy contract
        if: env.SFTP_HOST != ''
        run: python tools/static_artifact_deploy_plan.py --skip-bundle-check

      - name: Install transfer client
        if: env.SFTP_HOST != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Upload landing page
        if: env.SFTP_HOST != ''
        run: |
          test -n "$SFTP_USER"
          test -n "$SFTP_REMOTE_ROOT"
          test -f landing/index.html
          DEPLOY_PORT="${SFTP_PORT:-22}"

          if [ "$DEPLOY_PORT" = "21" ]; then
            test -n "$SFTP_PASSWORD"
            FTPS_VERIFY_CERT_LINE=""
            if [ "${FTPS_ALLOW_UNVERIFIED_CERT:-}" = "true" ]; then
              FTPS_VERIFY_CERT_LINE="set ssl:verify-certificate false"
            fi
            lftp -u "$SFTP_USER,$SFTP_PASSWORD" "ftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          $FTPS_VERIFY_CERT_LINE
          set net:max-retries 2
          set net:timeout 30
          lcd landing
          mirror -R --verbose --exclude-glob .DS_Store --exclude-glob 'check/**' . "$SFTP_REMOTE_ROOT"
          bye
          EOF
            exit 0
          fi

          DEPLOY_PASSWORD="${SFTP_PASSWORD:-$SFTP_PRIVATE_KEY}"
          test -n "$SFTP_KNOWN_HOSTS"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SFTP_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"

          if printf '%s\n' "$SFTP_PRIVATE_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$SFTP_PRIVATE_KEY" > "$HOME/.ssh/specgraph_publish_key"
            chmod 600 "$HOME/.ssh/specgraph_publish_key"
            lftp -u "$SFTP_USER," "sftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set sftp:connect-program "ssh -a -x -i $HOME/.ssh/specgraph_publish_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          lcd landing
          mirror -R --verbose --exclude-glob .DS_Store --exclude-glob 'check/**' . "$SFTP_REMOTE_ROOT"
          bye
          EOF
          else
            test -n "$DEPLOY_PASSWORD"
            lftp -u "$SFTP_USER,$DEPLOY_PASSWORD" "sftp://$SFTP_HOST:$DEPLOY_PORT" <<EOF
          set sftp:connect-program "ssh -a -x -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          lcd landing
          mirror -R --verbose --exclude-glob .DS_Store --exclude-glob 'check/**' . "$SFTP_REMOTE_ROOT"
          bye
          EOF
          fi

      - name: Report skipped landing upload
        if: env.SFTP_HOST == ''
        run: |
          echo "SFTP_HOST is not configured; landing page upload skipped."

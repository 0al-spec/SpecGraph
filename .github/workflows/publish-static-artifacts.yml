name: Publish Static Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "specs/**"
      - "tools/**"
      - "tests/**"
      - "Makefile"
      - ".github/workflows/publish-static-artifacts.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "specs/**"
      - "tools/**"
      - "Makefile"
      - ".github/workflows/publish-static-artifacts.yml"

permissions:
  contents: read

concurrency:
  group: specgraph-static-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static artifact bundle
    runs-on: ubuntu-latest
    env:
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
      SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
      SFTP_REMOTE_ROOT: ${{ secrets.SFTP_REMOTE_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build bundle
        run: make publish-bundle

      - name: Upload bundle as GitHub Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: specgraph-static-artifacts
          path: dist/specgraph-public
          if-no-files-found: error

      - name: Install SFTP client
        if: github.event_name != 'pull_request' && env.SFTP_HOST != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Upload bundle to SFTP
        if: github.event_name != 'pull_request' && env.SFTP_HOST != ''
        run: |
          test -n "$SFTP_USER"
          test -n "$SFTP_PRIVATE_KEY"
          test -n "$SFTP_KNOWN_HOSTS"
          test -n "$SFTP_REMOTE_ROOT"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SFTP_PRIVATE_KEY" > "$HOME/.ssh/specgraph_publish_key"
          chmod 600 "$HOME/.ssh/specgraph_publish_key"
          printf '%s\n' "$SFTP_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          lftp -u "$SFTP_USER," "sftp://$SFTP_HOST:${SFTP_PORT:-22}" <<EOF
          set sftp:connect-program "ssh -a -x -i $HOME/.ssh/specgraph_publish_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          mirror -R --delete --verbose dist/specgraph-public "$SFTP_REMOTE_ROOT"
          bye
          EOF

      - name: Report skipped SFTP upload
        if: github.event_name != 'pull_request' && env.SFTP_HOST == ''
        run: |
          echo "SFTP_HOST is not configured; built bundle only."

name: Deploy Landing to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "landing/**"
      - ".github/workflows/pages-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify landing source
        run: |
          test -f landing/index.html || {
            echo "landing/index.html is missing. Commit landing/ to the target branch before deploying."
            exit 1
          }

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload landing artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

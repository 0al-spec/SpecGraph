name: Deploy DocC Technical Surface

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Sources/SpecGraph/**"
      - "docs/github-pages-root/**"
      - ".github/workflows/pages-technical-root.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Sources/SpecGraph/**"
      - "docs/github-pages-root/**"
      - ".github/workflows/pages-technical-root.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build DocC technical surface
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify technical root source
        run: |
          test -f docs/github-pages-root/index.html || {
            echo "docs/github-pages-root/index.html is missing."
            exit 1
          }

      - name: Build DocC documentation
        run: |
          swift package --allow-writing-to-directory ./.docc-build \
            generate-documentation \
            --target SpecGraph \
            --output-path ./.docc-build \
            --transform-for-static-hosting \
            --hosting-base-path SpecGraph

      - name: Add technical root
        run: |
          cp docs/github-pages-root/index.html ./.docc-build/index.html

      - name: Verify Pages artifact
        run: |
          test -f ./.docc-build/index.html
          test -f ./.docc-build/documentation/specgraph/index.html

      - name: Archive DocC artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: docc-build-pages
          path: ./.docc-build

  prepare-pages-artifact:
    name: Prepare case-sensitive redirect artifact
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      )
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download DocC artifact
        uses: actions/download-artifact@v8
        with:
          name: docc-build-pages
          path: ./.docc-build

      - name: Add mixed-case DocC compatibility redirect
        run: |
          mkdir -p ./.docc-build/documentation/SpecGraph
          cat > ./.docc-build/documentation/SpecGraph/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=../specgraph/" />
              <link rel="canonical" href="../specgraph/" />
              <title>SpecGraph documentation</title>
            </head>
            <body>
              <p>
                Redirecting to
                <a href="../specgraph/">SpecGraph DocC documentation</a>.
              </p>
            </body>
          </html>
          HTML

      - name: Verify Pages artifact
        run: |
          test -f ./.docc-build/index.html
          test -f ./.docc-build/documentation/specgraph/index.html
          test -f ./.docc-build/documentation/SpecGraph/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./.docc-build

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      )
    needs: prepare-pages-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

acceptance:
- Defines SG-SPEC-0060 as the bounded child under SG-SPEC-0058 for reviewer discrimination checkpoints
  between not_available and unresolved proposal/split readiness verdicts.
- Defines the checkpoint conditions that allow not_available only when a reviewable negative availability
  source is present and keep missing, ambiguous, or leaky evidence unresolved.
- Defines the evidence reviewers must record for each discrimination checkpoint without copying split
  payload schemas, lifecycle fields, queue internals, proposal-lane runtime detail, or graph topology
  narration.
- Defines checkpoint resolution for mixed evidence so unresolved checkpoint signals dominate not_available
  support within the same reviewer pass.
- Keeps SG-SPEC-0058 as the owner of verdict meanings and does not redefine satisfied verdict handling,
  reviewer action dispositions, remediation routing, continuation selection, queue ranking, viewer layout,
  or runtime orchestration.

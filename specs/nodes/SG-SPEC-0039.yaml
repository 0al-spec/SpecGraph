- criterion: Establishes SG-SPEC-0039 as the bounded intermediary while delegating concrete non-retry
    semantics to SG-SPEC-0037, queue-field artifact-shape contracts to SG-SPEC-0038, and first-persistence
    and noncanonical-consumption contracts to SG-SPEC-0040.
  evidence: depends_on records SG-SPEC-0037, SG-SPEC-0038, and SG-SPEC-0040 as immediate delegated children,

prompt: Materialize SG-SPEC-0039 as the bounded intermediate overview for non-retry proposal/refactor
  queue-control contracts. Keep this child implementation-agnostic, define the delegation chain to SG-SPEC-0037,
  SG-SPEC-0038, and SG-SPEC-0040, and preserve SG-SPEC-0034 as the parent-facing queue-contract boundary
  for SG-SPEC-0003.
specification:
  objective: Define the bounded parent-facing non-retry queue-control contract cluster for proposal and
    refactor artifacts, while delegating concrete concern slices to bounded children and preserving noncanonical-first
    persistence behavior. It preserves SG-SPEC-0034 as the parent-facing contract boundary for SG-SPEC-0003
    and defines SG-SPEC-0039 as the intermediary path node.
  scope:
    in:
    - Parent-facing non-retry queue-control cluster for dedupe_key, preempt_direct_update, and proposal_direct_handoff
    - Parent-facing contract boundary such that SG-SPEC-0003 consumes the cluster only through SG-SPEC-0034
    - Delegation boundary and ownership chain from SG-SPEC-0034 to SG-SPEC-0037, SG-SPEC-0038, and SG-SPEC-0040
    - Parent-facing artifact-shape names for proposal_queue and refactor_queue fields
    - Noncanonical first-persistence and consumption boundary delegated to SG-SPEC-0040
    out:
    - Retry-condition semantics and retry-gating behavior
    - Active-item precedence semantics and handoff ordering
    - First-persistence and noncanonical-consumption boundary implementation details (delegated to SG-SPEC-0040)
    - Canonical writeback policies, proposal authority transitions, or proposal-lane apply mechanics
    - Queue scheduler implementation, ranking formulas, or storage design
    - Direct downstream consumption of this cluster from SG-SPEC-0037, SG-SPEC-0038, or SG-SPEC-0040
  delegation_chain:
    parent_boundary_contract: SG-SPEC-0034
    cluster_owner: SG-SPEC-0039
    concrete_non_retry_semantics_contract: SG-SPEC-0037
    field_surface_and_artifact_shape_contract: SG-SPEC-0038
    first_persistence_and_consumption_contract: SG-SPEC-0040
    consumer_path:
    - SG-SPEC-0003 -> SG-SPEC-0034 -> SG-SPEC-0039 -> SG-SPEC-0037
    - SG-SPEC-0003 -> SG-SPEC-0034 -> SG-SPEC-0039 -> SG-SPEC-0038
    - SG-SPEC-0003 -> SG-SPEC-0034 -> SG-SPEC-0039 -> SG-SPEC-0040
  cluster_contract:
    artifact_targets:
    - proposal_queue
    - refactor_queue
    field_set:
    - dedupe_key
    - preempt_direct_update
    - proposal_direct_handoff
    policy_contract: Defines the bounded field set, field name stability expectations, and placement expectations
      for reflective-loop queue-control metadata.
    non_retry_semantics_boundary: SG-SPEC-0039 defines no runtime execution truth tables and does not
      own retry or active-item precedence behavior.
  noncanonical_boundary:
  - SG-SPEC-0039 is the intermediary cluster contract owner; first-persistence and noncanonical consumption
    constraints are delegated to SG-SPEC-0040.
  parent_integration:
  - SG-SPEC-0034 depends on SG-SPEC-0039 for the bounded non-retry queue-control cluster contract.
  - SG-SPEC-0039 depends on SG-SPEC-0037, SG-SPEC-0038, and SG-SPEC-0040 as its concrete semantic, artifact-shape,
    and first-persistence/noncanonical-consumption children.
  - SG-SPEC-0040 owns the first-persistence and noncanonical-consumption boundary for non-retry queue-control
    fields, including the bounded consumption rule carried through SG-SPEC-0039.
  - SG-SPEC-0034 remains the parent-facing non-retry queue boundary; SG-SPEC-0039 owns this intermediary
    cluster.
  gate_reconciliation:
  - The bounded delegation split is satisfied by SG-SPEC-0037 for concrete non-retry semantics, SG-SPEC-0038
    for field surface and artifact shape, and SG-SPEC-0040 for first-persistence and noncanonical-consumption
    boundary rules.
  - Further concrete queue-control refinement belongs to those child contracts rather than another direct
    split of SG-SPEC-0039.
  consumer_rule:
  - SG-SPEC-0003 may consume non-retry queue-control controls only via SG-SPEC-0034, with SG-SPEC-0039
    as the intermediary cluster and SG-SPEC-0040 defining the noncanonical consumption boundary.
  - SG-SPEC-0003 MUST NOT consume those controls directly from SG-SPEC-0037, SG-SPEC-0038, or SG-SPEC-0040.

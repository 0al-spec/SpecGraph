acceptance:
- Defines the non-retry queue-control cluster contract surface under SG-SPEC-0034 for dedupe_key, preempt_direct_update,
  and proposal_direct_handoff in proposal_queue and refactor_queue artifacts.
- Establishes SG-SPEC-0039 as the bounded intermediary while delegating concrete non-retry semantics to
  SG-SPEC-0037, queue-field artifact-shape contracts to SG-SPEC-0038, and first-persistence and noncanonical-consumption
  contracts to SG-SPEC-0040.
- Keeps retry-condition and active-item precedence behavior in SG-SPEC-0035 and SG-SPEC-0036, not in this
  child.
acceptance_evidence:
- criterion: Defines the non-retry queue-control cluster contract surface under SG-SPEC-0034 for dedupe_key,
    preempt_direct_update, and proposal_direct_handoff in proposal_queue and refactor_queue artifacts.
  evidence: specification.scope.in includes those fields and positions the boundary at SG-SPEC-0039 as

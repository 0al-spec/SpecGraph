acceptance:
- Defines the boundary between canonical SpecGraph governance, supervisor execution, bounded autonomous
  continuation, review_pending staging of successful refinement candidates, default-deny write scope,
  explicit structural authority for new spec creation, non-escalating fallback isolation, and changes
  that always require human approval
- Defines observation, signal, and proposal as a derived reflective loop, including linked-spec continuation
  after explicit blocked or gated work clears, that does not mutate canonical specs by itself
- Defines the first graph-health signals for oversized specs, missing canonical dependencies, repeated
  split_required, and stalled or weak refinement progression, while treating low-maturity linked specs
  only as derived follow-up hints rather than normative scores
- Defines that graph-health observations, signals, latent continuation candidates, and proposal artifacts
  are first persisted in run artifacts plus derived queues, that canonical-state graph health and queues
  derive only from accepted canonical content or explicit proposal artifacts, and that review candidates
  remain non-canonical inspection context until approval
- Remains implementation-agnostic about exact formulas, thresholds, queue algorithms, and future metric
  systems such as SIB or Specification Verifiability, while delegating concrete continuation selection
  and reflective execution mechanics to SG-SPEC-0026 and its descendants, concrete proposal/queue control
  details to SG-SPEC-0034, and detailed subtree-shape and lower-boundary handoff signal contracts to SG-SPEC-0049
acceptance_evidence:
- criterion: Defines the boundary between canonical SpecGraph governance, supervisor execution, bounded
    autonomous continuation, review_pending staging of successful refinement candidates, default-deny
    write scope, explicit structural authority for new spec creation, non-escalating fallback isolation,
    and changes that always require human approval
  evidence: 'specification.boundary_policy separates canonical_governance, supervisor_execution, and human_approval.
    It states that specs govern ontology and policy, the supervisor executes bounded refinement and emits
    derived observations, and constitutional changes require explicit human approval. Direct-update authorization
    and continuation execution mechanics are delegated through SG-SPEC-0026 and its bounded descendant
    mechanics specs, while SG-SPEC-0003 retains the boundary contract. specification.boundary_policy.human_approval
    now restores review_pending as a pre-merge barrier by requiring successful refinement candidates to
    remain staged until explicit approve, forbidding sync of staged candidate paths into the canonical
    root before approval, and requiring approval-time freshness revalidation before sync. specification.boundary_policy.supervisor_execution
    now also makes missing or empty write policy collapse to implicit source-spec-only scope rather than
    unrestricted sync authority, requires new spec creation to satisfy both explicit path authorization
    and explicit structural run authority, and requires degraded copied-worktree fallback isolation to
    preserve or narrow nested sandbox and approval authority rather than bypass it. The same section allows
    bounded autonomous continuation only after blocked/gated work is clear and only within current authority,
    without authorizing new metrics, cross-branch restructuring, or review bypass.

    '
- criterion: Defines observation, signal, and proposal as a derived reflective loop, including linked-spec
    continuation after explicit blocked or gated work clears, that does not mutate canonical specs by
    itself
  evidence: 'specification.reflective_loop defines the sequence observe -> derive signal -> form proposal
    -> execute local refactor or await approval, and now adds a continuation contract for selecting at
    most one next linked latent_graph_improvement_candidate after blocked/gated work is exhausted. specification.derived_artifact_policy
    explicitly forbids observations, signals, and continuation candidates from mutating canonical spec
    nodes by themselves.

    '
- criterion: Defines the first graph-health signals for oversized specs, missing canonical dependencies,
    repeated split_required, and stalled or weak refinement progression, while treating low-maturity linked
    specs only as derived follow-up hints rather than normative scores
  evidence: 'specification.graph_health_signal_policy.initial_signals names oversized_spec, missing_dependency_target,
    repeated_split_required_candidate, stalled_maturity_candidate, and weak_structural_linkage_candidate.
    specification.graph_health_signal_policy.continuation_detection limits low-maturity linked-spec detection
    to derived context around stalled_maturity_candidate and weak_structural_linkage_candidate rather
    than a new canonical metric or backlog score.

    '
- criterion: Defines that graph-health observations, signals, latent continuation candidates, and proposal
    artifacts are first persisted in run artifacts plus derived queues, that canonical-state graph health
    and queues derive only from accepted canonical content or explicit proposal artifacts, and that review
    candidates remain non-canonical inspection context until approval
  evidence: 'specification.derived_artifact_policy.first_persistence lists run payloads, summaries, latent
    continuation candidate records in run payloads and summaries, refactor_queue artifacts, proposal_queue
    artifacts, and full proposal payload artifacts as the first persistence targets, while specification.derived_artifact_policy.canonical_writeback
    forbids direct writeback of observations, signals, continuation candidates, or proposals into canonical
    spec nodes without an explicit proposal and approval step. specification.derived_artifact_policy.refactor_queue
    and proposal_queue now require canonical-state queue derivation to use only accepted canonical content
    or explicit proposal artifacts, and specification.derived_artifact_policy.first_persistence allows
    review-candidate inspection in run payloads only when it is explicitly marked as non-canonical review
    context rather than current graph truth.

    '
- criterion: Remains implementation-agnostic about exact formulas, thresholds, queue algorithms, and future
    metric systems such as SIB or Specification Verifiability, while delegating concrete continuation
    selection and reflective execution mechanics to SG-SPEC-0026 and its descendants, concrete proposal/queue
    control details to SG-SPEC-0034, and detailed subtree-shape and lower-boundary handoff signal contracts
    to SG-SPEC-0049
  evidence: 'specification.scope.out excludes concrete metric formulas, threshold tuning, continuation-selection
    truth tables, queue-control semantics, and tracked implementation-layer design while keeping SG-SPEC-0003
    focused on governance boundary and derived persistence. specification.delegated_integration_map assigns
    parent-facing continuation integration to SG-SPEC-0026, proposal/queue control semantics to SG-SPEC-0034,
    and bounded subtree-shape plus lower-boundary handoff signal semantics to SG-SPEC-0049.

    '
prompt: Keep SG-SPEC-0003 as the canonical overview and integration node for reflective graph-health governance.
  It retains the boundary among SpecGraph governance, supervisor execution, bounded autonomous continuation,
  derived observation/signal/proposal flow, diagnostic graph-health vocabulary, derived first-persistence
  constraints, and implementation-agnostic scope, while SG-SPEC-0026 and its descendants own continuation
  selection and delegated reflective execution mechanics, SG-SPEC-0034 owns proposal/queue control contracts,
  and SG-SPEC-0049 owns derived subtree-shape and lower-boundary handoff signal contracts.
specification:
  objective: 'Define how SpecGraph observes its own graph quality, how those observations become derived
    signals, continuation candidates, and proposals, where the boundary lies between canonical governance,
    supervisor execution, and human approval, and how this overview node coordinates bounded delegated
    mechanics without reabsorbing them.

    '
  scope:
    in:
    - Boundary between canonical specs, supervisor execution, and human approval
    - review_pending staging boundary for successful refinement candidates before canonical sync
    - Bounded autonomous continuation selection among linked specs after explicit blocked or gated work
      clears
    - Reflective loop stages from observation to proposal
    - First graph-health signals related to spec size, dependency integrity, and refinement progression
    - Derived persistence of observations, signals, continuation candidates, and proposals in run artifacts
    - First derived refactor queue artifact, work-item classification, and proposal queue artifact
    - Parent-side coordination of bounded continuation and proposal/queue contract descendants
    - Parent-side boundary for derived subtree-shape and lower-boundary handoff signal descendants
    out:
    - Concrete metric formulas or scoring weights
    - Final queue prioritization algorithms
    - Concrete continuation candidate derivation, deterministic tie-break rules, suppression/handoff truth
      tables, and delegated reflective execution mechanics owned by SG-SPEC-0026 and its descendants
    - Concrete proposal/queue control semantics, including active-item precedence, dedupe, retry gating,
      and proposal-direct handoff behavior, are delegated to SG-SPEC-0034
    - Concrete subtree-shape and lower-boundary handoff signal semantics, consumer penalties, and any
      tracked implementation-facing layer contract are delegated to SG-SPEC-0049
    - Concrete split_refactor execution steps, split payload schema, and handoff/selection heuristics
    - Viewer UX or visual overlays
    - Automatic self-modification of ontology without approval
    - Detailed SIB, Verifiability, or Observability metric definitions
    - Canonical backlog labels or new normative maturity metrics inferred from autonomous continuation
      heuristics
  terminology:
    graph_health_observation: 'A derived operational fact about the current state of the graph or a refinement
      run, produced by tooling and rebuildable from canonical data plus run context.

      '
    graph_health_signal: 'A higher-level diagnostic conclusion derived from one or more observations,
      used to prioritize attention or proposals without becoming canonical graph truth by itself.

      '
    refactor_work_item: 'A derived queue entry produced from graph_health signals that recommends either
      a local graph refactor or a governance proposal without becoming canonical graph data by itself.

      '
    governance_proposal: 'A structured proposal to change canonical ontology, policy, or supervisor behavior
      after repeated or important graph-health signals have been observed.

      '
    refactor_proposal: 'A structured proposal to perform a bounded local graph refactor after recurring
      graph-health signals indicate that ad hoc local edits are no longer sufficient.

      '
    direct_graph_update: 'A supervisor-executed structural change to canonical spec files that is allowed
      only for bounded local graph refactors under current governance rules and without changing ontology,
      policy, thresholds, or supervisor authority.

      '
    local_graph_refactor: 'A bounded structural improvement to existing spec nodes or edges that stays
      within current governance rules and does not redefine ontology or policy.

      '
    split_refactor_pass: 'A bounded, explicitly targeted refactoring mode that analyzes one oversized
      spec and prepares a structured split proposal without mutating canonical spec files by itself.

      '
    operator_target: 'An explicit operator-selected execution target that overrides heuristic work-item
      selection for a single bounded supervisor run.

      '
    latent_graph_improvement_candidate: 'A derived continuation candidate inferred from already linked
      canonical specs when the active bounded target has no remaining explicit blocked or gated work and
      existing graph-health signals suggest another bounded follow-up refinement. It is selector input
      only and does not become canonical backlog truth by itself.

      '
    structured_split_proposal_artifact: 'A derived artifact stored outside canonical spec nodes that captures
      the full proposal payload for split_oversized_spec, including parent-after-split intent, suggested
      child specs, acceptance mapping, and lineage updates.

      '
    constitutional_change: 'A change to ontology, policy, thresholds, or supervisor authority that alters
      the governing rules of SpecGraph and therefore requires human approval.

      '
  delegated_integration_map:
    parent_role:
    - SG-SPEC-0003 remains the overview node that defines the reflective governance boundary, shared graph-health
      vocabulary, and first-persistence envelope for this graph area.
    - SG-SPEC-0003 coordinates bounded dependency children and their descendant mechanics surfaces, but
      it MUST NOT restate detailed continuation-selection, execution, or queue-control truth tables once
      those concerns are delegated below.
    dependency_children:
    - child_spec: SG-SPEC-0026
      concern: Bounded autonomous continuation integration
      parent_summary:
      - SG-SPEC-0003 defines when bounded autonomous continuation may be considered and preserves the
        non-canonical boundary for latent_graph_improvement_candidate records.
      - SG-SPEC-0003 retains the approval and governance boundary for continuation without owning selection
        or execution mechanics.
      delegated_detail_owned_by_child:
      - SG-SPEC-0026 owns parent-facing continuation suppression and handoff integration.
      - SG-SPEC-0033 owns concrete continuation candidate derivation, de-duplication, and deterministic
        selection ordering beneath SG-SPEC-0026.
      - SG-SPEC-0027 and its descendants own delegated reflective execution mechanics after continuation
        handoff is allowed.
    - child_spec: SG-SPEC-0034
      concern: Proposal and queue control contract boundary
      parent_summary:
      - SG-SPEC-0003 defines reflective-loop staging and the rule that proposal and queue artifacts remain
        derived and non-canonical at first persistence.
      - SG-SPEC-0003 keeps only the implementation-agnostic boundary for when proposals or direct refactors
        are considered under current governance.
      delegated_detail_owned_by_child:
      - SG-SPEC-0034 owns the parent-facing proposal_queue and refactor_queue control contract surface.
      - SG-SPEC-0039, SG-SPEC-0041, and their descendants own concrete queue-control field surfaces, retry
        conditions, precedence, and proposal-direct handoff semantics.
    - child_spec: SG-SPEC-0049
      concern: Derived subtree-shape and lower-boundary handoff signal boundary
      parent_summary:
      - SG-SPEC-0003 retains shared graph-health vocabulary, first-persistence constraints, and the rule
        that shape and handoff signals remain derived rather than canonical graph truth.
      - SG-SPEC-0003 keeps only the implementation-agnostic boundary for when subtree-shape or lower-boundary
        handoff signals may redirect work toward rebalance, proposal, or stop-or-redirect behavior.
      delegated_detail_owned_by_child:
      - SG-SPEC-0049 owns the bounded signal families for subtree shape, missing aggregate grouping, and
        lower-boundary handoff candidates.
      - SG-SPEC-0049 defines evaluator and supervisor consumption boundaries for those signals without
        introducing a tracked implementation-facing layer or redefining queue-control or continuation-selection
        mechanics.
  boundary_policy:
    canonical_governance:
    - Canonical specs define what counts as valid graph structure, allowed edge semantics, lifecycle transitions,
      quality policy, and approval boundaries.
    - Canonical specs may describe future signals and proposals without forcing their exact runtime implementation.
    supervisor_execution:
    - The supervisor may execute bounded spec refinement, ancestor reconciliation, local graph refactors,
      and derived graph-health observation as long as those actions stay within current canonical policy.
    - The supervisor may perform direct_graph_update only for bounded local_graph_refactor work that is
      explicitly authorized in current canonical policy; concrete authorization matrices, proposal-lane
      execution semantics, split mechanics, and continuation-selection rules are delegated through SG-SPEC-0026
      and its bounded descendant mechanics specs, while SG-SPEC-0003 retains only the boundary contract.
    - Missing or empty write policy MUST collapse to implicit source-spec-only scope for bounded refinement;
      it MUST NOT expand to unrestricted canonical sync authority.
    - New spec creation MUST require both explicit path authorization for the proposed new file and explicit
      structural run authority; structural mutation MUST NOT arise from permissive fallback path handling
      alone.
    - Degraded copied-worktree fallback MAY change the isolation implementation, but it MUST preserve
      or narrow nested sandbox and approval authority relative to the normal git-worktree path; it MUST
      NOT bypass those controls.
    - When the current bounded target has no remaining explicit blocked or gated work, the supervisor
      may inspect already linked specs for latent_graph_improvement_candidate follow-up work using current
      canonical links, current status and maturity, and already-defined graph-health signals.
    - That inspection may select at most one next bounded target or emit or refresh derived artifacts
      under current policy, but it does not authorize new canonical metrics, cross-branch restructuring,
      or bypass of active review boundaries.
    - The supervisor may not silently redefine ontology, approval boundaries, or its own authority.
    - Explicit operator_target runs may override heuristic selector choice for one bounded execution,
      but they remain bound by current canonical policy and approval limits.
    human_approval:
    - Human approval is required for constitutional_change, including ontology changes, policy changes,
      threshold changes that alter governance meaning, and supervisor behavior changes that expand autonomous
      authority.
    - review_pending is a pre-merge barrier for successful refinement candidates that would change canonical
      content.
    - Successful refinement candidates MUST remain staged in review_pending until an explicit approve
      decision authorizes sync of the staged candidate paths into the canonical root.
    - Approval to sync staged candidate paths MUST revalidate candidate freshness against the current
      canonical root before sync; stale staged candidates MUST remain non-canonical until refreshed or
      rerun.
  reflective_loop:
    stages:
    - Observe graph and run state
    - Derive graph_health_observation records
    - Aggregate observations into graph_health_signal candidates
    - Decide whether the result is a local_graph_refactor, a refactor_proposal, or a governance_proposal
    - Apply local refactor if allowed, otherwise emit an explicit proposal and wait for human approval
    rules:
    - Observation and signal generation are derived runtime activities, not authored canonical facts.
    - Signals may motivate proposals, but they MUST NOT mutate canonical spec nodes by themselves.
    - Recurring local graph pathologies MAY emit explicit derived refactor_proposal artifacts before any
      canonical writeback occurs.
    - Active proposal states are derived control artifacts; exact proposal/queue control semantics are
      defined by SG-SPEC-0034.
  continuation:
  - Autonomous continuation is allowed only after the current bounded target has no remaining explicit
    blocked or gated work within the current authority envelope.
  - Candidate detection may treat low maturity on an already linked spec as contextual evidence only when
    combined with existing signal candidates such as stalled_maturity_candidate or weak_structural_linkage_candidate;
    low maturity alone does not create canonical defect state or mandatory backlog. It does not emit or
    suppress canonical obligations.
  - A latent_graph_improvement_candidate is valid only when it is linked to at least one active graph_health_signal
    already in graph_health_signal_policy.initial_signals; maturity context without a signal tie-in is
    not enough to derive continuation.
  - The supervisor may continue into at most one linked latent_graph_improvement_candidate at a time;
    if the inferred work exceeds current direct authority or is already owned by an active proposal or
    gate, the result remains derived artifact emission rather than canonical mutation.
  - Candidate selection is limited to direct links of the currently bounded target (current run context),
    preventing implicit global scans or off-graph branch leaps until a new bounded target is selected
    by proposal or operator instruction.
  - Detailed criteria for deriving, de-duplicating, and selecting the next linked latent_graph_improvement_candidate
    are delegated to SG-SPEC-0026.
  - When blocked or gated work remains, latent continuation candidates may still be recorded as derived
    evidence, but they must not be promoted to execution or canonical writeback candidates.
  graph_health_signal_policy:
    initial_signals:
    - oversized_spec
    - missing_dependency_target
    - repeated_split_required_candidate
    - stalled_maturity_candidate
    - weak_structural_linkage_candidate
    semantics:
    - Initial signals are diagnostic hints intended to drive refinement quality and graph refactoring.
    - Signal presence does not by itself prove a canonical error; it indicates a region that may need
      review, decomposition, relinking, or policy consideration.
    - oversized_spec is a structural warning emitted when canonical shape indicators for a spec exceed
      current policy envelope (for example, repeated large node breadth, dependency fan-out, or lineage
      depth), and does not imply a mandatory canonical defect.
    - missing_dependency_target is observed when a required dependency relation points to an absent, unresolved,
      or unavailable canonical target and requires follow-up planning rather than direct canonical mutation.
    - repeated_split_required_candidate is emitted when the same split-refactor need is derived repeatedly
      for the same canonical node across bounded refinement attempts without closure.
    - stalled_maturity_candidate is emitted when a linked target repeatedly remains active in attempts
      but its refinement maturity does not meaningfully progress under current authority bounds.
    - weak_structural_linkage_candidate is emitted when linked-candidate context appears thin, brittle,
      or under-supported relative to observed graph-health context and is used only for derived prioritization.
    continuation_detection:
    - Low maturity on a linked spec may inform latent_graph_improvement_candidate detection only as derived
      context around stalled_maturity_candidate or weak_structural_linkage_candidate.
    - Continuation detection is rebuildable from canonical graph state plus run context and MUST NOT be
      written back as a canonical obligation, score, or lifecycle field.
    delegated_signal_families:
    - SG-SPEC-0049 owns detailed subtree-shape signals such as serial_refinement_ladder, over_atomized_subtree,
      missing_aggregate_node, depth_without_breadth, and delegation_only_chain.
    - SG-SPEC-0049 owns lower-boundary handoff signals such as lower_boundary_handoff_candidate and graph_layer_exhausted_for_subtree.
    - Those descendant signals remain derived and advisory; they may inform evaluator or supervisor stop-or-redirect
      decisions but do not create a tracked implementation-facing layer or canonical writeback path by
      themselves.
  derived_artifact_policy:
    first_persistence:
    - Run payloads
    - Run summaries
    - Latent continuation candidate records in run payloads and summaries
    - Refactor queue artifacts
    - Proposal queue artifacts
    - Full proposal payload artifacts
    - review_pending candidate-state inspection MAY appear in run payloads only when it is explicitly
      marked as non-canonical review context rather than current graph truth
    refactor_queue:
    - The first refactor queue is a derived artifact built from graph_health signals and their current
      classification.
    - Canonical-state refactor_queue derivation MUST use accepted canonical content or explicit proposal
      artifacts, and MUST NOT treat review_pending candidate worktree content as current graph truth.
    - A refactor queue item may classify work as graph_refactor or governance_proposal, but that classification
      remains derived until acted on under the current governance rules.
    - Refactor queue items SHOULD expose whether their current execution_policy is direct_graph_update
      or emit_proposal under the current boundary rules.
    proposal_queue:
    - The first proposal queue is a derived artifact built from recurring graph-health signals and governance-class
      signals that should no longer remain implicit.
    - Canonical-state proposal_queue derivation MUST use accepted canonical content or explicit proposal
      artifacts, and MUST NOT count review_pending candidate worktree content as current graph truth or
      recurrence-supporting evidence.
    - A proposal queue item may classify work as refactor_proposal or governance_proposal, and it records
      recurrence and source-run lineage without becoming canonical graph data by itself.
    - proposal_queue acts as an index and summary surface for proposal artifacts; it MUST NOT be the only
      persistence location for full split-refactor payloads.
    - Active proposal_queue control behavior (including whether a proposal preempts direct updates, dedupe,
      and retry conditions) is defined in SG-SPEC-0034.
    canonical_writeback:
    - Graph-health observations and signals MUST NOT be written back into canonical spec nodes unless
      they have first been transformed into an explicit proposal and approved under the current governance
      rules.
    - Derived latent_graph_improvement_candidate records MUST NOT be written into canonical spec nodes
      as backlog labels, maturity overrides, or implied work ownership.
    - Staged candidate content produced by a successful refinement candidate MUST NOT be synced into canonical
      root paths while the candidate remains in review_pending.
    - review_pending candidate graph-health inspection MAY inform human review context, but it MUST remain
      explicitly non-canonical until accepted into canonical content or materialized as an explicit proposal
      artifact.
  split_refactor_policy:
    boundary_contract:
    - SG-SPEC-0003 only constrains split_refactor behavior at governance boundary level.
    - Split-refactor runs are proposal-first and must not directly mutate canonical spec nodes.
    - Split-refactor payload construction, parent-child acceptance mapping, child-creation mechanics,
      and queue algorithms are delegated to SG-SPEC-0025 and its bounded descendants.
    - Split-refactor selection, reflection-driven continuation routing, and executor mechanics after a
      blocked/gated clear are delegated to SG-SPEC-0026 and its bounded descendants.
    - SG-SPEC-0003 forbids split_refactor mechanics from altering ontology, thresholds, authority, or
      review gate semantics on their own.
    canonical_constraints:
    - A split proposal retains the parent spec’s stable ID and overview role boundary until approved.
    - Candidate follow-up children are represented as derived proposal artifacts for governance review,
      not as canonical commitments.

acceptance:
- Defines the boundary between canonical SpecGraph governance, supervisor execution, and changes that
  always require human approval
- Defines observation, signal, and proposal as a derived reflective loop that does not mutate canonical
  specs by itself
- Defines the first graph-health signals for oversized specs, missing canonical dependencies, repeated
  split_required, and stalled or weak refinement progression as diagnostic inputs rather than normative
  scores
- Defines that graph-health observations, signals, and proposal artifacts are first persisted in run artifacts
  plus derived queues, not written back into canonical spec nodes
- Defines that the first derived refactor queue classifies work items as graph_refactor or governance_proposal
  and that recurring or governance-class signals may emit explicit derived proposals without mutating
  canonical spec nodes by themselves
- Defines when supervisor may perform a direct_graph_update versus when it must emit or defer to an explicit
  proposal artifact
- Defines a proposal-first split_oversized_spec refactoring pass for oversized non-seed specs that runs
  only from explicit operator targeting and does not mutate canonical spec files by itself
- Defines a dedicated structured split proposal artifact under derived runs/proposals storage and keeps
  proposal_queue as an index rather than the full refactor payload
- Remains implementation-agnostic about exact formulas, thresholds, queue algorithms, and future metric
  systems such as SIB or Specification Verifiability
acceptance_evidence:
- criterion: Defines the boundary between canonical SpecGraph governance, supervisor execution, and changes
    that always require human approval
  evidence: 'specification.boundary_policy separates canonical_governance, supervisor_execution, and human_approval.
    It states that specs govern ontology and policy, the supervisor executes bounded refinement and emits
    derived observations, and constitutional changes require explicit human approval.

    '
- criterion: Defines observation, signal, and proposal as a derived reflective loop that does not mutate
    canonical specs by itself
  evidence: 'specification.reflective_loop defines the sequence observe -> derive signal -> form proposal
    -> execute local refactor or await approval. specification.derived_artifact_policy explicitly forbids
    observations and signals from mutating canonical spec nodes by themselves.

    '
- criterion: Defines the first graph-health signals for oversized specs, missing canonical dependencies,
    repeated split_required, and stalled or weak refinement progression as diagnostic inputs rather than
    normative scores
  evidence: 'specification.graph_health_signal_policy.initial_signals names oversized_spec, missing_dependency_target,
    repeated_split_required_candidate, stalled_maturity_candidate, and weak_structural_linkage_candidate.
    The same section defines them as diagnostic and rebuildable, not canonical truth.

    '
- criterion: Defines that graph-health observations, signals, and proposal artifacts are first persisted
    in run artifacts plus derived queues, not written back into canonical spec nodes
  evidence: 'specification.derived_artifact_policy.first_persistence lists run payloads, summaries, refactor_queue
    artifacts, and proposal_queue artifacts as the first persistence targets, while specification.derived_artifact_policy.canonical_writeback
    forbids direct writeback of observations, signals, or proposals into canonical spec nodes without
    an explicit proposal and approval step.

    '
- criterion: Defines that the first derived refactor queue classifies work items as graph_refactor or
    governance_proposal and that recurring or governance-class signals may emit explicit derived proposals
    without mutating canonical spec nodes by themselves
  evidence: 'specification.terminology defines refactor_work_item, refactor_proposal, and governance_proposal.
    specification.derived_artifact_policy.refactor_queue defines the first queue artifact as a derived
    projection from graph_health signals, and specification.derived_artifact_policy.proposal_queue defines
    explicit proposal artifacts emitted for recurring or governance-class signals. specification.reflective_loop
    keeps those artifacts derived until acted on under current governance rules. Descendant specs/nodes/SG-SPEC-0006.yaml
    then refines the tracked proposal lane and review-visible proposal state without changing the boundary
    defined here.

    '
- criterion: Defines when supervisor may perform a direct_graph_update versus when it must emit or defer
    to an explicit proposal artifact
  evidence: 'specification.terminology defines direct_graph_update. specification.boundary_policy.supervisor_execution
    limits direct graph updates to bounded local_graph_refactor work that stays within current ontology,
    policy, and allowed paths. specification.reflective_loop and specification.derived_artifact_policy.proposal_queue
    then require proposal emission or proposal precedence for recurring pathologies and governance-class
    signals. Descendant specs/nodes/SG-SPEC-0005.yaml then narrows the same boundary for retrospective
    refactor over live graph regions without broadening supervisor authority.

    '
- criterion: Defines a proposal-first split_oversized_spec refactoring pass for oversized non-seed specs
    that runs only from explicit operator targeting and does not mutate canonical spec files by itself
  evidence: 'specification.terminology defines split_refactor_pass and operator_target. specification.split_refactor_policy.v1

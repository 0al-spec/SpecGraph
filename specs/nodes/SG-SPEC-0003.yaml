id: SG-SPEC-0003
title: SpecGraph - Reflective Governance Boundary and Graph Health Signals
kind: spec
status: specified
maturity: 0.36
depends_on: []
relates_to:
- SG-SPEC-0002
refines:
- SG-SPEC-0001
inputs:
- specs/nodes/SG-SPEC-0001.yaml
- specs/nodes/SG-SPEC-0002.yaml

    '
- criterion: Defines supersession kinds and successor mapping for canonical nodes and explicit canonical
    edges so superseded subjects remain inspectable lineage only and do not participate in active topology
  evidence: 'specification.terminology defines supersession_kind and successor_mapping. specification.supersession_topology

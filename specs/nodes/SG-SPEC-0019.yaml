acceptance:
- Defines the bounded role of canonical revision records, revision lineage, and supersession without prescribing
  storage backends, VCS workflow, or merge implementation
- Defines the minimum semantic contract for recording a canonical change, including subject identity,
  predecessor or superseded reference, authority or provenance, and bounded change scope
- Defines the canonical versus derived boundary for revision history so diffs, timelines, indexes, and
  working-tree state do not replace governed lineage

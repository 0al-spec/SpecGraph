    merge mechanics, retention storage policy, and viewer UX behavior. specification.boundary_policy also
    states that this child clarifies revision, supersession, and topology-presence semantics without adding
    a new seed node kind to SG-SPEC-0001.

    '
- criterion: Defines the minimum semantic contract for recording a canonical change, including subject
    identity, predecessor or superseded reference, authority or provenance, bounded change scope, and
    resulting presence-state effect on active topology
  evidence: 'specification.terminology defines revision_subject, revision_record, predecessor_reference,
    revision_scope, and subject_presence_state. specification.revision_contract.record_minimum_semantics
    and specification.presence_contract then require a stable subject reference, predecessor or superseded

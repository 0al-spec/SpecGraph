    excludes them from active topology.

    '
- criterion: Defines the canonical versus derived boundary for revision history and active graph projection
    so diffs, timelines, indexes, working-tree state, and default historical filtering do not replace
    governed lineage
  evidence: 'specification.canonical_vs_derived_boundary separates authored or imported revision records,
    supersedes edges, predecessor references, and canonical presence-state facts from rebuildable git

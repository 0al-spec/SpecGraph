acceptance:
- Defines the bounded role of canonical revision records, revision lineage, supersession, and active-vs-historical
  graph presence without prescribing storage backends, VCS workflow, merge implementation, or viewer UX
- Defines the minimum semantic contract for recording a canonical change, including subject identity,
  predecessor or superseded reference, authority or provenance, bounded change scope, and resulting presence-state
  effect on active topology
- Defines supersession kinds and successor mapping for canonical nodes and explicit canonical edges so
  superseded subjects remain inspectable lineage only and do not participate in active topology
- Defines the canonical versus derived boundary for revision history and active graph projection so diffs,
  timelines, indexes, working-tree state, and default historical filtering do not replace governed lineage
acceptance_evidence:
- criterion: Defines the bounded role of canonical revision records, revision lineage, supersession, and
    active-vs-historical graph presence without prescribing storage backends, VCS workflow, merge implementation,
    or viewer UX
  evidence: 'specification.scope.in now includes active-versus-historical graph presence and derived active

prompt: Introduce the canonical record semantics cluster beneath SG-SPEC-0001 so root fan-out pressure
  can be reduced through a meaningful intermediate parent instead of another flat root child.
specification:
  objective: Define the intermediate semantic cluster for canonical record-level semantics so SG-SPEC-0001
    can delegate record identity, metadata, lineage, presence, authority, and reachability concerns through
    one legible aggregate boundary while each concrete child keeps its stable bounded contract.
  scope:
    in:
    - Intermediate cluster role for canonical record semantics beneath SG-SPEC-0001
    - Grouping boundary for revision lineage, maturity, edge validation, provenance, presence, authority
      classes, and traceability reachability
    - Dependency routing from SG-SPEC-0001 through the cluster to concrete semantic children
    - Reparenting boundary for reducing root refinement fan-out without changing stable child IDs
    - Canonical-versus-derived protection for record semantics as graph truth rather than viewer projection
    out:
    - Storage format, repository layout, database schema, or serialization mechanics
    - Traversal algorithms, validation execution, search indexes, or graph-query implementation
    - Viewer badges, layout, colors, filters, or interaction design
    - Lifecycle automation, supervisor queue policy, or promotion mechanics
    - New node kinds, edge kinds, authority classes, presence states, or maturity formulas
    - Runtime implementation or dedicated executor ownership for these semantics
  terminology:
    canonical_record_semantics_cluster: The intermediate parent under SG-SPEC-0001 that groups cross-cutting
      semantics attached to canonical nodes and explicit canonical edges.
    record_identity_surface: The stable identity, lineage, presence, and authority meaning that lets a
      governed subject remain inspectable across revisions and derived projections.
    record_integrity_contract: The combined semantic obligation that canonical records remain traceable,
      provenance-bearing, lifecycle-valid, edge-valid, and current-or-historical in explicitly governed
      ways.
    cluster_member_contract: A stable child spec whose bounded semantics are grouped by SG-SPEC-0062 without
      losing its own identity, acceptance criteria, or dependency relationships.
    root_fan_out_reduction: A structural cleanup in which SG-SPEC-0001 delegates related direct children
      through SG-SPEC-0062 instead of carrying every member as a separate direct refinement child.
  cluster_contract:
    parent_boundary:
    - SG-SPEC-0001 remains the seed executable product ontology and owns the root node kinds, edge kinds,
      lifecycle, canonical-versus-derived split, and invariants.
    - SG-SPEC-0062 owns the aggregate record-semantics grouping that makes those root commitments legible
      without forcing SG-SPEC-0001 to directly own every record-level child.
    - The cluster exists only when its member concerns form a real semantic aggregate; it must not become
      a meaningless wrapper node.
    dependency_policy:
    - SG-SPEC-0001 may depend on SG-SPEC-0062 as the aggregate blocking descendant for canonical record
      semantics.
    - SG-SPEC-0062 depends only on the foundation blockers required to make the aggregate coherent, including
      lineage, explicit edge validation, and node presence semantics.
    - Non-blocking record-semantics members stay enumerated in member_contracts rather than widening top-level
      depends_on beyond the atomicity threshold.
    - Member specs keep their stable IDs and may retain their existing own dependencies; the cluster does
      not rewrite those contracts.
    refinement_routing_policy:
    - Existing SG-SPEC-0001 children whose primary role is record-level lineage, metadata, presence, authority,
      validation, or reachability may be reparented to SG-SPEC-0062.
    - Reparenting a member under SG-SPEC-0062 must preserve the member's stable identity, acceptance,
      provenance, and own dependency semantics.
    - SG-SPEC-0001 should reference the cluster for the aggregate and avoid repeating a flat list of every
      record-semantics member when the cluster already owns that grouping.
  member_contracts:
  - spec_id: SG-SPEC-0019
    member_role: Canonical revision and supersession lineage.
    ownership_boundary: Defines revision records, supersession, successor mapping, and active-versus-historical
      lineage semantics consumed by record presence and reachability.
  - spec_id: SG-SPEC-0022
    member_role: Node maturity semantics.
    ownership_boundary: Defines the diagnostic maturity signal and its lifecycle boundary without turning
      maturity into approval or queue policy.
  - spec_id: SG-SPEC-0023
    member_role: Edge-kind validation contract.
    ownership_boundary: Defines compatibility, directedness, endpoint presence, and linked-readiness semantics
      for explicit canonical edges.
  - spec_id: SG-SPEC-0024
    member_role: Canonical provenance envelope.
    ownership_boundary: Defines provenance metadata and authority/source reference handling for canonical
      nodes and explicit canonical edges.
  - spec_id: SG-SPEC-0054
    member_role: Canonical node presence surface.
    ownership_boundary: Defines active versus historical node presence markers and their lineage boundary.
  - spec_id: SG-SPEC-0057
    member_role: Authority class semantic boundary.
    ownership_boundary: Defines authored, imported, inferred, and distilled authority-class semantics
      across governed subjects and explicit canonical edges.
  - spec_id: SG-SPEC-0061
    member_role: Canonical traceability reachability boundary.
    ownership_boundary: Defines when active specification-layer subjects satisfy INV-002 through canonical
      trace paths rather than derived projections.
  non_goal_policy:
  - SG-SPEC-0062 must not redefine member formulas, field-level schemas, storage layouts, or viewer affordances.
  - SG-SPEC-0062 must not claim runtime realization merely because its members have evidence or derived
    surfaces.
  - SG-SPEC-0062 must not hide unresolved member gaps; backlog and evidence projections should continue
    to point to the concrete member when the gap is member-specific.

acceptance:
- Defines SG-SPEC-0062 as the intermediate semantic cluster parent under SG-SPEC-0001 for canonical record
  semantics so the root ontology no longer needs to directly own every record-field, lineage, presence,
  authority, and reachability child.
- Groups canonical revision lineage, maturity, edge-kind validation, provenance, presence, authority-class,
  and traceability-reachability contracts without redefining the bounded contracts owned by those children.
- Defines the dependency and refinement routing rule for the cluster so SG-SPEC-0001 can depend on one
  meaningful record-semantics aggregate while concrete child specs keep their existing semantic ownership.
- Keeps storage layout, traversal algorithms, viewer rendering, lifecycle automation, and runtime implementation
  out of scope for this cluster.

acceptance:
- Defines which derived artifacts, proposals, and review gates must exist before retrospective refactors
  can be applied to live graph regions
acceptance_evidence:
- criterion: Defines which derived artifacts, proposals, and review gates must exist before retrospective
    refactors can be applied to live graph regions
  evidence: 'specification.retrospective_application_policy.required_artifacts defines the derived trigger
    and current-state context artifacts, the reviewable retrospective_application_artifact, and the repository-tracked
    proposal-lane package required before writeback, aligned to SG-SPEC-0006 proposal_repository_presence,
    proposal_handle, proposal_authority_state, proposal_target_region, and proposal_lineage_link semantics.
    specification.retrospective_application_policy.proposal_state_gate requires exactly one compatible
    proposal-lane owner in approved_for_application state, excludes ineligible authority states, and treats
    materially incompatible overlaps or existing canonical_application_event markers as package refusal
    conditions rather than new proposal_authority_state values. specification.reviewable_artifact_contract
    defines the required artifact contract for intended_structure, lineage_preservation, downstream_reconciliation_scope,
    and declared_writeback_envelope, including same-pass active topology rewiring whenever a node or explicit
    canonical edge becomes historical_lineage_only under SG-SPEC-0019 lineage preservation semantics.
    specification.retrospective_application_policy.proposal_state_gate requires the approved proposal
    owner to cover both any historical_lineage_only transition and the successor topology kept active
    after application. specification.retrospective_application_policy.review_gates defines the artifact
    completeness, lineage, active topology, downstream reconciliation, writeback envelope, freshness,
    connectivity, and refusal gates that must pass before applying a retrospective refactor to a live
    graph region.

    '
prompt: Refine SG-SPEC-0005 by extracting the bounded concern of retrospective refactor application prerequisites.
  Define which derived artifacts, proposal states, and review gates must exist before a live-region retrospective
  refactor can be applied, including the explicit reviewable artifact contract for intended structure,
  lineage preservation, downstream reconciliation scope, and the declared writeback envelope. Keep the
  child implementation-agnostic and do not broaden it into target selection, local-versus-governance boundary
  rules, or generalized batch scheduling.
specification:
  objective: Define the pre-application prerequisites that must be reviewable before a retrospective_refactor_pass
    may be applied to a live_graph_region, including reviewable same-pass rewiring that keeps lineage-preserved
    historical subjects out of the resulting active projection, without making graph-health signals, proposal
    existence, or apply-path compatibility self-authorizing.
  scope:
    in:
    - Required pre-application artifacts for live-region retrospective refactor writeback
    - Proposal authority state and active proposal ownership prerequisites before application
    - Review gates for intended structure, lineage preservation, downstream reconciliation scope, and
      the declared writeback envelope
    - Reviewable active-versus-historical topology rewiring inside one declared writeback envelope
    - Refusal conditions when the application package is missing, stale, ambiguous, or outside its declared
      envelope
    out:
    - Selection rules for retrospective refactor targets
    - Boundary rules between local retrospective refactor and governance-class restructuring
    - Generalized batch scheduling, refactor-wave orchestration, or queue priority formulas
    - Storage schema, exact file naming, viewer UX, or runtime implementation of an application path
    - Post-write implementation details after a canonical_application_event has been recorded
    - General active-versus-historical ontology rules outside one reviewed application package
  terminology:
    live_retrospective_application: An attempted canonical writeback that applies a reviewed retrospective_refactor_pass
      to an already-live graph region.
    retrospective_application_package: The reviewable set of proposal-lane state, derived support artifacts,
      and application artifact content that must be present before a live_retrospective_application can
      be attempted.
    retrospective_application_artifact: A reviewable non-canonical artifact that states the intended canonical
      structure, lineage preservation plan, downstream reconciliation scope, and declared writeback envelope
      for one retrospective_refactor_pass.
    intended_structure: The artifact component that describes the proposed post-application spec nodes,
      relation changes, retained stable IDs, and new child outcomes at the level needed for review.
    lineage_preservation: The artifact component that maps current canonical specs and accepted_child_work
      to their intended post-application roles so traceability is not inferred after writeback.
    historical_lineage_only: The post-application state for a retained canonical node or explicit canonical
      edge that remains inspectable for SG-SPEC-0019 lineage but is no longer part of the active projection
      after the reviewed retrospective application.
    active_projection: The reviewer-visible post-application topology of nodes and explicit canonical
      edges that remain traversable as active current graph structure after any historical_lineage_only
      preservation is applied.
    downstream_reconciliation_scope: The artifact component that names the canonical nodes whose links,
      blockers, acceptance_evidence, prompt wording, or status-readiness are expected to need narrow reconciliation
      after the application.
    declared_writeback_envelope: The artifact component that restates the retrospective_writeback_envelope
      authorized for this one application attempt.
    pre_application_refusal: A deterministic refusal to apply the retrospective refactor because one or
      more pre-application prerequisites are absent, ambiguous, stale, or out of envelope; canonical spec
      files remain unchanged.
  reviewable_artifact_contract:
    required_components:
    - component: intended_structure
      cardinality: exactly 1
      required_content:
      - Identifies the primary target parent spec and the proposed post-application structure rooted in
        that parent.
      - Distinguishes retained canonical specs from newly materialized child outcomes and from nodes that
        remain read-only.
      - States intended relation changes and acceptance or evidence redistribution at review level without
        prescribing a runtime write algorithm.
      - Shows the resulting active_projection for the declared envelope, including successor nodes or
        explicit canonical edges that replace any subject becoming historical_lineage_only in the same
        pass.
    - component: lineage_preservation
      cardinality: exactly 1
      required_content:
      - Maps every surviving stable spec ID named in the envelope to its intended post-application role.
      - Names accepted_child_work that remains valid and explains how it stays traceable after the refactor.
      - Identifies any intended supersession or replacement only when that authority is already supplied
        by the governing proposal path.
      - Marks every node or explicit canonical edge that will become historical_lineage_only and ties
        it to the successor split, merge, or replacement structure that preserves lineage without leaving
        the historical subject on an active traversal path.
    - component: downstream_reconciliation_scope
      cardinality: exactly 1
      required_content:
      - Names each canonical node expected to need narrow reconciliation after the application.
      - Limits expected reconciliation to links, blockers, acceptance_evidence, prompt wording, and status-readiness
        made stale by the applied refactor.
      - States that unlisted sibling, cousin, and adjacent live-region nodes remain outside the application
        scope unless later targeted by a separate reviewed path.
    - component: declared_writeback_envelope
      cardinality: exactly 1
      required_content:
      - Restates one retrospective_writeback_envelope for the application attempt.
      - Lists direct canonical write targets, direct child outcomes rooted in the target parent, and any
        explicitly named reconciliation nodes.
      - Declares refusal when the intended writes cannot fit inside one bounded envelope.
  retrospective_application_policy:
    required_artifacts:
    - A live_retrospective_application MUST have a retrospective_application_package before any canonical
      writeback is attempted.
    - The package MUST include a derived trigger or rationale artifact that explains why the retrospective
      application exists, such as a graph-health signal, refactor work item, proposal queue item, or operator-authored
      proposal rationale captured in proposal lineage.
    - A derived trigger/rationale artifact may inform timing and investigation, but it is never eligible
      to satisfy proposal_lane ownership or proposal_authority_state gates.
    - The package MUST include a current-state context artifact derived from the canonical graph that
      identifies the live_graph_region assumptions the review is using, including current stable IDs and
      accepted_child_work references relevant to the proposed application.
    - If the reviewed application will move any node or explicit canonical edge to historical_lineage_only,
      the current-state context artifact MUST identify that subject's current active-topology position
      so the same package can show the required rewiring into the resulting active_projection.
    - The proposal-lane portion of the package MUST be reviewable from repository-tracked proposal state
      that exposes proposal_repository_presence, proposal_handle, proposal_authority_state, proposal_target_region,
      and proposal_lineage_link semantics as defined by SG-SPEC-0006; runtime-only proposal summaries
      are insufficient.
    - The package MUST include exactly one reviewable retrospective_application_artifact satisfying specification.reviewable_artifact_contract.
    - Runtime-only artifacts may support review, but they MUST NOT be the only reviewable source for intended
      structure, lineage preservation, downstream reconciliation scope, or the declared writeback envelope.
    proposal_state_gate:
    - The gate consumes the SG-SPEC-0006 proposal_authority_state enum; it does not introduce additional
      proposal authority states.
    - Exactly one active repository-tracked proposal-lane owner MUST match the target region and change
      scope of the retrospective_application_artifact.
    - The matching proposal_authority_state MUST be approved_for_application before application can be
      attempted.
    - The matching approved proposal scope MUST cover both any intended historical_lineage_only transition
      and the successor topology that remains active after the application.
    - Proposal authority states draft, under_review, rejected, and superseded are ineligible for live_retrospective_application.
    - If materially incompatible active proposals overlap the same target region or change scope, application
      MUST be refused until review resolves, supersedes, or redirects the conflict.
    - Materially incompatible overlap is a refusal condition for the package; it MUST NOT be recorded
      as a synthetic proposal_authority_state.
    - apply_path_compatibility and proposal_artifact_link presence may identify consumable input for an
      explicit application path, but neither one substitutes for approved_for_application review authority.
    - approved_for_application authorizes entry into an explicit application path only; it MUST NOT be
      interpreted as proof that canonical_application_event has already occurred.
    - If canonical_application_event is already recorded for the same proposal outcome, the package is
      not an unapplied candidate and MUST be refused or redirected to a separately reviewed repair path.
    - A substantive change to the retrospective_application_artifact after approval MUST return the proposal
      to review or create a superseding proposal before application can proceed.
    review_gates:
    - Repository review gate requires repository-tracked proposal-lane state to expose reviewable proposal
      identity, target region, authority state, lineage, and repository presence before the application
      package can be considered.
    - Artifact completeness gate requires the retrospective_application_artifact to contain exactly one
      intended_structure, one lineage_preservation, one downstream_reconciliation_scope, and one declared_writeback_envelope.
    - Lineage gate requires reviewers to be able to trace stable surviving IDs and accepted_child_work
      from the current canonical graph into the intended structure before writeback.
    - Active topology gate requires same-pass reviewable rewiring for every node or explicit canonical
      edge that becomes historical_lineage_only, so the resulting active_projection is explicit rather
      than inferred after writeback.
    - Historical subject exclusion gate requires the package to forbid any node or explicit canonical
      edge marked historical_lineage_only from remaining on an active traversal path after application.
    - Connectivity gate requires any split, merge, or replacement successors named by the package to keep
      the resulting active_projection connected and reviewable without deleting lineage-preserved subjects.
    - Downstream reconciliation gate requires reviewers to be able to inspect the named downstream reconciliation
      scope and confirm that unlisted adjacent nodes are not mutated by implication.
    - Writeback envelope gate requires the declared_writeback_envelope to fit inside the retrospective_writeback_envelope
      limits delegated by SG-SPEC-0005.
    - Freshness gate requires reviewer-visible package assumptions to remain materially current:
      - The target parent, envelope nodes, and stated downstream reconciliation nodes still exist in the
        live graph.
      - Canonical nodes in scope retain the stable IDs and accepted_child_work references assumed by the
        package.
      - Any node or explicit canonical edge proposed to become historical_lineage_only still occupies
        the active-topology role that the package rewires.
      - Links, blockers, acceptance_evidence, prompt wording, or status-readiness assumptions on named
        scope nodes have not changed to a materially different meaning since assumptions were captured.
      - Any material mismatch in these assumptions makes the package stale, and the package is refused
        until re-reviewed for the current state.
    - Refusal gate requires pre_application_refusal if any prerequisite gate fails; canonical spec files
      remain unchanged and proposal review authority is not rewritten by implication.

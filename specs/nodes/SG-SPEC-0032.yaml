  remain inspectable as an intact subcluster.
specification:
  objective: Keep SG-SPEC-0032 as the bounded proposal/split subcluster edge under SG-SPEC-0027 while
    delegating concrete proposal/split mechanics contracts through SG-SPEC-0043.
  scope:
    in:
    - Proposal and split mechanics gateway role beneath SG-SPEC-0027
    - Delegation of proposal/split readiness through SG-SPEC-0043
    - Subtree-integration contract between SG-SPEC-0026, SG-SPEC-0027, and this subcluster
    - Non-bypass proposal/split dependency path via SG-SPEC-0043
    out:
    - Field-level split artifact schemas already owned by SG-SPEC-0029
    - Continuation-selection policy owned by SG-SPEC-0026
    - Queue ranking formulas, viewer layout, and runtime orchestration
  cluster_role:
  - SG-SPEC-0032 is the single proposal/split mechanics child under SG-SPEC-0027.
  - SG-SPEC-0032 preserves subtree inspectability while keeping proposal/split mechanics contracts delegated
    through SG-SPEC-0043.
  cluster_topology:
  - SG-SPEC-0027 depends on SG-SPEC-0032 as its proposal/split mechanics child.
  - SG-SPEC-0032 depends on SG-SPEC-0043 as the bounded proposal/split gateway.
  - SG-SPEC-0043 delegates proposal/split readiness semantics to SG-SPEC-0029.
  - While SG-SPEC-0032 and SG-SPEC-0043 remain present, SG-SPEC-0026 must not depend directly on SG-SPEC-0029.
  cluster_members:
    proposal_gateway:
    - SG-SPEC-0043 is the bounded proposal/split mechanics gateway under this subcluster.
    - SG-SPEC-0029 provides concrete mechanics ownership and is delegated from SG-SPEC-0043.
  cluster_boundaries:
  - SG-SPEC-0032 does not redefine SG-SPEC-0043/SG-SPEC-0029 mechanics semantics.
  - SG-SPEC-0032 does not define continuation-selection rules, viewer behavior, or queue ranking formulas.
  parent_contract:
  - SG-SPEC-0027 must consume SG-SPEC-0032 as a single bounded proposal/split mechanics gateway dependency.
  - SG-SPEC-0032 may not expose SG-SPEC-0029 directly to SG-SPEC-0026 while SG-SPEC-0043 is present.
  - SG-SPEC-0032 must keep the proposal/split mechanics subcluster inspectable and bounded to gateway-level
    integration constraints.

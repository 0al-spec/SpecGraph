specification:
  objective: Define proposal/split mechanics readiness as one coherent capability region inside reflective
    execution, so higher-level continuation logic can reason about availability without inspecting concrete
    split payloads, queue formulas, or proposal-lane runtime details.
  scope:
    in:
    - Proposal/split mechanics readiness as a runtime capability region
    - Coarse readiness query exposed to reflective execution
    - Review boundary between execution readiness and concrete split lifecycle mechanics
    - Continuation-selection insulation from proposal/split mechanics detail
    - Topology-prose discipline for this branch
    - Coordination of delegated readiness verdict semantics and reviewer meaning in SG-SPEC-0058
    out:
    - Field-level split artifact schemas owned by downstream mechanics contracts
    - Continuation-selection policy
    - Queue ranking formulas, viewer layout, and runtime orchestration
  readiness_region:
  - Proposal/split mechanics readiness is the coarse runtime condition that proposal/split behavior can
    be considered available for reflective execution.
  - This node keeps that readiness concept readable as a capability region rather than as a chain of graph
    edges.
  child_governance_map:
  - child_spec: SG-SPEC-0058
    concern: Proposal/split readiness verdict semantics and reviewer meaning
    parent_summary:
    - SG-SPEC-0032 keeps the coarse proposal/split readiness region exposed to reflective execution.
    - SG-SPEC-0058 owns the detailed meanings of satisfied, not_available, and unresolved readiness verdicts,
      plus the reviewer evidence expected for those verdicts.
    detailed_governance_owned_by_child:
    - readiness verdict semantics for the proposal/split readiness region
    - reviewer meaning for satisfied, not_available, and unresolved outcomes
    - evidence expectations that keep verdicts reviewable without split payload, queue, runtime, or topology
      inspection
  execution_meaning:
  - Reflective execution can treat proposal/split readiness as satisfied only when the downstream mechanics
    boundary can answer the availability question without exposing split payload internals.
  - This node does not decide which continuation candidate wins and does not rank proposal-lane work.
  readiness_query:
  - Is proposal/split mechanics available as a reviewable capability for the current reflective execution
    context?
  - If the answer cannot be determined without split payload or queue internals, this node remains too
    leaky and should be refined around readiness meaning rather than topology.
  continuation_boundary:
  - Continuation selection may consume the result of proposal/split readiness indirectly through reflective
    execution readiness.
  - Continuation selection must not inspect concrete proposal/split lifecycle fields to choose the next
    target.
  topology_prose_policy:
  - Direct edge, child, and delegation facts for this branch are represented by canonical graph metadata.
  - This node's prose should explain readiness, review meaning, and insulation boundaries rather than
    restating which spec ID routes to which other spec ID.
  cluster_boundaries:
  - This node does not redefine downstream mechanics semantics.
  - This node does not define continuation-selection rules, viewer behavior, queue ranking formulas, or
    runtime orchestration.
  role_boundary:
  - This node owns only the coarse proposal/split readiness region exposed to reflective execution.
  - This node does not own concrete mechanics semantics, split payload schemas, continuation-selection
    policy, viewer behavior, queue ranking, or runtime orchestration.
  - Graph placement is represented by metadata edges; prose should describe readiness semantics rather
    than restating provider routes.
  parent_contract:
  - The reflective execution-readiness layer consumes this node as the proposal/split readiness region.
  - This node keeps continuation selection separate from concrete proposal/split mechanics detail.
  - Readiness verdict semantics and reviewer meaning are delegated to SG-SPEC-0058 so this node can remain
    the coarse readiness region.
  - This node should be rewritten or merged rather than split again if the proposed child would only verbalize
    graph topology.

prompt: Define the parent-facing prerequisite contract inside SG-SPEC-0028 so proposal/split readiness
  is consumed through one bounded gateway, while non-bypass and retrospective direct-update separation
  rules remain explicit.
specification:
  objective: Define the bounded prerequisite contract that governs how parents consume SG-SPEC-0028 for
    proposal/split readiness.
  scope:
    in:
    - Parent-facing prerequisite contract for proposal/split mechanics readiness.
    - Non-bypass constraint for consumers of SG-SPEC-0028 in this concern.
    - Separation between proposal/split readiness and SG-SPEC-0005 retrospective direct-update boundaries.
    out:
    - Split payload schema and proposal queue field-level contracts.
    - Proposal-lane state transitions, authority transitions, and execution semantics.
    - Runtime orchestration, ranking formulas, or implementation storage layout.
  prerequisite_contract:
  - SG-SPEC-0027 may depend_on SG-SPEC-0028 as one bounded prerequisite for proposal/split readiness.
  - SG-SPEC-0028 is consumed only as a concern-level gateway in this context.
  - Concrete proposal-lane and split mechanics remain owned by SG-SPEC-0006 and SG-SPEC-0025 respectively.
  - For proposal/split readiness, SG-SPEC-0028 is the single prerequisite edge used by parent specs.
  gateway_rule:
  - Parents evaluating proposal/split readiness must model exactly one bounded prerequisite path by depending
    on SG-SPEC-0028 for that concern.
  - Parents must not create additional direct depends_on entries to SG-SPEC-0004, SG-SPEC-0006, or SG-SPEC-0025
    for the same proposal/split readiness concern.
  consumer_rules:
  - While SG-SPEC-0028 exists, consumers that require proposal/split readiness must not directly depend_on
    SG-SPEC-0006, SG-SPEC-0025, or SG-SPEC-0004 for that same concern.
  - SG-SPEC-0004 remains nested under SG-SPEC-0025 and is not a direct proposal/split readiness prerequisite.
  - SG-SPEC-0028 readiness is evaluated via this contract node, not via direct descendant readiness checks.
  boundary_separation:
  - SG-SPEC-0005 remains independently consumed for retrospective direct-update boundary semantics.
  - SG-SPEC-0027 must not treat SG-SPEC-0028 as a proxy for SG-SPEC-0005.
  - SG-SPEC-0005 is out of scope for this prerequisite contract.

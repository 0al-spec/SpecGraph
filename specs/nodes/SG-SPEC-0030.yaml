prompt: Define the parent-facing prerequisite contract for SG-SPEC-0028 in domain-first terms. The spec
  should say when proposal/split readiness is admissible for consumers, what semantic bypasses invalidate
  it, and why SG-SPEC-0005 direct-update semantics remain separate.
specification:
  objective: Define the parent-facing prerequisite contract that governs when consumers may treat SG-SPEC-0028
    as admissible proposal/split mechanics readiness without bypassing proposal-lane execution, split
    mechanics, or direct-update separation.
  scope:
    in:
    - Parent-facing prerequisite contract for proposal/split mechanics readiness.
    - Semantic non-bypass conditions for consumers of SG-SPEC-0028.
    - Required readiness meanings for proposal-lane execution, split mechanics, and direct-update separation.
    - Separation between proposal/split readiness and SG-SPEC-0005 retrospective direct-update boundaries.
    - Topology-prose discipline for prerequisite contracts.
    out:
    - Split payload schema and proposal queue field-level contracts.
    - Proposal-lane state transitions, authority transitions, and execution semantics.
    - Runtime orchestration, ranking formulas, or implementation storage layout.
    - Direct edge-list narration whose only purpose is to restate graph metadata.
  terminology:
    prerequisite_contract: The consumer-facing rule that says when SG-SPEC-0028 may be treated as admissible
      proposal/split readiness.
    semantic_bypass: A shortcut that makes proposal/split readiness appear satisfied while proposal-lane
      execution, split mechanics, or direct-update separation is not reviewable.
    readiness_meaning: A required system meaning that must remain inspectable for readiness to be trusted.
  prerequisite_contract:
  - A parent may treat SG-SPEC-0028 as proposal/split readiness only when the required readiness meanings
    remain reviewable.
  - This contract answers whether SG-SPEC-0028 is admissible as a capability-level readiness input; it
    does not define concrete proposal-lane execution or split payload behavior.
  required_readiness_meanings:
    proposal_lane_execution:
    - SG-SPEC-0006 must remain reviewable as the owner of proposal-lane execution semantics.
    split_mechanics:
    - SG-SPEC-0025 must remain reviewable as the owner of split mechanics and payload semantics.
    split_lifecycle_anchor:
    - SG-SPEC-0004 remains the deterministic split lifecycle anchor cited through split mechanics.
    direct_update_separation:
    - SG-SPEC-0005 direct-update boundary semantics remain separate from proposal/split mechanics readiness.
  inadmissible_bypass_conditions:
  - Readiness is inadmissible if a consumer treats proposal/split mechanics as ready while proposal-lane
    execution ownership is missing, unreviewed, or ambiguous.
  - Readiness is inadmissible if a consumer treats proposal/split mechanics as ready while split mechanics
    ownership is missing, unreviewed, or ambiguous.
  - Readiness is inadmissible if proposal/split readiness is used as a proxy for SG-SPEC-0005 direct-update
    semantics.
  consumer_guidance:
  - Consumers should cite SG-SPEC-0028 for the capability-level proposal/split readiness question.
  - Consumers that need field-level split or proposal-lane details should inspect SG-SPEC-0025 or SG-SPEC-0006
    as concrete owners rather than duplicating those contracts in parent prose.
  - Consumer prose should explain required readiness meanings instead of narrating edge order.
  boundary_separation:
  - SG-SPEC-0005 remains independently consumed for retrospective direct-update boundary semantics.
  - SG-SPEC-0027 must not treat SG-SPEC-0028 as a proxy for SG-SPEC-0005.
  - SG-SPEC-0005 is out of scope for this prerequisite contract.
  topology_prose_policy:
  - Direct graph relations around this prerequisite contract are represented by canonical metadata and
    derived graph views.
  - This node should explain readiness consumption and semantic bypass, not route narration, direct edge
    lists, or child placement.
  boundaries:
  - SG-SPEC-0030 does not own split payload schema, proposal queue semantics, proposal-lane execution
    transitions, or runtime orchestration.
  - SG-SPEC-0030 does not create direct-update authority and does not weaken SG-SPEC-0005 boundaries.
  - If a future refinement would only verbalize which neighboring spec IDs connect to this contract, prefer
    rewrite, merge, regrouping, or proposal pressure instead of a new canonical child.

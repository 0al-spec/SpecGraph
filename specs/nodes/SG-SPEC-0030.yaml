prompt: Define the parent-facing prerequisite contract for proposal/split readiness in domain-first terms.
  The spec should say when proposal/split readiness is admissible for consumers, what semantic bypasses
  invalidate it, and why direct-update semantics remain separate.
specification:
  objective: Define the parent-facing prerequisite contract that governs when consumers may treat proposal/split
    coordination as admissible mechanics readiness without bypassing proposal-lane execution, split mechanics,
    or direct-update separation.
  scope:
    in:
    - Parent-facing prerequisite contract for proposal/split mechanics readiness.
    - Semantic non-bypass conditions for consumers of proposal/split readiness.
    - Required readiness meanings for proposal-lane execution, split mechanics, and direct-update separation.
    - Separation between proposal/split readiness and retrospective direct-update boundaries.
    - Topology-prose discipline for prerequisite contracts.
    out:
    - Split payload schema and proposal queue field-level contracts.
    - Proposal-lane state transitions, authority transitions, and execution semantics.
    - Runtime orchestration, ranking formulas, or implementation storage layout.
    - Direct edge-list narration whose only purpose is to restate graph metadata.
  terminology:
    prerequisite_contract: The consumer-facing rule that says when proposal/split readiness may be treated
      as admissible mechanics readiness.
    semantic_bypass: A shortcut that makes proposal/split readiness appear satisfied while proposal-lane
      execution, split mechanics, or direct-update separation is not reviewable.
    readiness_meaning: A required system meaning that must remain inspectable for readiness to be trusted.
  prerequisite_contract:
  - A parent may treat proposal/split coordination as readiness only when the required readiness meanings
    remain reviewable.
  - This contract answers whether proposal/split readiness is admissible as a capability-level readiness
    input; it does not define concrete proposal-lane execution or split payload behavior.
  required_readiness_meanings:
    proposal_lane_execution:
    - Proposal-lane execution semantics must remain reviewable as a distinct capability.
    split_mechanics:
    - Split mechanics and payload semantics must remain reviewable as a distinct capability.
    split_lifecycle_anchor:
    - The deterministic split lifecycle anchor must remain reviewable through split mechanics.
    direct_update_separation:
    - Direct-update boundary semantics remain separate from proposal/split mechanics readiness.
  inadmissible_bypass_conditions:
  - Readiness is inadmissible if a consumer treats proposal/split mechanics as ready while proposal-lane
    execution ownership is missing, unreviewed, or ambiguous.
  - Readiness is inadmissible if a consumer treats proposal/split mechanics as ready while split mechanics
    ownership is missing, unreviewed, or ambiguous.
  - Readiness is inadmissible if proposal/split readiness is used as a proxy for direct-update semantics.
  consumer_guidance:
  - Consumers should use the coordination surface for the capability-level proposal/split readiness question.
  - Consumers that need field-level split or proposal-lane details should inspect concrete mechanics surfaces
    rather than duplicating those contracts in parent prose.
  - Consumer prose should explain required readiness meanings instead of narrating edge order.
  boundary_separation:
  - Retrospective direct-update boundary semantics remain independently consumed.
  - Consumers must not treat proposal/split readiness as a proxy for direct-update semantics.
  - Direct-update authority is out of scope for this prerequisite contract.
  topology_prose_policy:
  - Direct graph relations around this prerequisite contract are represented by canonical metadata and
    derived graph views.
  - This node should explain readiness consumption and semantic bypass, not route narration, direct edge
    lists, or child placement.
  boundaries:
  - This node does not own split payload schema, proposal queue semantics, proposal-lane execution transitions,
    or runtime orchestration.
  - This node does not create direct-update authority and does not weaken direct-update boundaries.
  - If a future refinement would only verbalize which neighboring spec IDs connect to this contract, prefer
    rewrite, merge, regrouping, or proposal pressure instead of a new canonical child.
  role_boundary:
  - This node owns only parent-facing prerequisite semantics for proposal/split readiness.
  - This node does not own proposal-lane execution, split mechanics, split lifecycle semantics, direct-update
    authority, queue ranking, storage layout, or runtime orchestration.
  - Graph placement is represented by metadata edges; prose should describe admissibility and semantic
    bypass rather than restating provider routes.

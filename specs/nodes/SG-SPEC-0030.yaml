acceptance:
- Defines the parent-facing prerequisite contract for consuming proposal/split mechanics coordination
  as readiness without inspecting concrete proposal-lane or split payload details first.
- Defines semantic non-bypass conditions where readiness is invalid if proposal-lane execution, split
  mechanics, or direct-update separation becomes unreviewable or ambiguous.
- Preserves direct-update boundary semantics as a distinct concern that is not implied by proposal/split
  readiness.
- Remains implementation-agnostic about queue ranking formulas, proposal-lane execution timing, and runtime
  orchestration.
- Applies the topology-prose rule so prerequisite prose explains readiness consumption and semantic bypass,
  not direct edge lists or route narration.

refines:
- SG-SPEC-0001
inputs:
- specs/nodes/SG-SPEC-0001.yaml
- specs/nodes/SG-SPEC-0003.yaml
outputs:
- specs/nodes/SG-SPEC-0017.yaml
allowed_paths:
- specs/nodes/SG-SPEC-0017.yaml
acceptance:
- Defines the bounded role of runtime observability entities without defining metric formulas, storage,
  instrumentation, queueing, or supervisor implementation
- Defines the first runtime observability entity seeds for ObservabilityContract, Campaign, and Attestation
- Defines how runtime observability entities relate to canonical specs, derived graph-health observations,
  and evidence without violating the canonical versus derived boundary
acceptance_evidence:
- criterion: Defines the bounded role of runtime observability entities without defining metric formulas,
    storage, instrumentation, queueing, or supervisor implementation
  evidence: 'specification.scope.in limits this child to the semantic boundary for runtime observability
    entities, and specification.scope.out excludes metric formulas, telemetry schemas, instrumentation,
    queue behavior, supervisor scheduling, storage schemas, and validator implementation. specification.boundary_policy
    and specification.evidence_boundary_policy also state that this node defines entity and evidence-claim
    semantics rather than runtime collection mechanics.

    '
- criterion: Defines the first runtime observability entity seeds for ObservabilityContract, Campaign,
    and Attestation
  evidence: 'specification.terminology defines runtime_observability_entity plus ObservabilityContract,
    Campaign, and Attestation. specification.entity_catalog then gives each seed entity a role, minimum
    semantic fields, and boundary notes that keep each entity independently understandable without prescribing
    implementation details.

    '
- criterion: Defines how runtime observability entities relate to canonical specs, derived graph-health
    observations, and evidence without violating the canonical versus derived boundary
  evidence: 'specification.canonical_vs_derived_boundary separates authored or imported observability
    entity records from raw telemetry, computed rollups, and graph-health signals. specification.relationship_policy
    defines how contracts bind to canonical graph subjects, how campaigns organize evidence collection,
    and how attestations record evidence claims. specification.evidence_boundary_policy defines contract,
    campaign, attestation, and graph-health evidence boundaries, including claim-local Attestation disposition
    semantics, while preserving SG-SPEC-0003 as the owner of derived graph-health observation and signal
    semantics.

    '
prompt: Refine SG-SPEC-0001 by defining the runtime observability entity boundary for ObservabilityContract,
  Campaign, and Attestation. Keep this child focused on ontology semantics and evidence boundaries; do
  not define metric formulas, telemetry schemas, instrumentation, storage, queueing, supervisor behavior,
  or validation implementation.
specification:
  objective: 'Define the first canonical runtime observability entity seeds that let SpecGraph connect
    executable product intent to runtime evidence while preserving the separation between authored graph
    truth and derived observations.

    '
  scope:
    in:
    - Semantic boundary for runtime observability entities
    - First entity seeds for ObservabilityContract, Campaign, and Attestation
    - Minimum semantic contracts that make each entity traceable to canonical graph subjects
    - Relationship between runtime observability entities and derived graph-health observations
    - Canonical versus derived evidence boundary for runtime observation claims
    - Semantic evidence boundary for contract obligations, campaign context, and attestation claims
    - Claim-local outcome semantics for Attestation evidence claims
    out:
    - Metric formulas, scoring systems, thresholds, or quantitative observability catalogs
    - Telemetry schemas, instrumentation APIs, logging formats, trace formats, or storage layouts
    - Queue behavior, scheduler behavior, supervisor implementation, or validator implementation
    - Viewer UX, dashboards, alerting policy, or operational incident response
    - Runtime execution of campaigns or automated promotion of lifecycle status
    - Evidence adjudication algorithms, trust scoring, review workflows, or validation procedures
  terminology:
    runtime_observability_entity: 'A canonical graph entity that describes what runtime evidence must
      be collected, how an observation effort is bounded, or what evidence claim was produced, without
      making raw telemetry or derived metrics canonical by default.

      '
    ObservabilityContract: 'A governed declaration that a canonical graph subject has a runtime-observable
      obligation, including the semantic evidence expected and the graph subject it supports.

      '
    Campaign: 'A bounded observation effort or evidence-collection context that groups one or more ObservabilityContracts
      over a declared purpose, scope, and time or release boundary.

      '
    Attestation: 'An authority-tagged evidence claim that a Campaign or external evidence source observed
      a result relevant to an ObservabilityContract.

      '
    graph_subject: 'A canonical node or acceptance surface, such as a spec, requirement, invariant, code_surface,
      test, or release, that a runtime observability entity traces back to by stable identity.

      '
    evidence_claim: 'A bounded assertion that a named authority observed a runtime-relevant result for
      a referenced ObservabilityContract, with provenance sufficient to distinguish the assertion from
      raw telemetry and from derived graph-health signals.

      '
    claim_disposition: 'The claim-local posture an Attestation records relative to one ObservabilityContract,
      such as support, contradiction, partial support, inconclusive evidence, stale evidence, or superseded
      evidence, without deciding lifecycle status, release readiness, or governance effect.

      '
    observation_context: 'The declared semantic boundary for an evidence-collection effort, such as a
      release, environment class, time window, validation occasion, or imported source scope, without
      prescribing execution mechanics.

      '
  boundary_policy:
  - Runtime observability entities are ontology-level concepts for evidence traceability, not metric implementations.
  - This child does not add these entities to the SG-SPEC-0001 seed node_kinds list; it establishes the
    bounded semantic contract that later refinement can turn into concrete node-kind field contracts.
  - Raw telemetry, logs, traces, sampled events, and computed rollups remain derived or imported operational
    data unless distilled into a governed Attestation with explicit authority and provenance.
  - SG-SPEC-0003 remains the owner of graph-health observation, signal, and proposal-loop semantics; this
    node only defines runtime observability entities that may provide evidence inputs.
  entity_catalog:
  - entity: ObservabilityContract
    role: Defines the runtime evidence obligation for a graph_subject.
    minimum_semantic_fields:
    - stable identity
    - graph_subject reference
    - observable obligation statement
    - expected evidence type or bounded evidence description
    - authority_class or imported evidence authority expectation
    boundary_notes:
    - The contract states what evidence would satisfy runtime observability at a semantic level.
    - The contract does not prescribe probes, telemetry transport, sampling, storage, thresholds, or alerting.
    - The contract must keep the obligation tied to the referenced graph_subject rather than making a
      broad operational health assertion.
  - entity: Campaign
    role: Groups evidence-collection activity for one or more ObservabilityContracts.
    minimum_semantic_fields:
    - stable identity
    - purpose
    - covered ObservabilityContracts
    - bounded context such as release, environment class, time window, or validation occasion
    - expected attestation outputs
    boundary_notes:
    - A Campaign organizes observation context but is not itself proof that a contract was satisfied.
    - Campaign execution mechanics and scheduling remain out of scope.
    - A Campaign boundary may limit where evidence may come from, but it does not define collection infrastructure
      or queue behavior.
  - entity: Attestation
    role: Records an authority-tagged claim about observed runtime evidence.
    minimum_semantic_fields:
    - stable identity
    - referenced ObservabilityContract
    - source Campaign or imported evidence source
    - observed claim
    - authority_class and provenance
    - claim_disposition or bounded outcome statement
    boundary_notes:
    - An Attestation may support review, release, or impact analysis, but it does not automatically promote
      any node lifecycle status.
    - An Attestation is distinct from raw telemetry and from derived graph-health signals.
    - An Attestation may cite runtime artifacts as provenance, but it records a bounded evidence_claim
      rather than embedding raw operational data.
  relationship_policy:
  - Each ObservabilityContract must trace to at least one graph_subject by stable identity.
  - A Campaign may cover one or more ObservabilityContracts when they share a bounded evidence-collection
    context.
  - An Attestation must reference the ObservabilityContract it supports and either the Campaign that produced
    it or the imported evidence source from which it was derived.
  - An Attestation is scoped to one referenced ObservabilityContract and one origin context (Campaign
    or imported evidence source); evidence across multiple contracts is represented by separate Attestations.
  - Runtime observability entities may relate_to SG-SPEC-0003 graph-health semantics, but they do not
    replace graph_health_observation, graph_health_signal, or governance_proposal concepts.
  - Later specs may decide whether existing edge kinds are sufficient for concrete runtime observability
    nodes or whether a separate reviewed ontology change is needed.
  evidence_boundary_policy:
    contract_boundary:
    - An ObservabilityContract declares the semantic obligation and acceptable evidence class for a graph_subject;
      it does not decide collection mechanics, metric formulas, thresholds, or adjudication procedures.
    - An ObservabilityContract must be narrow enough that an Attestation can make a bounded claim about
      the obligation without asserting broad product or system health.
    - An ObservabilityContract may state expected authority_class or evidence-source expectations, but
      it must not define trust scoring or validation algorithms.
    campaign_boundary:
    - A Campaign declares observation_context for a bounded evidence-collection effort and may name expected
      Attestation outputs.
    - A Campaign may constrain release, environment class, time, validation occasion, or imported source
      scope; it must not prescribe scheduler behavior, queues, storage, instrumentation, or runtime supervision.
    - A Campaign provides context for evidence claims, but contract satisfaction claims must be carried
      by Attestations rather than by the Campaign itself.
    attestation_boundary:
    - An Attestation records one bounded evidence_claim for a referenced ObservabilityContract and identifies
      the Campaign or imported evidence source that produced or supplied it.
    - An Attestation must preserve authority_class and provenance so readers can distinguish authored,
      imported, inferred, and distilled claims from raw runtime data.
    - An Attestation may summarize or distill runtime data, but raw telemetry, logs, traces, sampled events,
      and metric rollups remain outside canonical SpecGraph truth.
    - An Attestation claim_disposition applies only to the referenced ObservabilityContract and declared
      observation_context; it must not be reused as a verdict on release readiness, product health, or
      graph_subject lifecycle status.
    - Conflicting, partial, stale, or negative Attestations are still evidence claims; their governance
      effect belongs to later review or validation policy rather than this ontology boundary.
    graph_health_boundary:
    - SG-SPEC-0003 graph_health_observation and graph_health_signal records may use runtime observability
      entities as inputs, but those derived records remain rebuildable operational artifacts.
    - A derived graph-health signal that references an Attestation does not become canonical truth merely
      because the Attestation is canonical.
  canonical_vs_derived_boundary:
    canonical:
    - Authored ObservabilityContracts
    - Authored Campaign definitions or imported Campaign records with provenance
    - Attestations that are explicitly authored, imported, inferred, or distilled with authority_class
      and provenance
    derived:
    - Raw telemetry, logs, traces, events, and operational sampling streams
    - Metric rollups, dashboards, alerts, and quantitative scores
    - Graph-health observations and signals derived from canonical graph state or run artifacts
    - Temporary execution state from runtime observation tooling
  invariants:
  - id: ROE-001
    statement: Every ObservabilityContract must identify the graph_subject whose runtime evidence obligation
      it describes.
  - id: ROE-002
    statement: A Campaign cannot stand in for evidence satisfaction; satisfaction must be represented
      by at least one Attestation that references the Campaign or an imported evidence source.
  - id: ROE-003
    statement: Raw runtime data is not canonical SpecGraph truth unless represented through a governed
      entity with provenance and authority_class.
  - id: ROE-004
    statement: An Attestation must carry a bounded evidence_claim and must not embed raw telemetry as
      canonical graph truth.
  - id: ROE-005
    statement: An Attestation claim_disposition is claim-local and cannot by itself decide release readiness,
      product health, graph_subject validity, or lifecycle promotion.
  - id: ROE-006
    statement: An Attestation must be scoped to one ObservabilityContract and one producing origin context
      (Campaign or imported evidence source); cross-contract evidence requires separate Attestations per
      target contract.
  decisions:
  - id: ROE-D1
    statement: Runtime observability entities are evidence semantics, not metric definitions.
    rationale: 'SpecGraph needs stable entities that connect runtime evidence back to intent and specifications,
      but metric catalogs, formulas, and thresholds are separable and should remain future refinements.

      '
  - id: ROE-D2
    statement: Attestation separates an evidence claim from raw telemetry and derived graph-health signals.
    rationale: 'The graph can preserve traceable evidence claims without making raw operational streams
      canonical or collapsing runtime evidence into SG-SPEC-0003 diagnostic signals.

      '
  - id: ROE-D3
    statement: Campaign provides observation context, not proof of contract satisfaction.
    rationale: 'SpecGraph needs a way to group runtime evidence efforts without letting the existence
      of a campaign imply that any ObservabilityContract has been satisfied. Satisfaction evidence belongs
      in bounded Attestations with authority and provenance.

      '

    also states that this node defines entity semantics rather than runtime collection mechanics.

    '
- criterion: 'Defines the first runtime observability entity seeds: ObservabilityContract, Campaign, and
    Attestation'
  evidence: 'specification.terminology defines runtime_observability_entity plus ObservabilityContract,

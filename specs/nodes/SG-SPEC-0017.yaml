id: SG-SPEC-0017
title: SpecGraph - Runtime Observability Entity Boundary
kind: spec
status: linked
maturity: 0.46
depends_on: []
relates_to:
- SG-SPEC-0003
refines:
- SG-SPEC-0001
inputs:
- specs/nodes/SG-SPEC-0001.yaml
- specs/nodes/SG-SPEC-0003.yaml
outputs:
- specs/nodes/SG-SPEC-0017.yaml
allowed_paths:
- specs/nodes/SG-SPEC-0017.yaml
acceptance:
- Defines the bounded role of runtime observability entities without defining metric formulas, storage,
  instrumentation, queueing, or supervisor implementation
- Defines the first runtime observability entity seeds: ObservabilityContract, Campaign, and Attestation
- Defines how runtime observability entities relate to canonical specs, derived graph-health observations,
  and evidence without violating the canonical versus derived boundary

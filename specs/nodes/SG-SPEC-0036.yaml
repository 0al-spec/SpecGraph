specification:
  objective: Define the bounded derived contract for active_item_precedence in proposal/refactor queue
    control artifacts so the parent can treat this ranking signal as noncanonical and advisory.
  scope:
    in:
    - Active-item precedence contract for queue-control artifacts in proposal_queue and refactor_queue
    - Advisory semantics for derived queue interpretation by rank-preference signal
    - Parent integration contract with SG-SPEC-0034
    - Noncanonical first-persistence boundaries for this control signal
    - Retry-condition exclusion delegated to SG-SPEC-0035
    out:
    - Retry-condition semantics owned by SG-SPEC-0035
    - Concrete queue scheduler implementation, formulas, or backlog balancing policy
    - Canonical ontology or authority transitions
    - Proposal/review/apply engine internals and direct writeback decisions
  active_item_precedence_contract:
  - SG-SPEC-0036 defines `active_item_precedence` as a derived control signal for queue items in proposal/refactor
    lane artifacts.
  - The signal is advisory and signals which queue item is currently preferred within derived processing
    context.
  active_item_precedence_value_contract:
  - 'Producers in derived artifacts MUST emit `active_item_precedence` only in these bounded forms: omitted
    (missing), boolean, or integer.'
  - Missing or boolean `false` means `neutral` preference.
  - Boolean `true` is normalized to integer `1` and means `preferred`.
  - Integer `active_item_precedence` values are treated as comparable ranking hints within the same artifact
    scope; larger values indicate stronger preference.
  - No arithmetic transformation, formula, or scheduling policy may be encoded by this spec for these
    values.
  control_semantics:
  - active_item_precedence is non-authoritative by design; it may bias derived processing but cannot authorize
    direct canonical writeback or authority expansion.
  - Active-item precedence semantics are consumed by SG-SPEC-0034 and remain distinct from retry-condition
    semantics owned by SG-SPEC-0035.
  - Conflicting active-item precedence signals are outside this spec’s scope and remain the domain of
    broader queue processing policy in consuming parents.
  noncanonical_boundary:
  - SG-SPEC-0036 artifacts are first-persistence queue-control metadata and become active in derived processing
    artifacts only.
  - This contract does not authorize proposals, reviews, approvals, or direct writeback on its own.
  parent_contract:
  - SG-SPEC-0041 consumes SG-SPEC-0036 as the bounded child contract for active_item_precedence.
  - SG-SPEC-0034 remains responsible only for parent-facing queue-control integration and preserves the
    implementation-agnostic boundary with existing queue execution policy.
  - SG-SPEC-0035 remains authoritative for retry-condition semantics and is out of this child’s scope.

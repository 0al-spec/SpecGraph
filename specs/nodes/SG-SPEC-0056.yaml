specification:
  objective: Define a bounded consumer-chain constraint spec for non-retry queue-control metadata so SG-SPEC-0003
    consumes dedupe_key, preempt_direct_update, and proposal_direct_handoff only through the bounded path
    of SG-SPEC-0034 and SG-SPEC-0039.
  scope:
    in:
    - Bounded consumer-path and hop constraints for proposal_queue/refactor_queue non-retry queue-control
      metadata fields.
    - Explicit prohibition of direct SG-SPEC-0003 consumer contracts from SG-SPEC-0037, SG-SPEC-0038,
      and SG-SPEC-0040.
    - Alignment of SG-SPEC-0056 with SG-SPEC-0040's first-persistence framing without defining its semantics.
    out:
    - Concrete non-retry routing semantics for preempt_direct_update or proposal_direct_handoff.
    - Artifact surface-key path definitions.
    - Retry-condition and active-item precedence semantics.
    - Canonical authority transitions or writeback policy.
  consumer_chain:
    path_anchor:
    - SG-SPEC-0003 <- SG-SPEC-0034 <- SG-SPEC-0039 <- SG-SPEC-0056
    field_set:
    - dedupe_key
    - preempt_direct_update
    - proposal_direct_handoff
    artifact_scope:
    - proposal_queue
    - refactor_queue
    consumer_rule:
    - SG-SPEC-0003 may consume these fields only via SG-SPEC-0034.
    - SG-SPEC-0003 MUST NOT consume these fields directly from SG-SPEC-0037, SG-SPEC-0038, or SG-SPEC-0040.
    - SG-SPEC-0037 and SG-SPEC-0038 MUST NOT publish a direct consumer contract for SG-SPEC-0003 for these
      fields.
  parent_integration:
  - SG-SPEC-0039 consumes this node as the dedicated consumer-chain constraint boundary.
  - SG-SPEC-0003 receives non-retry queue-control fields only through SG-SPEC-0034 and its bounded intermediary
    chain via SG-SPEC-0039/SG-SPEC-0056.
  - SG-SPEC-0056 remains noncanonical and advisory; concrete routing or governance logic remains with
    SG-SPEC-0037, SG-SPEC-0038, and SG-SPEC-0040 as delegated children in the broader chain.
  - SG-SPEC-0040 contributes first-persistence framing inputs to this consumer-chain constraint slice.
  noncanonical_boundary:
  - SG-SPEC-0056 governs only consumer-chain constraints and does not authorize any direct proposal writeback
    or authority transitions.

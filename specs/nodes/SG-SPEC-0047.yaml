specification:
  objective: Materialize one bounded downstream gateway segment so SG-SPEC-0045 can keep proposal/split
    parent-integration grouped while SG-SPEC-0048 owns the direct edge slice.
  scope:
    in:
    - Gateway-segment topology for SG-SPEC-0027 proposal/split readiness from SG-SPEC-0032 into SG-SPEC-0043.
    - Delegated non-bypass readiness edge policy for SG-SPEC-0027 while SG-SPEC-0043 remains present.
    - Conformance boundary to keep SG-SPEC-0047 topology-only and bounded.
    out:
    - Concrete mechanics schema and lifecycle details owned by SG-SPEC-0029.
    - Ranking formulas, continuation policy, and runtime orchestration.
    - Queue fairness and scoring policy ownership.
  gateway_segment:
  - SG-SPEC-0027 readiness for this subtree is constrained through SG-SPEC-0032.
  - SG-SPEC-0032 readiness for this subtree is constrained through SG-SPEC-0043.
  - SG-SPEC-0043 delegates concrete readiness details to SG-SPEC-0029.
  - SG-SPEC-0048 owns the direct SG-SPEC-0032 -> SG-SPEC-0043 edge contract for this segment and no other
    sibling node may redefine this edge contract here.
  - While SG-SPEC-0043 exists, SG-SPEC-0027 cannot reach SG-SPEC-0029 for proposal/split readiness by
    any shorter path than SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043 -> SG-SPEC-0029.
  gateway_topology:
  - SG-SPEC-0027 depends on SG-SPEC-0032 as the proposal/split mechanics child in this segment.
  - SG-SPEC-0032 depends on SG-SPEC-0043 as the direct gateway in this segment as contractually defined
    by SG-SPEC-0048.
  - SG-SPEC-0043 depends on SG-SPEC-0029 for concrete mechanics/inspection artifacts.
  no_bypass_rules:
  - SG-SPEC-0027 must not depend_on SG-SPEC-0029 directly for proposal/split readiness while SG-SPEC-0043
    exists.
  - SG-SPEC-0027 readiness edges to SG-SPEC-0029 must be exactly SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043
    -> SG-SPEC-0029 while SG-SPEC-0043 exists.
  parent_contract:
  - SG-SPEC-0045 must consume SG-SPEC-0047 as the bounded downstream gateway segment for SG-SPEC-0027
    readiness.
  - SG-SPEC-0047 consumes SG-SPEC-0048 as the sole source of the direct SG-SPEC-0032 -> SG-SPEC-0043 gateway-edge
    contract.
  - SG-SPEC-0029 owns concrete readiness mechanics and payload details under this segment.
  segment_boundaries:
  - SG-SPEC-0047 does not redefine concrete SG-SPEC-0029 mechanics, ranking policy, continuation policy,
    or runtime orchestration.
  - SG-SPEC-0047 only constrains the gateway-segment edges and non-bypass rule for this path.

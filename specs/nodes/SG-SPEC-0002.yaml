acceptance_evidence:
- criterion: Remains implementation-agnostic and limited to specification governance
  evidence: 'specification.scope.out excludes storage schemas, validator implementation, supervisor workflow,
    and runtime generation semantics. The parent records `depends_on: [SG-SPEC-0014, SG-SPEC-0015, SG-SPEC-0016]`
    while the concrete descendants `specs/nodes/SG-SPEC-0014.yaml`, `specs/nodes/SG-SPEC-0015.yaml`, and
    `specs/nodes/SG-SPEC-0016.yaml` each declare `refines: [SG-SPEC-0002]`. Those children bound detailed
    governance for edge semantics and blocking, delegation and atomic decomposition, and linked-readiness
    evidence, so this node now carries parent-side linked_readiness_evidence without adding implementation
    scope.

    '
prompt: Keep SG-SPEC-0002 as the overview and integration policy for spec-to-spec refinement and linkage.
  The parent should preserve stable terminology, define the coordination envelope, and depend on bounded
  child specs for detailed governance of edge semantics, delegation/decomposition, and linked-readiness
  evidence.
specification:
  objective: 'Define how seed specs delegate unresolved areas to child specs, how parent/child spec edges
    are expressed, and what evidence is required for a spec to reach linked without prescribing tooling
    or storage.

    '
  scope:
    in:
    - Spec-to-spec use of refines, depends_on, and relates_to
    - Distinction between authored blocking declarations and derived effective blocking views
    - Delegation of one or more concrete unresolved areas from a parent spec to child specs
    - Atomic spec-node boundaries and decomposition policy
    - Linked-status completion rules for spec nodes
    - Ancestor reconciliation after descendant semantic unlock
    - Acceptance and acceptance_evidence expectations across refinement chains
    out:
    - Non-spec node refinement rules
    - Storage schemas, file layouts, or database design
    - Validator implementation or supervisor workflow
    - Runtime code generation or test execution semantics
  terminology:
    refinement_chain: 'An explicit parent/child path in which a child spec lists refines: [parent] and
      the parent lists depends_on: [child] when the child blocks the parent''s advancement.

      '
    delegated_gap: 'A concrete unresolved area intentionally left open in a seed spec and assigned to
      exactly one child spec for elaboration in a given refinement step.

      '
    atomic_spec_node: 'A working spec node that captures one bounded concern or refinement question, so
      that its acceptance criteria, blockers, and lifecycle advance together without hiding unrelated
      work inside the same envelope.

      '
    decomposition_pass: 'A refinement run that narrows an oversized spec by emitting one or more sibling
      child specs and reducing the parent back to a stable coordinating envelope.

      '
    linked_spec: 'A spec whose required dependency and refinement edges are present and whose declared
      refinement responsibilities are connected to concrete descendant specs.

      '
    declared_blocking_edge: 'An authored canonical dependency expressed with depends_on. It records that
      the source spec may not advance until the target refinement dependency is satisfied.

      '
    effective_blocking: 'A derived view computed from canonical graph state. It may include transitive
      blockers, queue readiness, or other operational projections, but it does not create new canonical
      edge facts.

      '
    semantic_unlock: 'A state in which a spec''s declared blocking descendants now exist in the graph
      with an explicit refinement chain, making the ancestor eligible for status advancement work even
      if downstream implementation or review work is incomplete.

      '
    ancestor_reconciliation: 'A narrow follow-up pass on an ancestor spec after semantic_unlock. It aligns
      links, blockers, acceptance_evidence, and status-readiness with the newly available descendant structure
      without reopening unrelated scope.

      '
    linked_readiness_evidence: 'A reconciled parent-side evidence update that cites the specific concrete
      descendant specs satisfying each declared blocking refinement dependency, so semantic_unlock can
      be promoted into linked status-readiness.

      '
  relation_policy:
  - relation: refines
    source: child spec
    target: ancestor spec
    required_when: The child narrows or elaborates a specific unresolved area owned by the ancestor.
    notes:
    - A child spec MUST list every ancestor spec it directly elaborates.
    - refines expresses semantic inheritance of terminology and problem framing, not execution order.
  - relation: depends_on
    source: parent spec
    target: child spec
    required_when: Completion of the child is required before the parent can advance beyond its current
      unresolved area.
    notes:
    - depends_on is the canonical authored declaration of a blocking refinement edge.
    - A parent MAY depend_on multiple children, but each child SHOULD own a distinct unresolved area.
    - Tooling MAY derive additional effective blocking views from depends_on closure, but those derived
      views MUST NOT replace the authored dependency edge in canonical data.
  - relation: relates_to
    source: any spec
    target: any spec
    required_when: The specs are relevant to each other but neither semantic refinement nor advancement
      blocking applies.
    notes:
    - relates_to MUST NOT replace refines or depends_on when those stronger relations are true.
  blocking_semantics:
    canonical_graph:
    - The graph stores only authored blocking intent via depends_on.
    - Canonical blocking facts are local declarations, not transitive expansions.
    - A missing depends_on means the parent is not canonically blocked by that child, even if the two
      specs are otherwise connected through refines or relates_to.
    derived_views:
    - Tooling may compute effective_blocking from declared_blocking_edge closure plus current node states.
    - Derived effective_blocking may be used for queue ordering, viewer overlays, diagnostics, and "what
      still blocks this spec?" queries.
    - Derived effective_blocking is rebuildable operational metadata and MUST NOT be written back as a
      substitute for canonical depends_on facts.
  delegation_policy:
    seed_spec_expectations:
    - A seed spec may remain intentionally incomplete in narrowly bounded areas.
    - Each child created from a seed spec SHOULD name one concrete unresolved area and keep its scope
      narrower than the parent.
    - Child specs MUST preserve stable IDs and inherited terminology from the parent unless the child
      explicitly defines a compatible narrowing.
    parent_expectations:
    - The parent spec records blocking child specs in depends_on.
    - The parent remains authoritative for the stable core and delegates only the unresolved slice.
    - Parent acceptance_evidence for seed refinement SHOULD cite concrete descendant specs once they exist.
    child_expectations:
    - The child spec lists refines pointing at the parent it elaborates.
    - The child defines its own acceptance, acceptance_evidence, outputs, and allowed_paths.
    - The child MUST NOT widen scope into unrelated ontology areas.
  atomicity_policy:
    working_node_expectations:
    - Non-seed working specs SHOULD remain atomic_spec_nodes that answer one bounded refinement question.
    - A spec MAY act as a broad coordinating envelope only when it is explicitly seed-like or overview-like
      and delegates mixed concerns to child specs instead of absorbing them.
    decomposition_rules:
    - When a refinement step reveals multiple independent concerns, the agent MAY emit multiple sibling
      child specs in one decomposition_pass.
    - Each sibling created in one decomposition_pass SHOULD own a distinct bounded concern and SHOULD
      be independently reviewable on the graph.
    - The parent SHOULD shrink back to stable shared intent, terminology, and linkage once the sibling
      child specs exist.
    split_required:
    - If the current spec still mixes multiple bounded concerns after refinement, tooling SHOULD surface
      split_required rather than treating the larger node as complete.
    - split_required may preserve newly created child specs and narrowed parent edits even when the parent
      still needs another pass.
  linkage_rules:
    specified_to_linked:
    - A spec may move from specified to linked once every refinement dependency it explicitly declares
      in depends_on exists as a concrete descendant spec node.
    - For each blocking child, the descendant must explicitly refines the parent or another declared ancestor
      in the same refinement chain.
    - semantic_unlock makes linked advancement eligible, but the ancestor MUST remain specified until
      ancestor_reconciliation records linked_readiness_evidence on the parent.
    - The reconciled parent acceptance_evidence MUST cite the concrete descendant spec IDs or paths that
      satisfy each declared blocking refinement dependency.
    - linked confirms edge resolution, not downstream implementation completion or review approval.
    - Descendant completion may therefore semantically unlock multiple ancestors in the same refinement
      chain.
    non_blocking_children:
    - A parent does not need to declare depends_on for non-blocking related specs.
    - Open future work that is not yet delegated does not block linked unless the parent explicitly marks
      it as a dependency.
  reconciliation_policy:
    descendant_unlock:
    - When a descendant makes the blocking refinement chain explicit, each affected ancestor becomes eligible
      for ancestor_reconciliation.
    - Eligibility created by semantic_unlock is a derived operational fact; it does not mutate the canonical
      graph by itself.
    ancestor_reconciliation:
    - Ancestor reconciliation MUST happen one spec node at a time.
    - 'The reconciliation pass SHOULD stay narrow: update links, blockers, acceptance_evidence, prompt
      wording, and status-readiness that depend on the unlocked descendant.'
    - Ancestor reconciliation MUST NOT expand unrelated unresolved areas or silently absorb work better
      represented as a new child spec.
    - Tooling MAY prioritize the nearest semantically unlocked ancestor first and propagate the wave upward
      across the chain in later runs.
  evidence_policy:
    rules:
    - acceptance and acceptance_evidence remain 1:1 within each spec node.
    - When linked readiness depends on child refinement, parent acceptance_evidence MUST cite the child
      spec IDs or paths that satisfy each declared blocking refinement dependency.
    - Outside status advancement, parent evidence MAY still point to child spec IDs and paths as supporting
      refinement context.
    - Child evidence should cite sections inside the child spec rather than external runtime artifacts.
  examples:
  - name: Seed-to-child linkage
    description: 'SG-SPEC-0001 remains the seed ontology, SG-SPEC-0002 refines its spec-to-spec linkage
      policy, SG-SPEC-0002 lists refines: [SG-SPEC-0001], and SG-SPEC-0001 lists depends_on: [SG-SPEC-0002].
      This makes the refinement chain explicit and allows SG-SPEC-0001 to reach linked.

      '
  - name: Unlock requires parent evidence reconciliation
    description: 'A parent spec declares depends_on on a blocking child, and that child now exists with
      an explicit refines link back into the parent''s refinement chain. The parent is semantically unlocked,
      but it remains specified until ancestor_reconciliation updates the parent acceptance_evidence to
      cite that child as the concrete refinement that resolved the delegated gap.

      '

    linked-readiness decision procedures, and implementation concerns. specification.terminology preserves
    the shared parent vocabulary used across the refinement chain without reintroducing child-level runtime
    or tooling scope.

    '
- criterion: Defines the coordination envelope that assigns detailed governance of edge semantics, delegation/decomposition,
    and linked-readiness evidence to bounded child specs SG-SPEC-0014, SG-SPEC-0015, and SG-SPEC-0016
  evidence: 'specification.coordination_envelope.parent_role defines the narrow parent responsibility
    surface, and specification.child_governance_map assigns detailed governance ownership to SG-SPEC-0014,
    SG-SPEC-0015, and SG-SPEC-0016. The top-level depends_on list cites those same children, matching
    the bounded ownership map that keeps detailed policy below the parent.

    '
- criterion: Defines parent-side integration rules that keep dependency declarations, descendant linkage,
    and acceptance-evidence citations aligned across the refinement chain
  evidence: 'specification.integration_rules.refinement_chain_coordination and specification.integration_rules.parent_evidence_coordination
    define how refines ancestry, parent depends_on declarations, child concern ownership, and local parent
    acceptance_evidence stay aligned. The examples then show SG-SPEC-0002 citing concrete descendants
    without collapsing child-local governance back into the parent.

    '
prompt: Keep SG-SPEC-0002 as the overview and integration policy for spec-to-spec refinement and linkage.
  The parent should preserve stable terminology, define the coordination envelope, and depend on bounded
  child specs for detailed governance of edge semantics, delegation/decomposition, and linked-readiness
  evidence.
specification:
  objective: 'Define the parent overview and integration policy for spec-to-spec refinement and linkage,
    preserving stable shared terminology and coordinating bounded child specs without reabsorbing their
    detailed governance.

    '
  scope:
    in:
    - Stable shared terminology for spec-to-spec refinement and linkage
    - Parent-side coordination of edge semantics, delegation/decomposition, and linked-readiness governance
      across bounded child specs
    - Child responsibility boundaries for SG-SPEC-0014, SG-SPEC-0015, and SG-SPEC-0016
    - Parent-side integration rules for depends_on, refines, and evidence citations across the refinement
      chain
    out:
    - Detailed relation-selection or declared-versus-derived blocking rules delegated to SG-SPEC-0014
    - Detailed delegation, atomic decomposition, sibling decomposition, or split_required rules delegated
      to SG-SPEC-0015
    - Detailed specified-to-linked readiness checks, ancestor_reconciliation steps, or evidence_alignment
      procedures delegated to SG-SPEC-0016
    - Non-spec node refinement rules
    - Storage schemas, file layouts, validator implementation, supervisor workflow, or runtime generation
      semantics
  terminology:
    refinement_chain: 'An explicit parent/child path in which descendants connect back through refines
      and blocking parent dependencies are declared through depends_on where advancement requires them.

      '
    coordination_envelope: 'The narrow parent-side policy surface that preserves shared terminology, stable
      scope boundaries, and integration expectations across child specs without duplicating their detailed
      rules.

      '
    bounded_child_spec: 'A child spec that owns one detailed governance concern beneath a coordinating
      parent and can advance, be reviewed, and be cited independently.

      '
    delegated_gap: 'A concrete unresolved area intentionally left open in a parent overview or seed spec
      and assigned to one bounded child spec for elaboration in a given refinement step.

      '
    atomic_spec_node: 'A spec node whose acceptance criteria, blockers, evidence, and review path all
      describe one bounded concern that can advance without hiding unrelated work.

      '
    semantic_unlock: 'A state in which the parent''s declared blocking descendants exist in the graph
      with an explicit refinement chain, making the parent eligible for linked-readiness reconciliation.

      '
    ancestor_reconciliation: 'A narrow parent-side follow-up pass that aligns links, acceptance_evidence,
      and status-readiness after semantic_unlock without reopening unrelated scope.

      '
    linked_readiness_evidence: 'A parent-side evidence update that cites the concrete descendant specs
      satisfying each declared blocking refinement dependency without replacing child-local acceptance
      evidence.

      '
  coordination_envelope:
    parent_role:
    - SG-SPEC-0002 preserves the stable shared framing for spec-to-spec refinement and linkage across
      this graph area.
    - SG-SPEC-0002 coordinates how its child specs fit together, but it MUST NOT carry the detailed decision
      procedures that those bounded children own.
    - SG-SPEC-0002 MAY summarize the shared relationship between refines ancestry, depends_on blocking
      intent, delegated gaps, and parent evidence only at the level needed to keep the refinement chain
      coherent.
    shared_invariants:
    - Detailed governance for a delegated concern SHOULD live in exactly one bounded_child_spec at this
      overview layer.
    - Child specs SHOULD preserve the parent terminology unless they define a compatible narrowing inside
      their own scope.
    - Parent acceptance_evidence remains local to the parent even when it cites child specs as supporting
      descendants.
    - Later refinement work SHOULD narrow the owning child concern or a descendant of that child instead
      of expanding this parent with child-level detail.
  child_governance_map:
  - child_spec: SG-SPEC-0014
    concern: Detailed edge semantics and blocking policy
    parent_summary:
    - Child ancestry in this refinement area is expressed through refines.
    - Blocking intent in this refinement area is expressed through depends_on.
    - Detailed selection and declared-versus-derived blocking rules live in the child, not in SG-SPEC-0002.
    detailed_governance_owned_by_child:
    - Relation selection for refines, depends_on, and relates_to between parent and child specs
    - declared_blocking_edge versus effective_blocking semantics
  - child_spec: SG-SPEC-0015
    concern: Delegation and atomic decomposition policy
    parent_summary:
    - SG-SPEC-0002 remains a coordinating envelope and delegates mixed detailed governance instead of
      growing in place.
    - Each blocking child under this overview SHOULD own a distinct bounded concern.
    - Detailed delegation and decomposition rules live in the child, not in SG-SPEC-0002.
    detailed_governance_owned_by_child:
    - delegated_gap decision rules
    - atomic_spec_node boundaries, sibling decomposition, and split_required semantics
  - child_spec: SG-SPEC-0016
    concern: Linked readiness and evidence policy
    parent_summary:
    - SG-SPEC-0002 may cite concrete descendants as linked_readiness_evidence when they satisfy its declared
      refinement dependencies.
    - Parent acceptance_evidence stays local even when it cites child specs as supporting descendants.
    - Detailed readiness and reconciliation procedures live in the child, not in SG-SPEC-0002.
    detailed_governance_owned_by_child:
    - specified-to-linked readiness checks
    - semantic_unlock, ancestor_reconciliation, and evidence_alignment procedures
  integration_rules:
    refinement_chain_coordination:
    - Every child that SG-SPEC-0002 depends_on MUST connect back into this parent's refinement_chain through
      explicit refines ancestry.
    - Each depended-on child SHOULD own a distinct bounded concern from the child_governance_map rather
      than overlapping another child's detailed governance.
    - If a later refinement need fits one existing child concern, the change SHOULD be made under that
      child or one of its descendants instead of broadening SG-SPEC-0002.
    - If a later refinement need is independent of the existing child_governance_map, SG-SPEC-0002 SHOULD
      stay narrow and delegate that concern to a new sibling child spec.
    parent_evidence_coordination:
    - SG-SPEC-0002 keeps one local acceptance_evidence entry per local acceptance criterion even when
      the evidence cites child specs.
    - Parent evidence MUST identify which bounded child concern is satisfied and which concrete descendant
      spec carries the detailed governance.
    - A child spec's acceptance_evidence proves the child policy; it does not replace the parent's overview-level
      evidence that the refinement chain is coordinated and linked.
  examples:
  - name: Coordinated child ownership
    description: 'SG-SPEC-0002 keeps the shared overview and depends_on SG-SPEC-0014, SG-SPEC-0015, and
      SG-SPEC-0016. Those children respectively own edge semantics, delegation/decomposition, and linked-readiness
      evidence, so the parent stays narrow while the refinement chain remains explicit.

      '
  - name: Future refinement routing
    description: 'If a later run needs a finer rule for linked-readiness evidence, that rule belongs under
      SG-SPEC-0016 or one of its descendants rather than inside SG-SPEC-0002. If a new independent governance
      concern appears, SG-SPEC-0002 stays narrow and delegates that concern to a new sibling child spec
      instead of absorbing it.

      '

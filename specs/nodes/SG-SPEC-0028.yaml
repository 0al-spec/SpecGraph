prompt: Keep SG-SPEC-0028 as the bounded proposal-and-split mechanics subcluster beneath SG-SPEC-0027.
  It should group split proposal lifecycle, proposal-lane execution semantics, and split payload mechanics
  into one inspectable subtree while preserving each descendant's bounded role; delegate the parent-facing
  prerequisite contract to SG-SPEC-0030.
specification:
  objective: Define the bounded proposal-and-split mechanics subcluster that groups proposal execution
    descendants beneath SG-SPEC-0027 without merging their distinct contracts.
  scope:
    in:
    - Proposal/split mechanics subcluster role beneath SG-SPEC-0027
    - Membership and boundary notes for SG-SPEC-0025 and SG-SPEC-0006 as direct concern-level children
    - Nested lifecycle-anchor relation from SG-SPEC-0025 to SG-SPEC-0004
    - Proposal/split prerequisite contract ownership delegated to SG-SPEC-0030
    out:
    - Concrete mechanics semantics already owned by descendant specs
    - Retrospective direct-update boundary semantics owned by SG-SPEC-0005
    - Viewer layout, queue ranking formulas, and runtime orchestration
  subcluster_role:
  - SG-SPEC-0028 is the intermediate proposal-and-split mechanics node beneath SG-SPEC-0027.
  - SG-SPEC-0028 exists to keep proposal lifecycle, proposal-lane execution, and split payload mechanics
    structurally coherent without forcing SG-SPEC-0027 to exceed its blocking-child atomicity limit.
  subcluster_members:
    split_payload_mechanics:
    - SG-SPEC-0025 owns the split proposal mechanics parent contract, including payload schema and split
      queue mechanics, inside this subcluster.
    nested_split_proposal_lifecycle:
    - SG-SPEC-0004 refines SG-SPEC-0025 as the deterministic split proposal lifecycle anchor nested beneath
      split mechanics rather than as a direct subcluster child.
    proposal_lane_execution:
    - SG-SPEC-0006 owns proposal-lane execution semantics and tracked proposal identity.
    proposal_split_prerequisite_contract:
    - SG-SPEC-0030 formalizes the bounded parent-facing prerequisite contract for consuming this subcluster.
  subcluster_topology:
  - 'SG-SPEC-0028 exposes exactly two direct mechanics-level children in this bounded cluster: SG-SPEC-0025
    and SG-SPEC-0006; SG-SPEC-0030 is the dedicated prerequisite-contract child.'
  - SG-SPEC-0004 is nested only under SG-SPEC-0025 as this subcluster's split proposal lifecycle anchor.
  subcluster_boundaries:
  - Refining through SG-SPEC-0028 does not collapse descendant node identities or their bounded concerns.
  - SG-SPEC-0028 does not redefine the mechanics contracts already owned by its descendants.
  - Cross-descendant consistency is expressed here only at the proposal/split subcluster integration level.
  - SG-SPEC-0028 delegates parent-facing prerequisite contract semantics to SG-SPEC-0030.
  - SG-SPEC-0028 provides the only concern-level prerequisite edge for proposal/split readiness for this
    topic; parents that consume this topic must not directly depend_on SG-SPEC-0006 or SG-SPEC-0025 for
    that same concern while the subcluster is present, and SG-SPEC-0004 remains nested through SG-SPEC-0025.
  parent_contract:
  - SG-SPEC-0027 may depend_on SG-SPEC-0028 as one bounded prerequisite for proposal/split mechanics readiness.
  - SG-SPEC-0027 must not depend_on SG-SPEC-0006 or SG-SPEC-0025 directly for proposal/split mechanics
    while SG-SPEC-0028 is present as the dedicated subcluster, and must not treat SG-SPEC-0004 as a direct
    proposal/split readiness prerequisite either.
  - SG-SPEC-0030 owns the parent-facing prerequisite contract so SG-SPEC-0027 may consume SG-SPEC-0028
    through this subcluster without proxying SG-SPEC-0005.
  - SG-SPEC-0027 must not read SG-SPEC-0028 as a proxy for SG-SPEC-0005; direct-update semantics remain
    a separately consumed concern and are not part of this proposal/split prerequisite contract.

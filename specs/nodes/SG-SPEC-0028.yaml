acceptance:
- Defines the proposal/split mechanics coordination surface consumed by reflective execution before concrete
  proposal-lane or split payload details are inspected.
- Keeps proposal-lane execution and split mechanics jointly reviewable as separate required capabilities
  without turning their graph placement into the main contract.
- Preserves concrete capability boundaries between proposal-lane execution, split mechanics, split lifecycle
  anchoring, and parent-facing prerequisite semantics.
- Separates proposal/split mechanics readiness from retrospective direct-update semantics.
- Remains implementation-agnostic about proposal storage layout, queue ranking formulas, and runtime orchestration.

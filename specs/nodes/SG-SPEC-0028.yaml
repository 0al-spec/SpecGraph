- Defines the weakest integration contract by which SG-SPEC-0027 may treat this subcluster as one bounded
  prerequisite while preserving retrospective direct-update boundary semantics in SG-SPEC-0005.
- Remains implementation-agnostic about proposal storage layout, queue ranking formulas, and runtime orchestration.

acceptance:
- Defines one bounded proposal-and-split mechanics subcluster beneath SG-SPEC-0027 so proposal lifecycle,
  proposal-lane execution semantics, and split payload mechanics stay jointly inspectable without forcing
  SG-SPEC-0027 to exceed its blocking-child atomicity limit.
- Defines how SG-SPEC-0025 and SG-SPEC-0006 remain individually bounded as the direct concern-level children
  of this subcluster, with SG-SPEC-0004 nested beneath SG-SPEC-0025 rather than hanging directly from
  SG-SPEC-0027.
- Delegates the bounded proposal/split prerequisite contract to SG-SPEC-0030 so SG-SPEC-0027 treats SG-SPEC-0028
  as one gateway while preserving retrospective direct-update semantics in SG-SPEC-0005.
- Remains implementation-agnostic about proposal storage layout, queue ranking formulas, and runtime orchestration.

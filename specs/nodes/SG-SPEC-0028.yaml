prompt: Keep this node as the proposal/split mechanics coordination surface for reflective execution.
  It should explain how proposal-lane execution and split mechanics stay jointly reviewable without narrating
  child placement, edge shape, route narration, or queue/runtime implementation detail.
specification:
  objective: Define the proposal/split mechanics coordination surface that lets reflective execution reason
    about proposal-lane execution and split mechanics as one coherent capability set without merging their
    concrete contracts or narrating graph topology.
  scope:
    in:
    - Proposal/split mechanics coordination for reflective execution.
    - Joint reviewability of proposal-lane execution and split mechanics.
    - Capability boundaries for proposal-lane execution, split mechanics, split lifecycle anchoring, and
      parent-facing prerequisite semantics.
    - Separation from retrospective direct-update semantics.
    - Topology-prose discipline for this mechanics region.
    out:
    - Concrete mechanics semantics owned by downstream bounded concerns.
    - Retrospective direct-update boundary semantics.
    - Viewer layout, queue ranking formulas, proposal storage layout, and runtime orchestration.
    - Prose whose main purpose is to restate edge order, child placement, or route narration.
  terminology:
    review_present_capability: A named capability whose review surface exists and can receive a distinct
      review outcome for this coordination decision.
    review_blocked_capability: A named capability whose review surface is missing, ambiguous, or currently
      blocked by an unresolved review finding, so the coordination decision cannot treat that capability
      as admissible.
  coordination_surface:
  - Reflective execution may treat proposal/split mechanics as a coherent capability set only when proposal-lane
    execution and split mechanics remain separately reviewable.
  - This node answers whether the mechanics region is coherent enough to consume as a readiness input;
    it does not expose split payload fields, queue formulas, or proposal-lane runtime details.
  readiness_question:
  - Are proposal-lane execution and split mechanics both available as reviewable capabilities for reflective
    execution without collapsing their ownership boundaries?
  joint_reviewability_conditions:
  - Proposal/split mechanics are jointly reviewable only when proposal-lane execution and split mechanics
    can each receive an independent review outcome before reflective execution treats the capability set
    as ready.
  - A review finding against proposal-lane execution must name the proposal-lane capability as unresolved
    without implying that split mechanics failed.
  - A review finding against split mechanics must name the split mechanics capability as unresolved without
    implying that proposal-lane execution failed.
  - A readiness conclusion must explain the capability-level coordination result without narrating child
    placement, edge shape, route order, queue ordering, or runtime scheduling.
  review_gate:
  - Proposal/split mechanics readiness is admissible only when proposal-lane execution and split mechanics
    are both review-present as named capabilities.
  - If either proposal-lane execution or split mechanics is absent, ambiguous, or review-blocked, the
    coordination surface must report proposal/split mechanics readiness as not admissible rather than
    inferring readiness from the other capability.
  - The review gate records only capability-level admissibility for reflective execution; concrete payload
    validity, queue state, lane storage, lifecycle transitions, and graph placement remain owned outside
    this coordination surface.
  required_capabilities:
    proposal_lane_execution:
    - The proposal-lane execution capability provides tracked proposal identity and execution-lane behavior.
    split_mechanics:
    - The split mechanics capability provides split payload semantics and split queue mechanics.
    split_lifecycle_anchor:
    - The split lifecycle anchor preserves deterministic split proposal lifecycle semantics.
    parent_prerequisite_contract:
    - The parent-facing prerequisite contract defines when consumers may treat this coordination surface
      as admissible proposal/split mechanics coordination-surface readiness.
  ownership_boundaries:
  - This node may require proposal-lane execution and split mechanics capabilities, but it must not restate
    their concrete payload, queue, or execution contracts.
  - This node may require a split lifecycle anchor, but it must not redefine lifecycle transitions.
  - The prerequisite contract owns consumer-facing admissibility rules; this node owns only the coordinated
    mechanics meaning consumed by those rules.
  role_boundary:
  - This node owns only the coordination meaning that lets reflective execution treat proposal-lane execution
    and split mechanics as one reviewable capability set.
  - This node does not own concrete proposal-lane execution, split payloads, split lifecycle transitions,
    prerequisite admissibility policy, retrospective direct-update authority, viewer layout, queue ranking,
    or runtime orchestration.
  - Graph placement is represented by metadata edges; prose should describe coordination semantics rather
    than restating provider routes.
  integration_invariants:
  - Proposal-lane execution must not be treated as a substitute for split mechanics.
  - Split mechanics must not be treated as a substitute for proposal-lane execution.
  - Proposal/split readiness must not imply retrospective direct-update authority.
  topology_prose_policy:
  - Direct graph relations around this node are represented by canonical fields and derived graph views.
  - This node's prose should explain coordination, ownership, and readiness meaning rather than child
    placement, edge order, or route narration.
  boundaries:
  - This node does not collapse downstream node identities or their bounded concerns.
  - Cross-capability consistency is expressed here only at the proposal/split mechanics coordination level.
  - If a future refinement would only verbalize a direct edge, route, or delegation fact, prefer rewrite,
    merge, regrouping, or proposal pressure instead of a new canonical child.
  parent_contract:
  - The reflective execution-readiness layer consumes this node as the proposal/split mechanics coordination
    surface.
  - Parent-facing prerequisite semantics should not be duplicated here as edge-order prose.
  - Consumers must not read this node as a proxy for direct-update semantics; direct-update semantics
    remain a separately consumed concern.

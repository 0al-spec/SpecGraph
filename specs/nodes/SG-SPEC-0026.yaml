prompt: Keep SG-SPEC-0026 as the continuation decision boundary for reflective execution. It should explain
  when a completed run may hand off to another bounded target, how candidate selection and execution readiness
  are consumed, and when continuation is suppressed without turning graph topology into prose.
specification:
  objective: Define the continuation decision boundary that consumes candidate-selection results and reflective
    execution readiness to decide whether continuation is handed off, suppressed, or kept as a derived
    artifact.
  scope:
    in:
    - Continuation decision boundary after a completed reflective run
    - Continuation preconditions, suppression triggers, and canonical handoff behavior
    - Consumption of deterministic continuation candidate selection output
    - Consumption of reflective execution readiness state
    - Non-canonical persistence expectations for continuation artifacts
    - Topology-prose discipline for this branch
    out:
    - Parent governance boundary and human-approval policy
    - Concrete reflective execution mechanics
    - Concrete candidate derivation, de-duplication, deterministic tie-break, and one-of-n selection mechanics
    - Scoring formulas, queue ranking engines, and viewer UX
    - Concrete continuation artifact mutation contracts
  continuation_boundary:
  - This node decides whether a completed reflective run may continue directly to another bounded target.
  - The decision is based on normalized candidate-selection output plus execution-readiness state, not
    on graph topology prose.
  decision_inputs:
    candidate_selection:
    - The candidate-selection input provides deterministic candidate derivation, de-duplication, and selection
      ordering.
    execution_readiness:
    - The execution-readiness input provides gate state and reflective execution safety signals consumed
      by this decision.
  role_boundary:
  - This node owns only the integration decision that combines candidate-selection output with execution-readiness
    state.
  - This node does not own candidate derivation, execution mechanics, queue ranking, scoring formulas,
    viewer layout, or canonical artifact mutation.
  - Graph placement is represented by metadata edges; prose should describe continuation decision semantics
    rather than restating provider routes.
  decision_contract:
  - Direct continuation is allowed only when candidate selection returns one deterministic result and
    execution readiness does not leave a blocking gate.
  - Continuation is suppressed when authority, existing proposals, active gates, or ambiguous selection
    make direct handoff unsafe.
  continuation_selection:
    preconditions:
    - The current bounded target has no remaining explicit blocked or gated work within current authority.
    - Continuation selection does not run as a bypass for an active operator_target override.
    - Continuation selection flow is delegated to the candidate-selection input and bounded to one selected
      result if available.
    selection_flow:
    - This node consumes normalized bounded context and at most one deterministic continuation selection
      result for handoff.
    - If no valid deterministic selection is available, including tie ambiguity or missing ordering, this
      node treats continuation as suppressed and emits no direct continuation mutation.
    suppression:
    - Do not select direct continuation when required authority exceeds the current continuation envelope.
    - Do not select direct continuation when an active proposal already owns the exact target region.
    - Do not select direct continuation when a gate remains active for the candidate concern.
    handoff:
    - Suppressed continuation becomes derived artifact emission or refresh rather than canonical mutation.
    - Continuation records must not set canonical backlog labels, ownership fields, status, or maturity
      directly.
  topology_prose_policy:
  - Canonical graph fields already represent which specs provide candidate selection and execution readiness.
  - This node's prose should explain the continuation decision semantics rather than restating child routing.
  boundaries:
  - This node does not redefine parent governance boundaries.
  - Continuation records and delegated mechanics outputs remain non-canonical until separately authorized
    execution or approval paths apply them.

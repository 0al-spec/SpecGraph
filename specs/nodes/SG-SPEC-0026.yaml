  retrospective direct-update boundaries, and proposal-lane execution semantics under one bounded child
  of SG-SPEC-0003.
- Defines the bounded continuation-selection policy for deriving, de-duplicating, and choosing at most
  one linked latent_graph_improvement_candidate after explicit blocked or gated work clears.
- Defines suppression and handoff behavior when continuation cannot proceed because authority limits,
  active proposal ownership, or active gates keep follow-up work non-executable.

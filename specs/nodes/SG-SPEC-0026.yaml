prompt: Keep SG-SPEC-0026 as the bounded integration child under SG-SPEC-0003 for reflective execution
  continuation. It should define deterministic continuation selection, delegate concrete reflective execution
  mechanics to SG-SPEC-0027, and specify suppression and handoff behavior without drifting into scoring
  formulas, proposal-lane precedence engines, or viewer design.
specification:
  objective: Define the bounded continuation-selection integration layer under SG-SPEC-0003 while delegating
    concrete continuation-selection mechanics to SG-SPEC-0033 and reflective execution mechanics to SG-SPEC-0027.
  scope:
    in:
    - Integration role between SG-SPEC-0003 and delegated continuation or execution descendants
    - Continuation preconditions, suppression triggers, and canonical handoff behavior
    - Deterministic continuation candidate selection mechanics delegated to SG-SPEC-0033
    - Non-canonical persistence expectations for continuation artifacts
    out:
    - Parent boundary and human-approval policy retained by SG-SPEC-0003
    - Concrete reflective execution mechanics grouped under SG-SPEC-0027
    - Concrete candidate derivation, de-duplication, deterministic tie-break, and one-of-n selection delegated
      to SG-SPEC-0033
    - Scoring formulas, queue ranking engines, and viewer UX
    - Concrete continuation artifact mutation contracts
  integration_role:
  - SG-SPEC-0026 is the intermediate child that keeps SG-SPEC-0003 below the blocking-child atomicity
    limit while preserving explicit continuation-selection governance.
  - SG-SPEC-0026 may depend_on exactly one bounded execution cluster child when multiple reflective execution
    mechanics remain jointly required before continuation-aware operation is coherent.
  - SG-SPEC-0026 delegates deterministic continuation candidate derivation and tie-break selection to
    SG-SPEC-0033.
  delegated_execution_cluster:
  - SG-SPEC-0027 owns the integrated reflective execution mechanics cluster beneath SG-SPEC-0026.
  - Execution-mechanics descendants that belong to this cluster are refined through SG-SPEC-0027.
  - SG-SPEC-0026 may depend directly only on SG-SPEC-0027 for execution-readiness; no other direct execution-mechanics
    dependencies are allowed while this cluster is present.
  delegated_continuation_selection_cluster:
  - SG-SPEC-0033 owns deterministic continuation candidate derivation, de-duplication, and selection ordering.
  - SG-SPEC-0026 consumes SG-SPEC-0033 as the single bounded dependency for continuation candidate selection
    mechanics.
  - SG-SPEC-0026 remains responsible for suppression gates and handoff contracts while SG-SPEC-0033 defines
    selection details.
  continuation_selection:
    preconditions:
    - The current bounded target has no remaining explicit blocked or gated work within current authority.
    - Continuation selection does not run as a bypass for an active operator_target override.
    - Continuation selection flow is delegated to SG-SPEC-0033 and bounded to one selected result if available.
    selection_flow:
    - SG-SPEC-0026 invokes SG-SPEC-0033 with normalized bounded context to retrieve at most one deterministic
      continuation selection result for handoff.
    - If SG-SPEC-0033 returns no valid deterministic selection (including tie ambiguity or missing ordering),
      SG-SPEC-0026 treats continuation as suppressed and emits no direct continuation mutation.
    suppression:
    - Do not select direct continuation when required authority exceeds the current continuation envelope.
    - Do not select direct continuation when an active proposal already owns the exact target region.
    - Do not select direct continuation when a gate remains active for the candidate concern.
    handoff:
    - Suppressed continuation becomes derived artifact emission or refresh rather than canonical mutation.
    - Continuation records must not set canonical backlog labels, ownership fields, status, or maturity
      directly.
  boundary_notes:
  - SG-SPEC-0026 integrates continuation rules and delegated execution clustering but does not redefine
    parent governance boundaries.
  - Continuation records and delegated mechanics outputs remain non-canonical until separately authorized
    execution or approval paths apply them.

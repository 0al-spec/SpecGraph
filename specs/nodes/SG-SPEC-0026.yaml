acceptance:
- Defines the continuation decision boundary that decides whether a completed reflective run may hand
  off to another bounded target.
- Separates candidate selection from execution readiness so candidate derivation, tie-break behavior,
  and execution-readiness signals remain distinct inputs to the continuation decision.
- Defines suppression and handoff behavior for continuation attempts without mutating canonical backlog
  state directly.
- Applies the topology-prose rule for this branch so integration prose explains continuation behavior
  rather than child routing.
- Avoids scoring formulas, queue-priority engines, viewer/UX contracts, and concrete mechanics payloads.

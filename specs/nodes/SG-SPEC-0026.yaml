acceptance:
- Defines SG-SPEC-0026 as the bounded continuation-selection integration child beneath SG-SPEC-0003.
- Delegates concrete continuation candidate derivation, de-duplication, and deterministic tie-break to
  SG-SPEC-0033, while keeping continuation suppression and handoff as integration behavior.
- Keeps execution mechanics delegated to SG-SPEC-0027 and avoids scoring formulas, queue-priority engines,
  and viewer/UX contracts.
- Keeps continuation artifacts non-canonical until SG-SPEC-0026 applies approved downstream handoff rules.

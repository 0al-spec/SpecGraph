prompt: Retain SG-SPEC-0007 as the overview boundary spec for pre-canonical intent mediation between raw
  user goals and canonical intent or spec nodes, including minimal mediation artifacts, promotion traceability,
  adjacent out-of-scope boundaries, and implementation-agnostic constraints, while deferring explicit
  project-memory consultation policy to a dedicated child concern.
specification:
  objective: 'Define the bounded pre-canonical discovery and mediation semantics that translate raw user
    goals into governed canonical intent-facing artifacts without expanding the canonical layer model
    or prescribing tooling.

    '
  scope:
    in:
    - Boundary between raw user goals and canonical intent or spec nodes
    - Minimal mediated-discovery artifacts needed before canonicalization
    - Promotion rules from mediated discovery into canonical nodes
    - Provenance and traceability across the mediation boundary
    out:
    - Full vocabulary ontology or terminology harmonization policy
    - Discovery surface taxonomy, adoption flows, or UX design
    - Proposal-lane governance, review state, or canonical application workflow
    - Storage schema, file layout, or queue implementation
    - Project-memory consultation policy, retrieval protocol, or memory quality rules
    - Model-specific prompting, ranking, or embedding techniques
  terminology:
    raw_goal_signal: 'An external, not-yet-canonical expression of user intent such as a request, complaint,
      desired outcome, or constraint phrased in the user''s own language.

      '
    mediated_discovery: 'The bounded interpretation step that preserves the user''s raw goal context while
      organizing it into a form suitable for canonicalization.

      '
    mediated_intent_frame: 'A structured but pre-canonical representation of one or more raw_goal_signal
      items, capturing candidate goals, constraints, success signals, and unresolved ambiguity without
      yet asserting canonical graph truth.

      '
    canonicalization_boundary: 'The point at which mediated discovery output is intentionally materialized
      as a governed canonical node such as intent or spec, after which normal lifecycle and edge rules
      apply.

      '
    promotion_rationale: 'The explicit explanation for why a mediated_intent_frame becomes a particular
      canonical node shape, including whether the promoted node should be intent-first or specification-first.

      '
  boundary_policy:
    layer_position:
    - Mediated discovery is adjacent to the canonical Intent layer, not a fifth canonical layer.
    - SG-SPEC-0001 remains correct that the canonical architecture is Intent -> Specification -> Graph
      -> Code.
    - Raw user goals may exist outside the canonical graph until a governed canonicalization step occurs.
    authority_boundary:
    - raw_goal_signal and mediated_intent_frame do not become canonical truth merely by being observed
      or summarized.
    - Canonical authority begins only when an intent node, spec node, or another governed canonical artifact
      is explicitly created or updated.
    - The mediation boundary exists to reduce premature structuring, not to replace canonical intent ownership.
  discovery_flow:
    intake_rules:
    - A raw_goal_signal may contain mixed goals, constraints, preferences, and ambiguous phrasing.
    - mediated_discovery should preserve the original wording or a faithful reference to it rather than
      collapsing immediately into canonical terminology.
    - A mediated_intent_frame may separate one incoming signal into multiple candidate concerns when that
      improves later canonicalization clarity.
    promotion_rules:
    - Promote to an intent node when the canonical artifact should primarily express a user-owned goal,
      need, constraint, or success condition.
    - Promote to a spec node when the material has already been normalized into a governed, acceptance-bearing
      declaration rather than remaining a raw or lightly mediated goal statement.
    - When a mediated_intent_frame mixes multiple bounded concerns, canonicalization should prefer multiple
      narrower canonical nodes over one overloaded artifact.
    - Mediation may stop before canonicalization when ambiguity, conflict, or missing user context is
      still too high for a trustworthy canonical node.
  traceability_policy:
    mediation_record:
    - Each mediated_intent_frame should retain the source wording, source actor or channel when known,
      and any notable ambiguity that affected interpretation.
    - The promotion_rationale should explain why the chosen canonical node kind is appropriate.
    promotion_traceability:
    - Every canonical node created from mediated discovery must preserve lineage back to the originating
      raw_goal_signal or mediated_intent_frame through source_refs, derived_from, refines, or equivalent
      canonical provenance fields.
    - Canonicalization must not erase the distinction between direct user wording and mediated interpretation.
    - If one mediated_intent_frame yields multiple canonical nodes, each resulting node should preserve
      enough shared lineage for reverse traversal back to the originating user goal context.
  adjacency_notes:
  - Vocabulary harmonization is adjacent because mediated discovery may surface synonymous or conflicting
    phrasing, but this node does not define the long-term controlled vocabulary policy.
  - Discovery surfaces and adoption-facing entities are adjacent because they may generate raw_goal_signal
    inputs, but this node does not define their taxonomy or UX contract.
  - Proposal-lane governance is adjacent because pre-canonical mediation outputs may later be represented
    in proposal structures, but this node does not define proposal authority, lifecycle, or application
    semantics.
  - Explicit project-memory consultation, PageIndex-backed recall, and memory-specific traceability or
    quality rules are delegated to a dedicated child concern; this node only notes that such consultation,
    when defined elsewhere, remains adjacent to rather than constitutive of canonicalization.
  examples:
  - name: Raw goal to intent
    description: A user says they want faster onboarding with fewer confusing steps. Mediated discovery
      captures the raw wording, extracts candidate success conditions, and promotes the concern into one
      or more intent nodes rather than directly minting a fully governed implementation spec.
  - name: Structured request to spec
    description: A user provides a bounded acceptance-bearing request with explicit success conditions
      and constraints. Mediated discovery preserves the source context, records promotion_rationale, and
      may promote directly into a spec node because the material already satisfies governed specification
      shape.
  - name: Ambiguity blocks promotion
    description: A user request mixes multiple desired outcomes and leaves key constraints unresolved.
      Mediated discovery preserves the raw wording, separates candidate concerns, and stops before canonicalization
      until ambiguity is low enough to support a trustworthy intent or spec node.

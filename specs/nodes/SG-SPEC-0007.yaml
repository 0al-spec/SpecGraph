acceptance:
- Defines the pre-canonical mediation boundary between raw user goals and canonical intent or spec nodes
  without introducing a fifth canonical layer
- Defines the minimal mediated-discovery artifacts and transitions that can normalize raw goal signals
  into canonical intent-facing graph inputs
- Defines provenance and traceability expectations across the mediation boundary so promoted canonical
  nodes preserve the originating user goal context
- Keeps vocabulary harmonization, discovery-surface design, and proposal-lane governance related but explicitly
  out of scope for full resolution in this node
- Remains implementation-agnostic about storage, UI, agent workflow, and model-specific mediation strategies

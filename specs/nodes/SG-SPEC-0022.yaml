acceptance:
- Defines the bounded role of canonical node maturity as a continuous diagnostic signal distinct from
  lifecycle status, review state, priority, and implementation completion
- Defines the minimum semantic contract for node maturity, including subject scope, 0.0-1.0 scale meaning,
  and what kinds of changes can justify canonical maturity updates
- Defines how maturity interacts with lifecycle status so maturity can inform refinement and observation
  without acting as an automatic gate, regression trigger, or approval surrogate
- Defines the canonical versus derived boundary for authored maturity values, estimated maturity assessments,
  and maturity trend artifacts

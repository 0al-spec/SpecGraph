acceptance:
- Defines aggregate evidence projection as a derived cluster-level summary over SG-SPEC-0063 member evidence,
  not as canonical truth or a replacement for member-owned evidence.
- Defines source attribution requirements so each projected evidence item names the member-owned evidence
  or gap it summarizes across runtime observability, adoption, executable traceability, or metric-family
  semantics.
- Defines unresolved gap routing so projection gaps remain attached to the concrete owning member spec
  unless the gap is specifically about the projection rule itself.
- Keeps telemetry collection, dashboards, formulas, storage schemas, ranking, and runtime implementation
  out of scope for aggregate evidence projection semantics.

prompt: Materialize aggregate evidence projection semantics beneath SG-SPEC-0063 so the realization and
  observation cluster can summarize member-owned evidence without making the summary canonical or hiding
  member-specific gaps.
specification:
  objective: Define the bounded semantics for derived aggregate evidence projections in the realization
    and observation cluster so cluster-level review can inspect cross-member evidence summaries while
    canonical evidence ownership remains with the concrete member specs.
  scope:
    in:
    - Derived aggregate evidence projection semantics beneath SG-SPEC-0063
    - Source attribution from projected evidence items to member-owned evidence or gaps
    - Canonical-versus-derived protection for cluster-level evidence summaries
    - Routing of unresolved projection and member evidence gaps
    out:
    - Telemetry collection, instrumentation, storage schemas, or observability backends
    - Dashboard layout, viewer UI, badges, alerts, ranking, or scheduler behavior
    - Metric formulas, thresholds, scoring weights, or trend calculations
    - Adoption operations, campaign execution, analytics event taxonomy, or UX taxonomy
    - Runtime implementation, executor ownership, code generation, CI behavior, or deployment mechanics
  terminology:
    aggregate_evidence_projection: A derived cluster-level summary that presents member-owned realization
      or observation evidence together without becoming canonical graph truth.
    projected_evidence_item: One entry in an aggregate_evidence_projection that summarizes a concrete
      evidence claim, missing evidence condition, or cross-member evidence relationship.
    source_member: The concrete SG-SPEC-0063 member spec that owns the evidence claim or unresolved gap
      summarized by a projected_evidence_item.
    source_claim_type: The projected_evidence_item field that classifies whether the source member claim
      is satisfied, partial, missing, conflicting, or a projection_rule_gap.
    summarized_evidence_or_gap: The projected_evidence_item field that preserves the member-owned evidence
      identifier, missing evidence condition, conflict, or projection-rule gap being summarized.
    projection_rule_gap: An unresolved condition caused by missing or ambiguous aggregate projection semantics
      rather than missing evidence inside a member-owned contract.
    aggregate_projection_disposition: A derived review-navigation label for the projection as a whole,
      indicating whether summarized member evidence appears complete, partial, missing, conflicting, or
      blocked by a projection_rule_gap without deciding member acceptance.
  cluster_contract:
    parent_boundary:
    - SG-SPEC-0066 owns only the derived aggregate projection rule boundary for SG-SPEC-0063 member evidence.
    - SG-SPEC-0017, SG-SPEC-0018, SG-SPEC-0020, and SG-SPEC-0021 keep canonical ownership of their member
      evidence semantics.
    dependency_policy:
    - SG-SPEC-0066 depends on each source member spec whose evidence may be summarized by aggregate evidence
      projections.
    - These dependencies gate projection semantics only; they do not transfer member evidence ownership
      to SG-SPEC-0066.
  member_contracts:
  - spec_id: SG-SPEC-0017
    member_role: Runtime observability evidence source.
    ownership_boundary: Owns runtime observability evidence semantics summarized by aggregate evidence
      projection.
  - spec_id: SG-SPEC-0018
    member_role: Adoption-layer evidence source.
    ownership_boundary: Owns adoption-layer evidence semantics summarized by aggregate evidence projection.
  - spec_id: SG-SPEC-0020
    member_role: Executable traceability evidence source.
    ownership_boundary: Owns executable traceability evidence semantics summarized by aggregate evidence
      projection.
  - spec_id: SG-SPEC-0021
    member_role: Derived metric-family evidence source.
    ownership_boundary: Owns derived metric-family evidence semantics summarized by aggregate evidence
      projection.
  projection_contract:
    summary_boundary:
    - aggregate_evidence_projection is a derived cluster-level summary over evidence owned by SG-SPEC-0017,
      SG-SPEC-0018, SG-SPEC-0020, or SG-SPEC-0021.
    - aggregate_evidence_projection may help reviewers inspect whether realization and observation evidence
      is coherent across the cluster.
    - aggregate_evidence_projection does not create canonical truth, satisfy member acceptance by itself,
      or replace member-owned evidence records.
    admissible_projection_subjects:
    - Runtime observability evidence owned by SG-SPEC-0017.
    - Adoption-layer evidence owned by SG-SPEC-0018.
    - Executable traceability evidence owned by SG-SPEC-0020.
    - Derived metric-family evidence owned by SG-SPEC-0021.
  source_attribution_policy:
  - Every projected_evidence_item must name a source_member.
  - Every projected_evidence_item must name a source_claim_type that identifies whether it summarizes
    a satisfied claim, partial claim, missing evidence condition, conflict, or projection_rule_gap.
  - Every projected_evidence_item must name summarized_evidence_or_gap so reviewers can inspect the member-owned
    evidence identifier, missing evidence condition, conflict, or projection-rule gap being summarized.
  - Every projected_evidence_item must preserve enough member-owned identifier context for review to return
    to the owning member spec without treating the aggregate projection as the owning record.
  - Cross-member projected_evidence_item entries may name supporting members, but must still identify
    one primary source_member for ownership and follow-up.
  canonical_derived_boundary:
  - Member-owned canonical evidence remains governed by the concrete member spec that defines the evidence
    semantics.
  - A projection may combine, filter, summarize, or label member-owned evidence, but those derived operations
    remain rebuildable from member-owned sources.
  - A projection conflict between member evidence and aggregate presentation is resolved by inspecting
    the member-owned evidence first; the projection is corrected or marked as a projection_rule_gap.
  summary_disposition_policy:
  - An aggregate_evidence_projection may carry one aggregate_projection_disposition for review navigation
    across the projected_evidence_item set.
  - complete means every projected member-owned evidence claim required by the projection rule is represented
    by source-attributed satisfied evidence.
  - partial means at least one projected member-owned evidence claim is satisfied while at least one other
    projected member-owned evidence claim is missing, inconclusive, stale, or otherwise not fully satisfied.
  - missing means the projection rule identifies required member-owned evidence but no source-attributed
    member evidence is available for the projected subject.
  - conflicting means source-attributed member evidence conflicts across one or more projected_evidence_item
    entries and the conflict must remain traceable to the owning source_member entries.
  - projection_rule_gap means the aggregate projection rule is missing, ambiguous, or internally inconsistent
    before member evidence can be summarized honestly.
  - An aggregate_projection_disposition is a derived review-navigation signal and must not be used as
    an aggregate acceptance verdict, lifecycle decision, member evidence replacement, ranking score, or
    automatic gap closure.
  gap_routing_policy:
  - Missing runtime observability evidence routes to SG-SPEC-0017.
  - Missing adoption-layer evidence routes to SG-SPEC-0018.
  - Missing executable traceability evidence routes to SG-SPEC-0020.
  - Missing derived metric-family evidence routes to SG-SPEC-0021.
  - Missing, ambiguous, or conflicting aggregate projection rules route to SG-SPEC-0066.
  invariants:
    AEP-0066-1: Aggregate evidence projections remain derived summaries over member-owned evidence.
    AEP-0066-2: Every projected evidence item identifies one primary source member.
    AEP-0066-3: Member-specific evidence gaps are routed to the member spec that owns the missing evidence
      semantics.
    AEP-0066-4: Aggregate projection dispositions remain review-navigation labels and do not decide member
      acceptance or close member-specific gaps.

acceptance:
- Defines the bounded canonical reachability contract for INV-002 by naming traceability roots, traceable
  subjects, and acceptable canonical chain edges without redefining SG-SPEC-0001 edge-kind compatibility.
- Defines when a governed subject satisfies traceability reachability through explicit canonical edges
  and when missing, broken, cyclic, or generic-only chains remain unresolved.
- Defines how active versus historical presence interacts with traceability reachability without redefining
  SG-SPEC-0054 presence semantics or SG-SPEC-0019 supersession lineage.
- Defines the canonical-versus-derived boundary for traceability evidence so indexes, viewer paths, inferred
  edges, and summaries cannot satisfy INV-002 unless admitted as explicit canonical graph state.
- Keeps validation algorithms, storage layout, traversal implementation, UI presentation, metrics, and
  lifecycle transition mechanics out of scope.

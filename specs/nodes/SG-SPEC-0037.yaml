acceptance:
- Defines concrete non-retry routing semantics for preempt_direct_update and proposal_direct_handoff,
  including defaults and evaluation order for derived queue processing.
- Delegates dedupe_key semantics to SG-SPEC-0042 so dedupe behavior remains isolated from routing controls.
- Restricts routed non-retry queue-control behavior to first-persistence advisory metadata that cannot
  authorize direct writeback or authority expansion.

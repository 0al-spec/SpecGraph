acceptance:
- Defines the four canonical layers (Intent, Specification, Graph, Code) with clear boundaries
- Defines the seed node kinds with required and optional fields and the child-spec refinement path
- Defines the edge kinds currently in scope with source/target constraints and semantics
- Defines the node lifecycle and valid status transitions
- Establishes the separation between canonical (user-owned) and derived (rebuildable) data
- States the governing invariants that every node and edge must satisfy
- Defines a bounded canonical provenance envelope for all SG-SPEC-0001 nodes and edges
- 'Is implementation-agnostic: no file format, storage engine, or language choices'
- States that SG-SPEC-0001 is a seed spec that child specs refine before the graph is frozen
acceptance_evidence:
- criterion: Defines the four canonical layers (Intent, Specification, Graph, Code) with clear boundaries
  evidence: 'specification.layers enumerates all four layers — Intent, Specification, Graph, Code — each
    with a purpose statement and primary_node_kinds list. Boundaries are explicit: Intent captures goals;
    Specification refines them into governed artifacts; Graph holds the canonical substrate; Code holds
    derived executables.

    '
- criterion: Defines the seed node kinds with required and optional fields and the child-spec refinement
    path
  evidence: 'specification.node_kinds lists the seed kinds (intent, spec, requirement, decision, constraint,
    invariant, code_surface, test, release) each with description, required_fields, and optional_fields.
    Every seed kind now exposes optional `presence` as the cross-cutting current-versus-historical field,
    while SG-SPEC-0054 owns the detailed contract for that field. The spec kind also exposes refines so
    descendant specs can point back to ancestor specs and elaborate them incrementally. The authority_class
    cross-cutting field is defined in specification.authority_classes and applies to every node, while
    SG-SPEC-0057 now owns the detailed semantic contract for those authority classes and their interaction
    with explicit canonical edges.

    '
- criterion: Defines the edge kinds currently in scope with source/target constraints and semantics
  evidence: 'specification.edge_kinds in SG-SPEC-0001 defines the edge set and baseline semantics. SG-SPEC-0023
    adds the machine-checkable compatibility matrix, directedness constraints, and blocked-edge rules
    for each edge kind, while SG-SPEC-0019 refines the revision and supersession lineage semantics consumed
    by the `supersedes` edge.

    '
- criterion: Defines the node lifecycle and valid status transitions
  evidence: 'specification.lifecycle defines 7 statuses (idea → stub → outlined → specified → linked →
    reviewed → frozen) with valid_transitions and a strictly-forward progression rule. SG-SPEC-0022 now
    refines the detailed maturity-to-lifecycle boundary without altering the root transition sequence.

    '
- criterion: Establishes the separation between canonical (user-owned) and derived (rebuildable) data
  evidence: 'specification.canonical_vs_derived explicitly lists canonical records versus rebuildable
    derived artifacts, and INV-005 formalizes that separation. specification.terminology.presence names
    `presence` as the concrete current-versus-historical node field, specification.scope.out delegates
    the detailed `presence` surface semantics to SG-SPEC-0054, and SG-SPEC-0054 specification.canonical_vs_derived_boundary
    keeps authored `presence` records canonical while filters, badges, and inferred current-state projections
    remain derived and rebuildable.

    '
- criterion: States the governing invariants that every node and edge must satisfy
  evidence: 'specification.invariants lists 9 invariants (INV-001 through INV-009) covering provenance,
    traceability, acyclicity, immutability, canonical ownership, valid status, conflict resolution, authority
    tagging, and stable identity. SG-SPEC-0061 refines INV-002 by defining the bounded canonical reachability
    contract for traceability roots, traceable subjects, acceptable authored chains, and non-satisfying
    derived projections.

    '
- criterion: Defines a bounded canonical provenance envelope for all SG-SPEC-0001 nodes and edges
  evidence: 'SG-SPEC-0024 defines a shared provenance envelope contract for all node and edge records,
    including actor identity, authority class, source references, timestamps, and revision/supersession
    behavior under lineage transitions. '
- criterion: 'Is implementation-agnostic: no file format, storage engine, or language choices'
  evidence: 'scope.out explicitly excludes storage format choices, tooling/CI implementation, runtime
    retrieval strategies, and model specialization. Decision D2 formalizes this as a governing principle.

    '
- criterion: States that SG-SPEC-0001 is a seed spec that child specs refine before the graph is frozen
  evidence: 'prompt frames SG-SPEC-0001 as a seed ontology and directs unresolved areas into child specs;
    scope.in adds recursive refinement via child specs; scope.out now delegates observability metrics
    to SG-SPEC-0021, adoption-layer entities to SG-SPEC-0018, executable-layer code_surface/test/release
    semantics to SG-SPEC-0020, revision/supersession lineage semantics to SG-SPEC-0019, detailed maturity
    semantics to SG-SPEC-0022, active-versus-historical presence surface semantics to SG-SPEC-0054, authority-class
    semantics to SG-SPEC-0057, and canonical traceability reachability rules to SG-SPEC-0061; D7 formalizes
    the seed-spec rule; spec.node_kinds.spec includes refines; and the concrete descendants `specs/nodes/SG-SPEC-0002.yaml`,
    `specs/nodes/SG-SPEC-0007.yaml`, `specs/nodes/SG-SPEC-0009.yaml`, `specs/nodes/SG-SPEC-0010.yaml`,
    `specs/nodes/SG-SPEC-0017.yaml`, `specs/nodes/SG-SPEC-0018.yaml`, `specs/nodes/SG-SPEC-0019.yaml`,
    `specs/nodes/SG-SPEC-0020.yaml`, `specs/nodes/SG-SPEC-0021.yaml`, `specs/nodes/SG-SPEC-0022.yaml`,
    `specs/nodes/SG-SPEC-0023.yaml`, `specs/nodes/SG-SPEC-0024.yaml`, `specs/nodes/SG-SPEC-0054.yaml`,
    `specs/nodes/SG-SPEC-0057.yaml`, and `specs/nodes/SG-SPEC-0061.yaml` now declare or serve delegated
    refinement under `SG-SPEC-0001`. SG-SPEC-0001 keeps `depends_on: [SG-SPEC-0002, SG-SPEC-0007, SG-SPEC-0009,
    SG-SPEC-0010, SG-SPEC-0017, SG-SPEC-0019, SG-SPEC-0023, SG-SPEC-0024, SG-SPEC-0054, SG-SPEC-0061]`
    for concrete blocking descendants, while SG-SPEC-0018, SG-SPEC-0020, SG-SPEC-0021, SG-SPEC-0022, and
    SG-SPEC-0057 remain non-blocking delegated children, keeping the refinement chain explicit without
    widening linked blockers beyond concrete descendants.

    '
prompt: 'This spec is a seed ontology, not a finished graph. Use child specs to

  refine unresolved areas and link the dependency edges once the descendants

  exist, then move SG-SPEC-0001 to linked.

  '
specification:
  objective: 'Define the foundational seed ontology of SpecGraph: the entity kinds, relation kinds, lifecycle
    rules, layered architecture, and governing invariants that make a product-intent graph machine-verifiable,
    human-readable, semantically structured, and execution-connected.

    '
  core_attributes:
  - name: Integrity
    description: 'Every artifact in the graph is structurally valid, schema-conformant, and internally
      consistent.

      '
  - name: Provenance
    description: 'Every node and edge carries full lineage: who created it, from what source, under what
      authority, and through which revisions.

      '
  - name: Traceability
    description: 'Every artifact is reachable from at least one intent via a chain of typed edges.  The
      graph supports both forward (intent → code) and reverse (evidence → intent) traversal.

      '
  - name: Bounded economics
    description: 'The cost of verifying, updating, and maintaining graph consistency is predictable and
      controllable.

      '
  - name: Human legibility
    description: 'Every node is readable and understandable by a human without requiring tooling.  The
      ontology uses natural-language descriptions alongside formal structure.

      '
  scope:
    in:
    - Canonical layer architecture (Intent → Specification → Graph → Code)
    - Recursive refinement via child specs; the root spec is a seed, not a finished fixed point
    - Node kind taxonomy and per-kind field contracts
    - Edge kind taxonomy with source/target type constraints and static/dynamic classification
    - 'Node lifecycle: statuses, valid transitions, maturity semantics'
    - Separation of canonical vs derived data
    - Canonical provenance envelope and actor-source metadata for node and edge records
    - Authority classes for provenance (authored, imported, inferred, distilled)
    - Cross-cutting invariants (provenance, versioning, traceability, contradiction resistance)
    out:
    - Storage format choices (YAML vs JSON vs DB schema)
    - Tooling, CLI, or CI implementation
    - Runtime retrieval, indexing, or embedding strategies
    - Fine-tuning, model specialization, or adapter design
    - Observability metrics (SIB, PFI, CSI, etc.) — covered by SG-SPEC-0021
    - Runtime observability entities (ObservabilityContract, Campaign, Attestation) — covered by SG-SPEC-0017
    - Intent-facing mediation and discovery semantics before canonicalization — covered by SG-SPEC-0007
    - Single-run OperatorRequest normalization and steering semantics from external actor intent — covered
      by SG-SPEC-0009
    - Ubiquitous vocabulary meta-ontology primitives for executable domain vocabularies — covered by SG-SPEC-0010
    - Adoption-layer entities (DiscoverySurface, AdoptionCriterion, etc.) — covered by SG-SPEC-0018
    - Detailed executable-layer traceability semantics for code_surface, test, and release — covered by
      SG-SPEC-0020
    - Detailed canonical revision-record and supersession-lineage semantics — covered by SG-SPEC-0019
    - Detailed node maturity semantics and maturity-to-lifecycle interaction — covered by SG-SPEC-0022
    - Detailed edge-kind compatibility matrix, blocked-edge semantics, and directedness constraints —
      covered by SG-SPEC-0023
    - Detailed authority-class semantic contract for authored/imported/inferred/distilled records and
      explicit canonical edges — covered by SG-SPEC-0057
    - Detailed active-versus-historical node presence surface semantics and visible current-vs-lineage
      markers — covered by SG-SPEC-0054
    - Detailed canonical traceability reachability rules for INV-002 — covered by SG-SPEC-0061
  terminology:
    intent: 'A precise, governed representation of what a product must be, how it must behave, and how
      its implementation can be validated.  Intent is the source of truth from which all other artifacts
      derive.

      '
    specification: 'A governed artifact that refines intent into a structured, versioned, machine-verifiable
      declaration with acceptance criteria.

      '
    graph: 'The canonical knowledge structure (nodes + edges) that serves as operational memory for the
      project.  The graph is the single source of truth — not documentation, not model weights.

      '
    code: 'The derived and executable layer.  Code implements specifications; it is never authoritative
      on its own.

      '
    node: 'A first-class entity in the graph with a stable identity, versioned state, provenance, and
      lifecycle.

      '
    edge: 'A directed, typed, optionally versioned relation between two nodes. Edges are classified as
      static (canonical, authored) or dynamic (runtime-derived, inferred).

      '
    intent_atom: 'The smallest verifiable unit of intent: a single requirement, invariant, or behavioral
      assertion that can be independently checked.

      '
    maturity: 'A continuous signal (0.0–1.0) reflecting how fully a node''s content has been elaborated
      and validated.  Not a gate — a diagnostic.

      '
    provenance: 'The full lineage of a node: who created it, from what source, under what authority, and
      through which revisions.

      '
    presence: 'A concrete field named `presence` that denotes whether a governed node is the active current
      expression for its bounded concern or retained only as historical lineage. SG-SPEC-0001 names this
      field and delegates its detailed surface semantics and canonical-versus-derived boundary to SG-SPEC-0054.

      '
    supersession: 'The act of replacing one node or edge version with a newer one while preserving the
      history chain. The older subject remains inspectable historical lineage; it is not deleted.

      '
    authority_class: 'A tag on every node indicating its origin: authored (human-written), imported (from
      external system), inferred (machine-derived), or distilled (compressed from other nodes). SG-SPEC-0057
      owns the detailed semantic contract for what each class asserts and what it does not. In serialized
      node envelopes this is represented as `authority`.

      '
    seed_spec: 'A root specification that intentionally captures only the stable core of the ontology
      and is expected to be refined by child specs.

      '
  layers:
  - name: Intent
    purpose: 'Captures the human-originated goals, constraints, and success criteria that drive the product.  Intent
      is defined by completeness, correctness, contradiction resistance, traceability, bounded execution
      cost, and human legibility.

      '
    primary_node_kinds:
    - intent
  - name: Specification
    purpose: 'Refines intent into governed, versioned artifacts with acceptance criteria, decisions, constraints,
      and invariants.  This is the authoring layer where product knowledge is structured.

      '
    primary_node_kinds:
    - spec
    - requirement
    - decision
    - constraint
    - invariant
  - name: Graph
    purpose: 'The canonical storage and query substrate.  Holds all nodes and edges with versioning, provenance,
      and supersession.  Enables traversal, conflict detection, dependency slicing, and impact analysis.
      This layer is not a node kind itself but the structural medium in which all other layers exist.

      '
    primary_node_kinds:
    - note: All node kinds live in the graph.  This layer defines the substrate, not a specific kind.
  - name: Code
    purpose: 'The derived, executable layer.  Contains implementation artifacts (code surfaces, tests,
      build artifacts, releases) that are traced back to specifications and ultimately to intent.

      '
    primary_node_kinds:
    - code_surface
    - test
    - release
  node_kinds:
  - kind: intent
    description: Human-originated goal or product objective.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    optional_fields:
    - maturity
    - presence
    - owner
    - source_refs
    - created_at
    - updated_at
  - kind: spec
    description: 'Structured artifact refining one or more intents into verifiable declarations with acceptance
      criteria.

      '
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - acceptance
    optional_fields:
    - maturity
    - presence
    - depends_on
    - relates_to
    - intent_refs
    - refines
    - constraint_refs
    - decisions
    - scope
    - prompt
    - outputs
    - allowed_paths
    - acceptance_evidence
  - kind: requirement
    description: A single verifiable demand derived from a spec or intent.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - source_ref
    optional_fields:
    - presence
    - priority
    - verification_mode
    - success_signals
    - failure_signals
  - kind: decision
    description: An architectural or product decision with rationale (ADR).
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - statement
    - rationale
    optional_fields:
    - presence
    - alternatives_considered
    - superseded_by
  - kind: constraint
    description: A system-level limitation that bounds the solution space.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - statement
    optional_fields:
    - presence
    - source_ref
    - enforcement
  - kind: invariant
    description: A stable property that must hold across all changes.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - statement
    optional_fields:
    - presence
    - scope
    - verification_mode
  - kind: code_surface
    description: 'A stable implementation anchor: symbol, module, endpoint, screen, or workflow step.  Identified
      by a stable key, not a file path. path_hint is informational only and not the stable identifier.

      '
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - surface_type
    optional_fields:
    - presence
    - task_refs
    - criterion_refs
    - runtime_surface_refs
    - path_hint
  - kind: test
    description: A verification artifact covering one or more requirements or acceptance criteria.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - covers
    optional_fields:
    - presence
    - test_type
    - path_hint
  - kind: release
    description: A versioned deployment artifact linking code surfaces to runtime.
    required_fields:
    - id
    - title
    - status
    - kind
    - authority_class
    - version_tag
    optional_fields:
    - presence
    - code_surface_refs
    - rollout_scope
  authority_classes:
  - class: authored
    description: Created directly by a human.  Highest trust.
  - class: imported
    description: Ingested from an external system (issue tracker, CI, etc.).
  - class: inferred
    description: Derived by machine reasoning (e.g., edge inference, conflict detection).
  - class: distilled
    description: Compressed or summarized from other nodes (e.g., glossary entries, role packs).
  edge_kinds:
  - kind: depends_on
    semantics: Source node cannot be completed or validated without target node.
    source_kinds:
    - spec
    - requirement
    - code_surface
    target_kinds:
    - spec
    - requirement
    - code_surface
    classification: static
  - kind: refines
    semantics: Source node elaborates or decomposes target node into finer granularity.
    source_kinds:
    - spec
    - requirement
    target_kinds:
    - intent
    - spec
    classification: static
  - kind: implements
    semantics: Source code artifact realizes the target specification or requirement.
    source_kinds:
    - code_surface
    target_kinds:
    - spec
    - requirement
    classification: static
  - kind: tested_by
    semantics: Target test verifies the source node.
    source_kinds:
    - requirement
    - spec
    - invariant
    target_kinds:
    - test
    classification: static
  - kind: conflicts_with
    semantics: 'Source and target nodes contain contradictory assertions. Must be resolved before either
      node reaches reviewed status.

      '
    source_kinds:
    - requirement
    - decision
    - constraint
    target_kinds:
    - requirement
    - decision
    - constraint
    classification: static
  - kind: supersedes
    semantics: 'Source node replaces target node in canonical lineage. Historical presence and lifecycle
      disposition remain orthogonal; SG-SPEC-0019 governs the detailed revision and supersession contract.
      The history chain is preserved.

      '
    source_kinds:
    - spec
    - decision
    - requirement
    target_kinds:
    - spec
    - decision
    - requirement
    classification: static
  - kind: derived_from
    semantics: Source node was produced from target node (e.g., requirement from PRD).
    source_kinds:
    - requirement
    - spec
    - decision
    target_kinds:
    - intent
    - spec
    classification: static
  - kind: owns
    semantics: Source entity is responsible for target node.
    source_kinds:
    - intent
    target_kinds:
    - spec
    - requirement
    - code_surface
    classification: static
  - kind: relates_to
    semantics: Generic semantic relation for cross-references that don't fit a stricter kind.
    source_kinds:
    - all
    target_kinds:
    - all
    classification: static
  canonical_vs_derived:
    canonical:
      description: 'User-owned, version-controlled artifacts that constitute the single source of truth.  Must
        be portable, diffable, and auditable.

        '
      includes:
      - Nodes (all kinds, with full metadata)
      - Explicit edges (authored relations between nodes)
      - Revision records (append-only change log per entity)
      - Provenance and authority_class tags
      - Lifecycle status and maturity values
    derived:
      description: 'Service-side projections and indexes that are rebuildable from canonical data.  Loss
        of derived data is recoverable.

        '
      includes:
      - Vector embeddings
      - Search indexes (keyword, semantic)
      - Graph centrality and layout metrics
      - Inferred edges (machine-derived relations)
      - Distilled summaries (glossaries, role packs, decision digests)
      - Viewer bundles and UI state
  lifecycle:
    statuses:
    - name: idea
      description: Raw captured thought.  No structure required.
    - name: stub
      description: Placeholder with identity and minimal metadata.
    - name: outlined
      description: High-level scope and acceptance criteria drafted.
    - name: specified
      description: Full specification with decisions, terminology, and constraints.
    - name: linked
      description: All edges (depends_on, refines, implements, tested_by) are resolved.
    - name: reviewed
      description: Human or automated review has approved the node.
    - name: frozen
      description: Immutable snapshot.  Changes require a new superseding node.
    valid_transitions:
    - from: idea
      to:
      - stub
    - from: stub
      to:
      - outlined
    - from: outlined
      to:
      - specified
    - from: specified
      to:
      - linked
    - from: linked
      to:
      - reviewed
    - from: reviewed
      to:
      - frozen
    notes: 'Transitions are strictly forward.  Regression (e.g., reviewed → specified) is not allowed;
      instead, create a new superseding node.  The supervisor enforces this progression.

      '
  invariants:
  - id: INV-001
    statement: 'Every node must carry provenance: who created it, from what source, and through which
      authority_class.

      '
  - id: INV-002
    statement: 'Every active specification-layer traceable subject, including requirements, acceptance
      criteria, specs, decisions, constraints, and invariants, must be traceable to at least one intent
      via refines or derived_from edges.

      '
  - id: INV-003
    statement: 'The graph must be acyclic in the depends_on relation.

      '
  - id: INV-004
    statement: 'A frozen node is immutable.  Any change produces a new node that supersedes the original.

      '
  - id: INV-005
    statement: 'Canonical data (nodes, explicit edges, revisions) is user-owned and portable.  Derived
      data (embeddings, indexes, layouts, inferred edges) is rebuildable from canonical data alone.

      '
  - id: INV-006
    statement: 'No node may exist without a valid status from the lifecycle.

      '
  - id: INV-007
    statement: 'conflicts_with edges must be resolved before either node reaches the reviewed status.

      '
  - id: INV-008
    statement: 'Every node must carry an authority_class tag (authored, imported, inferred, or distilled).

      '
  - id: INV-009
    statement: 'Node identity (id) is stable and immutable once assigned. Renaming produces a new node
      that supersedes the original.

      '
  decisions:
  - id: D1
    statement: SpecGraph is the single source of truth for project knowledge.
    rationale: 'Model weights, caches, and indexes are derived artifacts.  The graph holds truth; indexes
      hold access; summaries hold compression; weights hold priors; context holds the current task.

      '
  - id: D2
    statement: The ontology is implementation-agnostic.
    rationale: 'Node kinds, edge kinds, and lifecycle rules must not prescribe storage format, programming
      language, or deployment topology.  This allows the same ontology to be realized in YAML files, a
      database, or a hybrid.

      '
  - id: D3
    statement: Intent is the root of all traceability chains.
    rationale: 'Without traceable intent, specifications become ungrounded assertions. Every artifact
      in the graph must be reachable from at least one intent node via refines/derived_from edges.

      '
  - id: D4
    statement: The graph bootstraps itself (dogfooding).
    rationale: 'SG-SPEC-0001 is a spec node inside its own graph.  SpecGraph uses its own ontology to
      govern its own development, validating the model from day one.

      '
  - id: D5
    statement: Edges are classified as static (canonical) or dynamic (derived).
    rationale: 'Static edges are authored explicitly and version-controlled.  Dynamic edges are inferred
      at query time or by automated analysis.  This distinction preserves the canonical/derived separation
      at the relationship level.

      '
  - id: D6
    statement: Stable identity over fragile paths.
    rationale: 'Nodes are identified by stable keys (e.g., feature:ui.button.hover), not by file paths
      or line numbers which change frequently.  path_hint fields are informational, never authoritative.

      '
  - id: D7
    statement: The root ontology is a seed specification that child specs refine.
    rationale: 'The first spec should establish only the stable core of the model. Child specs are how
      unresolved fields, node kinds, and relations get elaborated without forcing premature completeness
      in SG-SPEC-0001.

      '

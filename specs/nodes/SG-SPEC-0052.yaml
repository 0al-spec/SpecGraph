acceptance:
- Defines explicit value spaces or record shapes for phase, status, authority, confidence, provenance,
  context_tags, and supersedes on pre-spec Intent, IntentFragment, IntentDraft, and Proposal nodes.
- Defines traceability rules so those axis fields remain explainable from raw_input to IntentFragment
  to IntentDraft to Intent and Proposal without invoking promotion boundary logic.

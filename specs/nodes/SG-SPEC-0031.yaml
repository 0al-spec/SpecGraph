prompt: Define the bounded parent-facing prerequisite contract inside SG-SPEC-0029 so proposal/split readiness
  is consumed through SG-SPEC-0029 by SG-SPEC-0032 while direct-update readiness remains separately bounded.
specification:
  objective: Define the bounded parent-facing prerequisite contract that governs how SG-SPEC-0032 consumes
    SG-SPEC-0029 for proposal/split readiness and where bypass is forbidden.
  scope:
    in:
    - Parent-facing prerequisite semantics for proposal/split readiness through SG-SPEC-0029.
    - Non-bypass constraints for consumers requiring proposal/split readiness while SG-SPEC-0029 exists.
    - Separation between proposal/split readiness and neighboring direct-update boundaries.
    out:
    - Concrete split payload schema or proposal-lane mechanics semantics.
    - Queue ranking formulas, execution timing, or persistence/runtime orchestration details.
  gateway_contract:
  - SG-SPEC-0032 may satisfy proposal/split readiness by depending_on SG-SPEC-0029 as one direct bounded
    prerequisite edge.
  - SG-SPEC-0029 is the concern-level readiness gateway for proposal/split consumption under SG-SPEC-0032.
  - Adjacent direct-update boundaries remain outside this prerequisite contract.
  consumer_rules:
  - While SG-SPEC-0029 exists, a parent that requires proposal/split readiness must not directly depend_on
    SG-SPEC-0028 for that same concern.
  - This contract does not redefine SG-SPEC-0028 mechanics, split payload structure, or lane execution
    runtime policy.
  boundary_separation:
  - Direct-update boundaries remain explicitly outside this prerequisite contract.
  - SG-SPEC-0029 readiness for this concern is not a proxy for retrospective direct-update semantics.

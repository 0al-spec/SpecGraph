prompt: Define the bounded parent-facing prerequisite contract inside the proposal/split gateway so proposal/split
  readiness is consumed through a single gateway prerequisite while direct-update readiness remains separately
  bounded.
specification:
  objective: Define the bounded parent-facing prerequisite contract that governs how consumers use the
    proposal/split gateway for readiness and where bypass is forbidden.
  scope:
    in:
    - Parent-facing prerequisite semantics for proposal/split readiness through the gateway.
    - Non-bypass constraints for consumers requiring proposal/split readiness.
    - Separation between proposal/split readiness and neighboring direct-update boundaries.
    out:
    - Concrete split payload schema or proposal-lane mechanics semantics.
    - Queue ranking formulas, execution timing, or persistence/runtime orchestration details.
  gateway_contract:
  - A consumer may satisfy proposal/split readiness only through one direct bounded prerequisite path
    for this concern.
  - The gateway is the concern-level readiness boundary for proposal/split consumption.
  - Adjacent direct-update boundaries remain outside this prerequisite contract.
  consumer_rules:
  - A parent that requires proposal/split readiness must not bypass the gateway prerequisite for that
    same concern.
  - This contract does not redefine mechanics, split payload structure, or lane execution runtime policy.
  boundary_separation:
  - Direct-update boundaries remain explicitly outside this prerequisite contract.
  - Proposal/split gateway readiness for this concern is not a proxy for retrospective direct-update semantics.
  role_boundary:
  - This node owns only parent-facing non-bypass prerequisite semantics for proposal/split gateway readiness.
  - This node does not own concrete mechanics, split payloads, lane execution runtime policy, direct-update
    readiness, queue ranking, or persistence orchestration.
  - Graph placement is represented by metadata edges; prose should describe non-bypass semantics rather
    than restating provider routes.

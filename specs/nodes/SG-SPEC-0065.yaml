acceptance:
- Defines SG-SPEC-0065 as the intermediate semantic cluster parent under SG-SPEC-0001 for pre-canonical
  intent mediation and single-run operator request ingress semantics.
- Groups intent mediation/discovery boundaries and OperatorRequest normalization/steering without redefining
  the bounded contracts owned by those children.
- Defines root dependency routing so SG-SPEC-0001 can depend on one intent-and-operator ingress aggregate
  while concrete child specs keep their existing semantic ownership and dependencies.
- Keeps UI, chat transport, agent workflow implementation, request execution, queue control, and storage
  layout out of scope for this cluster.

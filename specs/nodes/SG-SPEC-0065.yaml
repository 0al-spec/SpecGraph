prompt: Introduce the intent and operator ingress semantics cluster beneath SG-SPEC-0001 so root fan-out
  pressure can be reduced through a meaningful intermediate parent for pre-canonical user intent and operator
  request ingress.
specification:
  objective: Define the intermediate semantic cluster for user-to-graph ingress so SG-SPEC-0001 can delegate
    pre-canonical intent mediation and single-run operator request semantics through one legible aggregate
    boundary while each concrete child keeps its stable bounded contract.
  scope:
    in:
    - Intermediate cluster role for intent and operator ingress semantics beneath SG-SPEC-0001
    - Grouping boundary for raw goal mediation, mediated discovery, and typed OperatorRequest steering
    - Dependency routing from SG-SPEC-0001 through the cluster to concrete semantic children
    - Reparenting boundary for reducing root refinement fan-out without changing stable child IDs
    out:
    - Chat UI, viewer interaction design, command transport, or browser workflow
    - Agent workflow implementation, request execution, supervisor scheduling, or queue control
    - Storage schema, repository layout, project-memory backend, or conversation indexing
    - Canonical promotion mechanics beyond the child-owned boundaries
  terminology:
    intent_operator_ingress_cluster: The intermediate parent under SG-SPEC-0001 that groups how external
      human or operator input enters the graph before becoming governed canonical state.
    intent_ingress_boundary: The semantic region where raw user goals become mediated intent-facing artifacts
      without immediately becoming canonical graph truth.
    operator_ingress_boundary: The semantic region where a single-run external actor request becomes normalized
      steering context without bypassing graph governance.
  cluster_contract:
    parent_boundary:
    - SG-SPEC-0001 remains the seed ontology and owns root layer, node kind, edge kind, lifecycle, and
      invariant semantics.
    - SG-SPEC-0065 owns the aggregate boundary for pre-canonical user intent and operator request ingress.
    dependency_policy:
    - SG-SPEC-0001 may depend on SG-SPEC-0065 as the aggregate blocking descendant for intent/operator
      ingress semantics.
    - SG-SPEC-0065 depends on concrete member specs that define the detailed semantics required by the
      aggregate.
    - Member specs keep their stable IDs and may retain their existing own dependencies; the cluster does
      not rewrite those contracts.
    refinement_routing_policy:
    - Existing SG-SPEC-0001 children whose primary role is intent mediation, discovery, or OperatorRequest
      steering may be reparented to SG-SPEC-0065.
    - Reparenting a member under SG-SPEC-0065 must preserve the member's stable identity, acceptance,
      provenance, and own dependency semantics.
  member_contracts:
  - spec_id: SG-SPEC-0007
    member_role: Intent mediation and discovery boundary.
    ownership_boundary: Defines raw goal mediation, mediated intent frames, and pre-canonical discovery
      boundaries without implementing UI, storage, or agent workflow mechanics.
  - spec_id: SG-SPEC-0009
    member_role: OperatorRequest contract for single-run steering.
    ownership_boundary: Defines typed operator request normalization, context-pack handling, and bounded
      steering semantics without implementing request execution or queue control.
  non_goal_policy:
  - SG-SPEC-0065 must not redefine member packet fields, discovery artifacts, project-memory policy, or
    viewer affordances.
  - SG-SPEC-0065 must not claim runtime realization merely because its members describe operator-facing
    ingress semantics.
  - SG-SPEC-0065 must not hide unresolved member gaps; backlog and evidence projections should continue
    to point to the concrete member when the gap is member-specific.

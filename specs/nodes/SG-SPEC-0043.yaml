prompt: Materialize SG-SPEC-0043 as the bounded proposal/split gateway beneath SG-SPEC-0032 so proposal/split
  readiness is inspectable through one direct gateway edge and direct proposal/split detail remains in
  SG-SPEC-0029.
specification:
  objective: Define one bounded gateway boundary beneath SG-SPEC-0032 that keeps proposal/split mechanics
    inspectable without redefining downstream concrete contracts while delegating non-bypass execution-readiness
    constraints to SG-SPEC-0044.
  scope:
    in:
    - Proposal/split gateway role beneath SG-SPEC-0032.
    - Bounded handoff from SG-SPEC-0032 to SG-SPEC-0029 for concrete mechanics.
    - Delegation of execution-readiness no-bypass pathway constraints to SG-SPEC-0044.
    - Concrete mechanics isolation for queue ranking, continuation-selection policy, and runtime orchestration.
    out:
    - Concrete split lifecycle field-level semantics and payloads owned by SG-SPEC-0029.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Queue ranking formulas, ranking-engine policy, viewer layout, and runtime orchestration.
    - Execution-readiness no-bypass pathway constraints and chain-composition details (moved to SG-SPEC-0044).
  gateway_role:
  - SG-SPEC-0043 is the bounded proposal/split gateway child under SG-SPEC-0032.
  - SG-SPEC-0043 preserves inspectability by constraining gateway-level contracts and delegating concrete
    mechanics.
  gateway_topology:
  - SG-SPEC-0032 depends on SG-SPEC-0043 as its direct proposal/split gateway dependency.
  - SG-SPEC-0043 depends on SG-SPEC-0029 for concrete mechanics ownership and readiness surface details.
  - SG-SPEC-0032 consumes SG-SPEC-0043 as the sole direct proposal/split-readiness gateway edge.
  execution_readiness_contract:
  - SG-SPEC-0044 defines the non-bypass execution-readiness pathway constraints for this subcluster.
  cluster_members:
    concrete_mechanics_contract:
    - SG-SPEC-0029 owns concrete proposal/split lifecycle mechanics and schema details.
  cluster_boundaries:
  - SG-SPEC-0043 does not redefine field-level split artifact schemas, queue ranking formulas, continuation-selection
    policy, or runtime orchestration.
  - SG-SPEC-0043 only defines delegation topology while SG-SPEC-0044 holds explicit non-bypass pathway
    constraints.
  parent_contract:
  - SG-SPEC-0032 must consume SG-SPEC-0043 as its bounded gateway dependency.
  - SG-SPEC-0043 must preserve SG-SPEC-0029 as the concrete mechanics leaf under this subcluster.
  - SG-SPEC-0043 delegates execution-readiness non-bypass pathway constraints to SG-SPEC-0044.

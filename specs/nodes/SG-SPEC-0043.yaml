prompt: Materialize SG-SPEC-0043 as the bounded proposal/split gateway beneath SG-SPEC-0032 so proposal/split
  readiness remains inspectable through one direct gateway edge, the full no-bypass chain is delegated
  to SG-SPEC-0044, the direct downstream gateway-to-mechanics handoff is delegated to SG-SPEC-0057, and
  direct proposal/split detail remains in SG-SPEC-0029.
specification:
  objective: Define one bounded gateway boundary beneath SG-SPEC-0032 that keeps proposal/split mechanics
    inspectable without redefining downstream concrete contracts while delegating the full no-bypass readiness-chain
    contract to SG-SPEC-0044 and the direct downstream gateway-to-mechanics handoff to SG-SPEC-0057.
  scope:
    in:
    - Proposal/split gateway role beneath SG-SPEC-0032.
    - Bounded handoff from SG-SPEC-0032 to SG-SPEC-0029 for concrete mechanics.
    - Delegation of the full no-bypass readiness-chain contract to SG-SPEC-0044.
    - Delegation of the direct downstream gateway-to-mechanics handoff contract to SG-SPEC-0057.
    - Concrete mechanics isolation for queue ranking, continuation-selection policy, and runtime orchestration.
    out:
    - Concrete split lifecycle field-level semantics and payloads owned by SG-SPEC-0029.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Queue ranking formulas, ranking-engine policy, viewer layout, and runtime orchestration.
    - Full no-bypass chain composition and parent-level routing details (delegated to SG-SPEC-0044).
    - Direct downstream gateway-to-mechanics route semantics below the gateway boundary (delegated to
      SG-SPEC-0057).
  gateway_role:
  - SG-SPEC-0043 is the bounded proposal/split gateway child under SG-SPEC-0032.
  - SG-SPEC-0043 preserves inspectability by constraining gateway-level contracts and delegating concrete
    mechanics.
  - SG-SPEC-0043 depends on SG-SPEC-0044 for the readable no-bypass readiness-chain contract while remaining
    the direct gateway boundary consumed by SG-SPEC-0032.
  - SG-SPEC-0043 depends on SG-SPEC-0057 for the direct downstream gateway-to-mechanics handoff contract
    while remaining the direct gateway boundary consumed by SG-SPEC-0032.
  gateway_topology:
  - SG-SPEC-0032 depends on SG-SPEC-0043 as its direct proposal/split gateway dependency.
  - SG-SPEC-0043 depends on SG-SPEC-0029 for concrete mechanics ownership and readiness surface details.
  - SG-SPEC-0032 consumes SG-SPEC-0043 as the sole direct proposal/split-readiness gateway edge.
  delegated_children:
    readiness_chain_contract:
    - SG-SPEC-0044 owns the readable full no-bypass readiness-chain contract for this subcluster.
    downstream_gateway_handoff:
    - SG-SPEC-0057 owns the direct SG-SPEC-0043 -> SG-SPEC-0029 gateway-to-mechanics handoff contract.
  execution_readiness_contract:
  - 'SG-SPEC-0044 defines the full no-bypass readiness chain for this subcluster: SG-SPEC-0026 -> SG-SPEC-0027
    -> SG-SPEC-0032 -> SG-SPEC-0043 -> SG-SPEC-0029.'
  cluster_members:
    concrete_mechanics_contract:
    - SG-SPEC-0029 owns concrete proposal/split lifecycle mechanics and schema details.
  cluster_boundaries:
  - SG-SPEC-0043 does not redefine field-level split artifact schemas, queue ranking formulas, continuation-selection
    policy, or runtime orchestration.
  - SG-SPEC-0043 only defines gateway delegation topology while SG-SPEC-0044 holds the readable non-bypass
    readiness-chain contract and SG-SPEC-0057 holds the direct downstream gateway-to-mechanics handoff
    contract.
  parent_contract:
  - SG-SPEC-0032 must consume SG-SPEC-0043 as its bounded gateway dependency.
  - SG-SPEC-0043 must preserve SG-SPEC-0029 as the concrete mechanics leaf under this subcluster.
  - SG-SPEC-0043 delegates the full no-bypass readiness-chain contract to SG-SPEC-0044.
  - SG-SPEC-0043 delegates the direct downstream gateway-to-mechanics handoff contract to SG-SPEC-0057.
  - SG-SPEC-0043 depends_on SG-SPEC-0044 as the child that owns the readable no-bypass readiness-chain
    contract for this subcluster.
  - SG-SPEC-0043 depends_on SG-SPEC-0057 as the child that owns the direct downstream gateway-to-mechanics
    handoff contract for this subcluster.

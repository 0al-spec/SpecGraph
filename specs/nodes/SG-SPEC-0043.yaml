prompt: Keep this node as the proposal/split readiness boundary that exposes proposal/split mechanics
  to reflective execution without turning graph topology into prose. It should preserve concrete mechanics
  ownership downstream, keep the readable no-bypass chain as a separate concern, and avoid new topology-only
  child slices.
specification:
  objective: Define the proposal/split readiness boundary that lets reflective execution consume proposal/split
    mechanics as one reviewable capability while concrete split lifecycle detail remains owned downstream
    and chain-level no-bypass explanation remains separate.
  scope:
    in:
    - Proposal/split readiness boundary exposed to reflective execution.
    - Reviewable availability of proposal/split mechanics without split payload inspection.
    - Preservation of downstream concrete mechanics ownership.
    - Separation of the full no-bypass readiness-chain contract.
    - Topology-prose discipline for this branch.
    - Boundary isolation from queue ranking, continuation-selection policy, and runtime orchestration.
    out:
    - Concrete split lifecycle field-level semantics and payloads.
    - Continuation-selection policy.
    - Queue ranking formulas, ranking-engine policy, viewer layout, and runtime orchestration.
    - Full no-bypass chain composition, bypass prohibitions, and parent-level routing details.
    - Direct edge, handoff, or route narration that duplicates graph metadata without adding behavior.
  readiness_boundary:
  - Reflective execution treats this node as the reviewable availability boundary for proposal/split mechanics.
  - The boundary answers whether proposal/split mechanics are available for use, not how every split payload
    field behaves.
  review_boundary:
  - Review at this node checks that proposal/split mechanics remain reachable as a coherent capability
    before concrete mechanics are inspected downstream.
  - Reviewers should be able to read this node as a capability boundary without reconstructing a chain
    of neighboring spec IDs.
  mechanics_boundary:
  - Downstream concrete mechanics contracts remain responsible for proposal/split lifecycle and mechanics
    detail.
  - This node may reference that ownership boundary, but it must not duplicate field-level mechanics contracts.
  topology_prose_policy:
  - The direct graph relations around this node are already represented by canonical metadata and derived
    graph artifacts.
  - This spec must not create or require a child whose main purpose is to verbalize an edge, route, handoff
    segment, or delegation path.
  - A new child under this branch is justified only when it adds a separately nameable runtime behavior,
    review rule, policy, protocol, or evidence invariant.
  cluster_boundaries:
  - This node does not redefine field-level split artifact schemas, queue ranking formulas, continuation-selection
    policy, or runtime orchestration.
  - This node explains the domain role of the proposal/split readiness boundary and leaves topology bookkeeping
    to structured graph fields.
  - This node does not restate downstream field-level mechanics beyond identifying the ownership boundary.
  role_boundary:
  - This node owns only the parent-facing proposal/split readiness boundary exposed to reflective execution.
  - This node does not own concrete lifecycle fields, split payloads, no-bypass chain composition, continuation-selection
    policy, queue ranking, viewer layout, or runtime orchestration.
  - Graph placement is represented by metadata edges; prose should describe readiness-boundary semantics
    rather than restating provider routes.
  parent_contract:
  - The readiness-region layer consumes this node as the proposal/split readiness boundary for this mechanics
    region.
  - This node preserves concrete mechanics ownership and readable no-bypass chain explanation as separate
    concerns.
  - This node must not split again solely to name direct edge, handoff, or delegation facts already represented
    by graph metadata.
  invariants:
    PSP-0043-1: Reflective execution may consume this node only as a readiness decision for proposal/split
      mechanics, not as authority for split payload or lifecycle field semantics.
    PSP-0043-2: The downstream mechanics surface remains the concrete owner whenever this node is read
      as the parent-facing readiness surface.
    PSP-0043-3: The readable no-bypass chain contract remains separate; this node may name that role but
      must not reproduce the chain explanation.
    PSP-0043-4: A proposed child under this branch is valid only if it adds a distinct runtime behavior,
      review rule, policy, protocol, or evidence invariant beyond edge, handoff, or delegation narration.

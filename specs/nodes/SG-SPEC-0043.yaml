prompt: Keep SG-SPEC-0043 as the proposal/split readiness boundary that exposes proposal/split mechanics
  to reflective execution without turning graph topology into prose. It should preserve SG-SPEC-0029 as
  the concrete mechanics owner, rely on SG-SPEC-0044 for the readable no-bypass chain, and avoid new topology-only
  child slices.
specification:
  objective: Define the proposal/split readiness boundary that lets reflective execution consume proposal/split
    mechanics as one reviewable capability while concrete split lifecycle detail remains owned downstream
    by SG-SPEC-0029 and chain-level no-bypass explanation remains owned by SG-SPEC-0044.
  scope:
    in:
    - Proposal/split readiness boundary exposed to reflective execution.
    - Reviewable availability of proposal/split mechanics without split payload inspection.
    - Preservation of SG-SPEC-0029 as the concrete mechanics owner.
    - Delegation of the full no-bypass readiness-chain contract to SG-SPEC-0044.
    - Topology-prose discipline for this branch.
    - Boundary isolation from queue ranking, continuation-selection policy, and runtime orchestration.
    out:
    - Concrete split lifecycle field-level semantics and payloads owned by SG-SPEC-0029.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Queue ranking formulas, ranking-engine policy, viewer layout, and runtime orchestration.
    - Full no-bypass chain composition, bypass prohibitions, and parent-level routing details owned by
      SG-SPEC-0044.
    - Direct edge, handoff, or route narration that duplicates graph metadata without adding behavior.
  readiness_boundary:
  - Reflective execution treats this node as the reviewable availability boundary for proposal/split mechanics.
  - The boundary answers whether proposal/split mechanics are available for use, not how every split payload
    field behaves.
  review_boundary:
  - Review at this node checks that proposal/split mechanics remain reachable as a coherent capability
    before concrete mechanics are inspected downstream.
  - Reviewers should be able to read this node as a capability boundary without reconstructing a chain
    of neighboring spec IDs.
  mechanics_boundary:
  - SG-SPEC-0029 remains the owner of concrete proposal/split lifecycle and mechanics detail.
  - SG-SPEC-0043 may reference SG-SPEC-0029 as the downstream mechanics owner, but it must not duplicate
    SG-SPEC-0029 field-level contracts.
  topology_prose_policy:
  - The direct graph relations around SG-SPEC-0043 are already represented by canonical metadata and derived
    graph artifacts.
  - This spec must not create or require a child whose main purpose is to verbalize an edge, route, handoff
    segment, or delegation path.
  - A new child under this branch is justified only when it adds a separately nameable runtime behavior,
    review rule, policy, protocol, or evidence invariant.
  cluster_boundaries:
  - SG-SPEC-0043 does not redefine field-level split artifact schemas, queue ranking formulas, continuation-selection
    policy, or runtime orchestration.
  - SG-SPEC-0043 explains the domain role of the proposal/split readiness boundary and leaves topology
    bookkeeping to structured graph fields.
  - SG-SPEC-0043 does not restate SG-SPEC-0029 field-level mechanics beyond identifying it as the downstream
    mechanics owner.
  parent_contract:
  - SG-SPEC-0032 consumes SG-SPEC-0043 as the proposal/split readiness boundary for this mechanics region.
  - SG-SPEC-0043 preserves SG-SPEC-0029 as the concrete mechanics owner and SG-SPEC-0044 as the readable
    no-bypass chain contract.
  - SG-SPEC-0043 must not split again solely to name direct edge, handoff, or delegation facts already
    represented by graph metadata.
  invariants:
    PSP-0043-1: Reflective execution may consume SG-SPEC-0043 only as a readiness decision for proposal/split
      mechanics, not as authority for split payload or lifecycle field semantics.
    PSP-0043-2: SG-SPEC-0029 remains the downstream mechanics owner whenever SG-SPEC-0043 is read as the
      parent-facing readiness surface.
    PSP-0043-3: SG-SPEC-0044 remains the readable no-bypass chain contract; SG-SPEC-0043 may name that
      role but must not reproduce the chain explanation.
    PSP-0043-4: A proposed child under this branch is valid only if it adds a distinct runtime behavior,
      review rule, policy, protocol, or evidence invariant beyond edge, handoff, or delegation narration.

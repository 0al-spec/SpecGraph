acceptance:
- Defines the proposal/split readiness boundary that tells reflective execution when proposal/split mechanics
  are available without exposing split payload details.
- Preserves a single parent-facing readiness surface for proposal/split mechanics while keeping concrete
  split lifecycle ownership downstream in SG-SPEC-0029.
- Delegates the readable no-bypass readiness-chain explanation to SG-SPEC-0044 instead of restating graph
  topology in this node.
- Treats direct edge, handoff, and delegation facts as graph metadata unless they add a distinct runtime
  or review-observable invariant.
- Keeps SG-SPEC-0043 implementation-agnostic to queue ranking, continuation-selection policy, and runtime
  orchestration.

acceptance:
- 'Defines one human-readable upstream gateway-entry chain beneath SG-SPEC-0044: SG-SPEC-0026 -> SG-SPEC-0027
  -> SG-SPEC-0032 -> SG-SPEC-0043.'
- Forbids upstream proposal/split bypasses that would let SG-SPEC-0026 or SG-SPEC-0027 reach SG-SPEC-0043
  or SG-SPEC-0029 by any shorter or parallel route.
- Explains that this contract stops at SG-SPEC-0043 as the human-reviewable gateway boundary, while SG-SPEC-0043
  and SG-SPEC-0029 govern the downstream gateway-to-mechanics handoff.
- Explains why SG-SPEC-0045 stays one readable upstream role instead of re-splitting the same chain into
  bookkeeping-only child slices.
acceptance_evidence:
- criterion: 'Defines one human-readable upstream gateway-entry chain beneath SG-SPEC-0044: SG-SPEC-0026
    -> SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043.'
  evidence: specification.terminology.gateway_entry_chain, specification.gateway_entry_contract, and specification.entry_chain_steps
    define the exact ordered upstream chain that reaches SG-SPEC-0043 and stops before the downstream
    SG-SPEC-0043 -> SG-SPEC-0029 mechanics handoff.
- criterion: Forbids upstream proposal/split bypasses that would let SG-SPEC-0026 or SG-SPEC-0027 reach
    SG-SPEC-0043 or SG-SPEC-0029 by any shorter or parallel route.
  evidence: specification.invalid_shortcuts names the invalid SG-SPEC-0026 -> SG-SPEC-0032/SG-SPEC-0043/SG-SPEC-0029
    and SG-SPEC-0027 -> SG-SPEC-0043/SG-SPEC-0029 shortcuts, while specification.invariants requires the
    full gateway_entry_chain before SG-SPEC-0043 is reached.
- criterion: Explains that this contract stops at SG-SPEC-0043 as the human-reviewable gateway boundary,
    while SG-SPEC-0043 and SG-SPEC-0029 govern the downstream gateway-to-mechanics handoff.
  evidence: specification.gateway_boundary_reason and specification.boundaries identify SG-SPEC-0043 as
    the stopping point for this contract and explicitly leave the downstream SG-SPEC-0043 -> SG-SPEC-0029
    handoff to SG-SPEC-0043 and SG-SPEC-0029.
- criterion: Explains why SG-SPEC-0045 stays one readable upstream role instead of re-splitting the same
    chain into bookkeeping-only child slices.
  evidence: specification.single_role_rationale explains why the full upstream chain is one readable role,
    specification.boundaries forbids bookkeeping-only re-splitting without a new runtime-observable invariant,
    and top-level supersedes collapses the prior SG-SPEC-0046/0047/0048 split attempt into this single
    contract.
prompt: Define one readable upstream gateway-entry contract beneath SG-SPEC-0044. The spec should say
  how proposal/split readiness reaches SG-SPEC-0043 from SG-SPEC-0026, which upstream shortcuts are invalid,
  why the contract stops at the gateway boundary, and why this node stays a single readable role.
specification:
  objective: Define SG-SPEC-0045 as the single upstream gateway-entry contract beneath SG-SPEC-0044 so
    proposal/split readiness reaches SG-SPEC-0043 only as SG-SPEC-0026 -> SG-SPEC-0027 -> SG-SPEC-0032
    -> SG-SPEC-0043, without re-splitting that same upstream story into bookkeeping-only edge, segment,
    or handoff slices.
  scope:
    in:
    - Upstream proposal/split readiness path from SG-SPEC-0026 to the SG-SPEC-0043 gateway boundary.
    - Upstream no-bypass rules for SG-SPEC-0026 and SG-SPEC-0027 before SG-SPEC-0043 is reached.
    - Human-readable explanation of why this node stops at SG-SPEC-0043 instead of restating downstream
      concrete mechanics.
    - The single readable role that keeps the whole upstream chain inspectable without child-slice bookkeeping.
    out:
    - The downstream SG-SPEC-0043 -> SG-SPEC-0029 gateway-to-mechanics handoff owned by SG-SPEC-0043 and
      SG-SPEC-0029.
    - Concrete proposal/split mechanics payloads, lifecycle details, queue ranking, and runtime orchestration.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Further slice, segment, or edge bookkeeping unless a new runtime-observable invariant appears.
  terminology:
    gateway_entry_chain: The only allowed upstream proposal/split readiness route from SG-SPEC-0026 to
      the human-reviewable gateway boundary at SG-SPEC-0043.
    upstream_shortcut: Any direct or parallel route that lets SG-SPEC-0026 or SG-SPEC-0027 bypass one
      or more required nodes in the gateway_entry_chain before reaching SG-SPEC-0043 or SG-SPEC-0029.
    gateway_boundary: The human-reviewable stopping point at SG-SPEC-0043 where this upstream contract
      ends.
    single_readable_role: The one composed explanatory role that SG-SPEC-0045 serves by keeping the full
      upstream gateway-entry chain readable in one place.
  gateway_entry_contract:
  - For this subtree, upstream proposal/split readiness reaches the gateway_boundary only as SG-SPEC-0026
    -> SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043.
  - 'This contract is upstream-only: it explains how readiness arrives at SG-SPEC-0043 and which upstream_shortcuts
    are invalid before that boundary is reached.'
  entry_chain_steps:
  - SG-SPEC-0026 reaches proposal/split readiness for this contract only through SG-SPEC-0027.
  - SG-SPEC-0027 reaches proposal/split readiness for this contract only through SG-SPEC-0032.
  - SG-SPEC-0032 reaches proposal/split readiness for this contract only through SG-SPEC-0043.
  invalid_shortcuts:
  - SG-SPEC-0026 must not depend on SG-SPEC-0032, SG-SPEC-0043, or SG-SPEC-0029 for proposal/split readiness
    in this subtree.
  - SG-SPEC-0027 must not depend on SG-SPEC-0043 or SG-SPEC-0029 for proposal/split readiness in this
    subtree.
  - No direct or parallel route may let SG-SPEC-0026 or SG-SPEC-0027 reach SG-SPEC-0043 or SG-SPEC-0029
    without traversing the full gateway_entry_chain.
  gateway_boundary_reason:
  - SG-SPEC-0043 is the gateway_boundary because it is the first human-reviewable proposal/split gateway
    dependency consumed directly by SG-SPEC-0032 in this subtree.
  - SG-SPEC-0045 stops at SG-SPEC-0043 because the downstream SG-SPEC-0043 -> SG-SPEC-0029 handoff belongs
    to SG-SPEC-0043 and SG-SPEC-0029 rather than to this upstream entry contract.
  single_role_rationale:
  - 'SG-SPEC-0045 exists to tell one readable upstream story: how proposal/split readiness moves from
    SG-SPEC-0026 to SG-SPEC-0043 and which upstream_shortcuts are invalid.'
  - Re-splitting this node into separate parent, segment, or edge slices would only repartition the same
    already-ordered gateway_entry_chain without adding a new runtime-observable invariant.
  - SG-SPEC-0045 therefore supersedes the prior SG-SPEC-0046/SG-SPEC-0047/SG-SPEC-0048 split attempt and
    remains one single_readable_role.
  boundaries:
  - SG-SPEC-0045 defines only the upstream gateway-entry contract and its no-bypass rules.
  - SG-SPEC-0044 remains the fuller parent contract that includes the downstream SG-SPEC-0029 leaf in
    the complete readiness chain.
  - SG-SPEC-0043 and SG-SPEC-0029 own the downstream gateway-to-mechanics handoff and concrete mechanics
    detail beyond this gateway_boundary.
  - SG-SPEC-0045 must not be re-split into edge, segment, or upstream-handoff slices unless a new runtime-observable
    invariant appears that is not already captured by this single_readable_role.
  invariants:
  - id: PSP-0045-1
    statement: The only allowed upstream gateway_entry_chain in this subtree is SG-SPEC-0026 -> SG-SPEC-0027
      -> SG-SPEC-0032 -> SG-SPEC-0043.
  - id: PSP-0045-2
    statement: Direct or parallel upstream_shortcuts from SG-SPEC-0026 to SG-SPEC-0032, SG-SPEC-0043,
      or SG-SPEC-0029, or from SG-SPEC-0027 to SG-SPEC-0043 or SG-SPEC-0029, are invalid in this subtree.
  - id: PSP-0045-3
    statement: SG-SPEC-0045 stops at SG-SPEC-0043 as the gateway_boundary and does not restate the downstream
      SG-SPEC-0043 -> SG-SPEC-0029 mechanics handoff.
  - id: PSP-0045-4
    statement: SG-SPEC-0045 remains one single_readable_role for the full upstream gateway_entry_chain
      and must not be decomposed into bookkeeping-only child slices unless a new runtime-observable invariant
      appears.

    SG-SPEC-0046 for the SG-SPEC-0026 → SG-SPEC-0027 upstream parent-consumer path and SG-SPEC-0047 for
    the SG-SPEC-0027 → SG-SPEC-0032 → SG-SPEC-0043 downstream gateway segment.'
  scope:

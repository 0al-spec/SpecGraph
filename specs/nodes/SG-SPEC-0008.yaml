prompt: Refine SG-SPEC-0007 by extracting the bounded concern of explicit project-memory consultation
  during intent mediation. Define consulted project memory, including PageIndex-backed conversation recall,
  as declared mediated context with preservation and traceability expectations. Keep the child scoped
  to the policy boundary for explicit consultation and future operator-request memory policy adjacency;
  do not define GUI protocol, storage layout, exact retrieval mechanics, or model workflow.
specification:
  objective: 'Define the bounded policy for when mediated discovery explicitly consults project memory,
    including PageIndex-backed conversation recall, so that the consultation is declared, preserved, and
    assessable without treating recalled context as implicit authority.

    '
  scope:
    in:
    - Explicit declaration of project-memory consultation during mediated discovery
    - Consulted project memory as mediated context distinct from direct user wording
    - Minimal traceability expectations for source class and attributable recall
    - Policy-level quality expectations for whether recalled context materially clarified ambiguity
    out:
    - GUI protocol or operator-facing controls for invoking memory consultation
    - Storage layout, repository schema, or archival structure for project memory
    - Exact retrieval mechanics, ranking logic, or PageIndex query behavior
    - Scoring formulas, thresholds, or automated grading algorithms for consultation quality
    - Model workflow, prompt choreography, or supervisor execution procedure
  terminology:
    consulted_project_memory: 'Project-specific remembered context consulted during mediated discovery,
      such as prior project notes, previously mediated constraints, or recalled conversation context,
      which may inform interpretation only when its use is explicitly declared.

      '
    pageindex_backed_conversation_recall: 'A consulted_project_memory instance derived from PageIndex-backed
      recall of prior conversation material that is relevant to interpreting the current raw goal signal.

      '
    declared_memory_consultation: 'The explicit mediation-record statement that consulted_project_memory
      was used, including preservation of the consulted source class and enough attribution to distinguish
      recalled context from direct current-turn wording.

      '
    consulted_source_class: 'The preserved category of consulted_project_memory, such as prior conversation
      recall, project note, or other project-memory source, recorded so that downstream review can inspect
      what kind of memory informed mediation without requiring retrieval mechanics.

      '
    material_ambiguity_clarification: 'The condition in which consulted_project_memory resolved or narrowed
      an ambiguity that remained in the current raw goal signal or mediation context, rather than merely
      restating background context or replacing current user evidence.

      '
  consultation_policy:
    declaration_rules:
    - Project memory consultation during mediated discovery is permitted only as declared_memory_consultation.
    - Consulted project memory must be treated as explicit mediated context, not as an implicit side channel
      or silent prior assumption.
    - PageIndex-backed conversation recall is one form of consulted_project_memory and must be declared
      when it informs interpretation of the current raw goal signal.
    authority_boundary:
    - Consulted project memory may clarify interpretation but does not override the current raw goal signal
      by default.
    - Recalled project context remains assistive evidence for mediation and does not become canonical
      authority merely because it was remembered or retrieved.
    - Declared consultation does not require that memory be used in every mediation step; it only governs
      cases where consultation materially participates in interpretation.
  traceability_policy:
    consultation_traceability:
    - Each declared_memory_consultation must preserve the consulted_source_class used during mediation.
    - The mediation record must distinguish recalled project context from direct user wording so review
      can inspect what was remembered versus what was explicitly said in the current request.
    - When PageIndex-backed conversation recall is consulted, the resulting context must remain attributable
      as recalled conversation material rather than flattened into an unattributed rewrite of the present
      request.
    - External browsing, when used during the same mediation task, must remain distinguishable from consulted_project_memory
      and must not be represented as project-memory recall or as attributed PageIndex-backed conversation
      recall.
    preservation_expectations:
    - Preserved consultation detail should be sufficient for downstream inspection of declared use, consulted
      source class, and the role the recalled context played in clarifying ambiguity.
    - This node does not require a particular storage representation, retrieval reference format, or repository
      layout for preserving that detail.
  quality_policy:
  - Consultation quality depends first on whether project-memory use was explicitly declared when used
    during mediated discovery.
  - Consultation quality depends on preservation of consulted_source_class so the mediation record exposes
    what kind of project memory informed interpretation.
  - When a mediation task is resolving project-internal ambiguity or recalling prior project-specific
    constraints, consultation quality is higher when declared local project memory such as PageIndex-backed
    conversation recall is preferred before external browsing.
  - Consultation quality depends on whether the recalled context materially clarified ambiguity in the
    current mediation task rather than silently replacing or overshadowing direct user evidence.
  - This node defines policy expectations for evaluation but does not define scoring formulas, thresholds,
    or automated ranking procedures.
  adjacency_notes:
  - A future operator-request memory policy may define when an operator explicitly asks for memory consultation
    or memory suppression, but that request-handling policy is not resolved here.
  - SG-SPEC-0007 remains the broader mediation-boundary parent; this child only isolates the explicit
    consultation policy for project memory within that boundary.
  examples:
  - name: Declared recall for omitted constraint
    description: A current request omits a previously discussed project constraint, and mediated discovery
      consults PageIndex-backed conversation recall. The mediation record declares that consultation,
      preserves the source class as conversation recall, and treats the recalled constraint as context
      that clarifies ambiguity rather than as silent replacement for the current wording.
  - name: Undeclared memory is non-compliant
    description: A mediator uses remembered project context to reinterpret a request but does not declare
      that memory use or preserve its source class. The consultation fails this node's policy even if
      the remembered detail later proves correct.
  - name: External browsing stays source-distinct
    description: A mediation task first consults declared local project memory to resolve a project-specific
      ambiguity, then uses external browsing for supplemental context. The mediation record keeps the
      browsed material source-distinct and does not represent it as project-memory recall or attributed
      conversation recall.

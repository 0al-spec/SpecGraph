acceptance:
- Defines project memory consultation, including PageIndex-backed conversation recall, as explicit mediated
  context that must be declared and preserved rather than treated as an implicit side channel
- Defines the minimal traceability contract for consulted project memory by preserving the consulted source
  class, distinguishing recalled context from direct user wording, and keeping PageIndex-backed conversation
  recall attributable when used
- Defines mediated consultation quality only at the policy boundary by requiring evaluation of declared
  use, preserved source class, whether declared local project memory was preferred before external browsing
  for project-internal ambiguity, and whether recalled context materially clarified ambiguity without
  prescribing retrieval mechanics or scoring formulas
- Defines the source-boundary rule that external browsing, when used during the same mediation task, remains
  distinct from consulted project memory and must not be represented as project-memory recall or attributed
  conversation recall
- Keeps GUI protocol, storage layout, exact retrieval mechanics, and model workflow explicitly out of
  scope while naming future operator-request memory policy as adjacent follow-on work

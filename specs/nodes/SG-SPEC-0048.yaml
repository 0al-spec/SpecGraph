acceptance:
- Defines SG-SPEC-0048 as the bounded direct proposal/split gateway edge contract for SG-SPEC-0032 ->
  SG-SPEC-0043 under SG-SPEC-0047.
- Forbids SG-SPEC-0032 from bypassing SG-SPEC-0043 for proposal/split readiness while SG-SPEC-0043 is

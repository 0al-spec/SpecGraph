- Keeps the SG-SPEC-0027 readiness path constrained to SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043 before
  delegation to SG-SPEC-0029.
acceptance_evidence:
- criterion: Defines SG-SPEC-0048 as the bounded direct proposal/split gateway edge contract for SG-SPEC-0032
    -> SG-SPEC-0043 under SG-SPEC-0047.
  evidence: specification.edge_contract identifies SG-SPEC-0048 as the direct SG-SPEC-0032 -> SG-SPEC-0043
    edge slice and specification.parent_contract requires SG-SPEC-0047 to consume it.
- criterion: Forbids SG-SPEC-0032 from bypassing SG-SPEC-0043 for proposal/split readiness while SG-SPEC-0043
    is present.
  evidence: specification.no_bypass_rules requires SG-SPEC-0032 to route proposal/split readiness through
    SG-SPEC-0043 and forbids direct dependency from SG-SPEC-0032 to SG-SPEC-0043 downstream readiness

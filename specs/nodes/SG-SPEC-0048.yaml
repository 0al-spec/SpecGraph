specification:
  objective: Materialize a single bounded edge slice for SG-SPEC-0032 -> SG-SPEC-0043 so SG-SPEC-0047
    can compose the downstream segment while this node owns only the direct gateway-edge contract.
  scope:
    in:
    - Direct SG-SPEC-0032 -> SG-SPEC-0043 gateway-edge contract under SG-SPEC-0047.
    - Sole-direct-gateway requirement for SG-SPEC-0032 while SG-SPEC-0043 exists.
    - Parent-facing consumption contract for this direct edge slice.
    out:
    - SG-SPEC-0027 -> SG-SPEC-0032 -> SG-SPEC-0043 segment topology and non-bypass chain composition.
    - Concrete SG-SPEC-0043 -> SG-SPEC-0029 delegation mechanics and readiness semantics.
    - Ranking formulas, continuation policy, or runtime orchestration policy.
  edge_contract:
  - SG-SPEC-0032 depends on SG-SPEC-0043 as its direct proposal/split gateway dependency in this segment.
  - SG-SPEC-0043 is the sole direct gateway node consumed by SG-SPEC-0032 for this segment.
  edge_constraints:
  - While SG-SPEC-0043 exists, SG-SPEC-0032 must keep SG-SPEC-0043 as its sole direct proposal/split gateway
    dependency for this segment.
  - SG-SPEC-0032 must not define a parallel direct proposal/split gateway dependency in place of or alongside
    SG-SPEC-0043 for this segment.
  parent_contract:
  - SG-SPEC-0047 consumes SG-SPEC-0048 as the sole source of the direct SG-SPEC-0032 -> SG-SPEC-0043 gateway-edge
    contract.
  boundaries:
  - SG-SPEC-0048 does not define SG-SPEC-0027 segment topology, parent-integration non-bypass routing,
    or broader chain composition.
  - SG-SPEC-0048 does not define SG-SPEC-0043 -> SG-SPEC-0029 delegation mechanics, concrete readiness
    semantics, ranking policy, or runtime orchestration.

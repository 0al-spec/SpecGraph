prompt: Define the bounded child beneath SG-SPEC-0032 for proposal/split readiness verdict semantics and
  reviewer meaning. Keep SG-SPEC-0032 as the coarse readiness region and do not restate graph topology
  or concrete split mechanics.
specification:
  objective: Define the proposal/split readiness verdict meanings and reviewer evidence expectations that
    make the SG-SPEC-0032 readiness region reviewable without forcing reflective execution or reviewers
    to inspect concrete split payloads, proposal-lane runtime details, queue internals, or graph topology.
  scope:
    in:
    - Proposal/split readiness verdict semantics for the SG-SPEC-0032 readiness region.
    - Reviewer meaning of satisfied, not_available, and unresolved readiness verdicts.
    - Evidence expectations for each readiness verdict.
    - Boundary alignment with the SG-SPEC-0043 readiness decision surface.
    out:
    - Concrete split payload schemas and lifecycle field semantics.
    - Reviewer action transitions, reviewer disposition requirements, or remediation routing after readiness
      verdict assignment.
    - Proposal-lane runtime details and queue internals.
    - Continuation-selection policy, queue ranking, viewer layout, and runtime orchestration.
    - Graph topology narration, edge-route explanation, or bookkeeping-only child ownership.
  terminology:
    readiness_verdict: The reviewable outcome that states whether proposal/split mechanics are available
      as a capability for the current reflective execution context.
    satisfied: The readiness verdict meaning that proposal/split mechanics are available as a reviewable
      capability for the current reflective execution context.
    not_available: The readiness verdict meaning that proposal/split mechanics are reviewably unavailable
      for the current reflective execution context.
    unresolved: The readiness verdict meaning that availability cannot be determined at this level without
      leaking into concrete mechanics detail, queue state, runtime detail, or topology reconstruction.
  verdict_semantics:
    satisfied:
    - The satisfied verdict means the readiness boundary can identify a reviewable downstream availability
      result for proposal/split mechanics and that result reports satisfied availability.
    - A satisfied verdict authorizes only consumption of proposal/split readiness as a capability signal;
      it does not authorize concrete split lifecycle interpretation or continuation selection by mechanics
      fields.
    not_available:
    - The not_available verdict means the readiness boundary can identify a reviewable downstream availability
      result and that result reports proposal/split mechanics unavailable for the current context.
    - A not_available verdict suppresses consumption of proposal/split readiness until the owning mechanics
      boundary clears the unavailable condition.
    unresolved:
    - The unresolved verdict means reviewers cannot determine proposal/split readiness without inspecting
      split payload schemas, lifecycle fields, proposal-lane runtime details, queue internals, or graph
      topology reconstruction.
    - An unresolved verdict is a refinement signal for the readiness region or boundary; it is not permission
      to infer availability from neighboring spec placement.
  verdict_assignment_precedence:
  - Assign satisfied only when the readiness boundary or downstream availability result is present, reviewable,
    and reports satisfied proposal/split mechanics availability.
  - Assign not_available only when the readiness boundary or downstream availability result is present,
    reviewable, and reports determinate unavailable proposal/split mechanics.
  - Assign unresolved when the reviewer lacks a reviewable downstream availability result or must inspect
    split payload detail, lifecycle field detail, proposal-lane runtime detail, queue internal detail,
    or topology reconstruction to decide availability.
  - Missing evidence, ambiguous evidence, or leaky evidence must remain unresolved unless a reviewable
    downstream negative availability result explicitly supports not_available.
  reviewer_meaning:
  - Reviewers read satisfied as proof that proposal/split mechanics are available only at the readiness-capability
    level.
  - Reviewers read not_available as a determinate negative availability result, not as missing evidence
    or a request to inspect concrete mechanics fields.
  - Reviewers read unresolved as evidence of a leaky readiness boundary or missing availability signal
    that must be narrowed before reflective execution can consume proposal/split readiness.
  verdict_evidence_requirements:
    satisfied:
    - Evidence must name the reviewable readiness boundary or downstream availability result that reports
      satisfied availability.
    - Evidence must avoid copying split payload schemas, lifecycle fields, queue formulas, runtime state,
      or graph-edge routes into the verdict.
    not_available:
    - Evidence must name the reviewable readiness boundary or downstream availability result that reports
      unavailable proposal/split mechanics.
    - Evidence must identify the unavailable condition at readiness level, such as missing mechanics availability
      or blocked readiness ownership, without resolving concrete mechanics fields here.
    unresolved:
    - Evidence must name the leak or missing signal that prevents readiness determination.
    - Evidence should classify the leak as split_payload_detail, lifecycle_field_detail, proposal_lane_runtime_detail,
      queue_internal_detail, or topology_reconstruction.
  boundary_contract:
  - SG-SPEC-0043 remains the readiness boundary that exposes proposal/split mechanics availability to
    the SG-SPEC-0032 readiness region.
  - SG-SPEC-0058 interprets readiness verdict meanings for reviewers; it does not redefine the boundary's
    downstream mechanics ownership.
  - Reviewer action after verdict assignment remains outside SG-SPEC-0058; this node stops at verdict
    meaning and verdict evidence.
  parent_region_contract:
  - SG-SPEC-0032 remains the coarse proposal/split readiness region exposed to reflective execution.
  - SG-SPEC-0058 supplies the verdict semantics and reviewer meaning needed to keep that region reviewable
    without expanding SG-SPEC-0032.
  - SG-SPEC-0058 must not become a topology-prose node; graph placement remains represented by canonical
    metadata.
  invariants:
    PSP-0058-1: A satisfied verdict is only a readiness-capability signal and does not grant authority
      over concrete split lifecycle fields or continuation-selection policy.
    PSP-0058-2: A not_available verdict is a determinate readiness-level negative result rather than an
      invitation to inspect concrete mechanics fields inside this node.
    PSP-0058-3: An unresolved verdict identifies a leaky or missing readiness signal and must not be converted
      into availability by graph placement or topology reconstruction.

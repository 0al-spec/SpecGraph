acceptance:
- Defines SG-SPEC-0058 as the bounded child under SG-SPEC-0032 for proposal/split readiness verdict semantics
  and reviewer meaning.
- Defines the satisfied, not_available, and unresolved verdict meanings for proposal/split readiness without
  exposing split payload schemas, queue internals, proposal-lane runtime details, or graph topology narration.
- Defines the reviewer evidence expected for each readiness verdict so review can confirm availability
  meaning without resolving concrete mechanics fields.
- Defines verdict assignment precedence so incomplete evidence remains unresolved rather than being collapsed
  into not_available, while determinate downstream negative availability remains not_available.
- Preserves SG-SPEC-0032 as the coarse readiness region and SG-SPEC-0043 as the readiness boundary without
  redefining continuation selection, queue ranking, viewer layout, or runtime orchestration.

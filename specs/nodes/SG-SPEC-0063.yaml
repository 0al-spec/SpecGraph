acceptance:
- Defines SG-SPEC-0063 as the intermediate semantic cluster parent under SG-SPEC-0001 for realization,
  observation, adoption, executable traceability, and derived metric-family semantics.
- Groups runtime observability entities, adoption-layer entities, executable-layer traceability, derived
  metric family boundaries, and aggregate evidence projection semantics without redefining the bounded
  contracts owned by those children.
- Defines root dependency routing so SG-SPEC-0001 can depend on one realization-and-observation aggregate
  while concrete child specs keep their existing semantic ownership and dependencies.
- Defines cross-member handoff semantics so realization, observation, adoption, executable, and metric-family
  concerns route to the owning member spec when evidence or gaps span more than one member boundary.
- Keeps implementation tooling, telemetry collection, dashboards, metric formulas, adoption operations,
  and repository layout out of scope for this cluster.

prompt: Define how SpecGraph should retrospectively refactor already-grown parts of the graph when existing
  specs are too broad or structurally poor, without letting supervisor improvise broad rewrites across
  live canonical subgraphs.
specification:
  objective: Define the first bounded policy for retrospective graph refactoring over existing live spec
    regions after the graph has already grown suboptimally.
  scope:
    in:
    - Retrospective split or narrowing of already-existing oversized or weakly structured specs
    - Selection and staging of one bounded retrospective refactor target inside a live graph
    - Coordination between retrospective local refactor, ancestor reconciliation, and proposal precedence
    - Review and safety requirements before applying retrospective structural changes
    out:
    - Metric formulas or scoring weights
    - Batch refactor orchestration across many targets at once
    - Viewer UX for visualizing retrospective refactor waves
    - Fully automatic governance or ontology rewrites
  terminology:
    retrospective_refactor_pass: A bounded graph-refactoring pass aimed at improving an already-existing
      live graph region whose structure has become suboptimal after earlier growth.
    live_graph_region: A connected set of current canonical spec nodes that already participate in active
      refinement chains, proposals, or accepted graph structure.
    refactor_wave: An ordered sequence of bounded retrospective refactor passes and reconciliations over
      related live graph regions.
    accepted_child_work: Previously created or approved child specs whose stable IDs, lineage, and accepted
      refinement outcomes must not be silently invalidated by a later retrospective pass.
  retrospective_policy:
    target_selection:
    - Retrospective refactoring begins from one explicit target inside a live graph region rather than
      an unrestricted batch rewrite.
    - Candidate targets may arise from graph-health signals, approved proposals, or explicit operator
      intent, but the selected pass remains bounded to one primary parent spec at a time.
    safety:
    - A retrospective pass must preserve stable IDs for surviving parent and child specs unless a separate
      governance-class change explicitly authorizes supersession or replacement.
    - The pass must preserve or explicitly restate lineage so accepted_child_work remains traceable after
      restructuring.
    - Local retrospective refactor must not silently absorb governance-class ontology or policy changes.
    boundaries:
    - A local retrospective refactor remains parent-centric and bounded even when it triggers follow-up
      reconciliation in nearby ancestors.
    - Upstream ancestor reconciliation after retrospective change is limited to links, blockers, evidence,
      and status-readiness; it is not itself a license for a second broad restructuring pass.
    - If the desired restructuring would merge branches, replace stable IDs, or redefine ontology/policy,
      the work is governance-class and must move into proposal/review flow rather than local direct application.
    coordination:
    - Local retrospective refactor may trigger narrow ancestor reconciliation when upstream nodes become
      semantically unlocked or structurally stale after the change.
    - If the required restructuring exceeds one bounded parent-centric pass, the work must decompose into
      multiple explicit retrospective steps or escalate into proposal/governance flow.
    required_artifacts:
    - Derived graph-health signals and explicit proposals remain the first-class trigger artifacts before
      live retrospective writeback.
    - Applying retrospective refactor to a live graph region requires an explicit reviewable artifact
      that describes intended parent/child structure, lineage preservation, and downstream reconciliation
      scope.

prompt: Keep SG-SPEC-0005 as the overview and execution-boundary node for retrospective graph refactoring,
  retaining the bounded-pass definition, parent-selection and lineage-preservation safety, the boundary
  between local refactor versus ancestor or governance-class work, the canonical writeback envelope, and
  the implementation-agnostic constraint while delegating explicit live-region application artifacts and
  review gates to child spec SG-SPEC-0013 before writeback.
specification:
  objective: Define the bounded overview policy for retrospective graph refactoring over existing live
    spec regions after the graph has already grown suboptimally, including the direct-writeback envelope
    for one live-region pass and the execution boundary that leaves concrete live-region application prerequisites
    to child spec SG-SPEC-0013.
  scope:
    in:
    - Retrospective split or narrowing of already-existing oversized or weakly structured specs
    - Selection and staging of one bounded retrospective refactor target inside a live graph
    - Explicit operator intent precedence in bounded target selection
    - Coordination between retrospective local refactor, ancestor reconciliation, and proposal precedence
    - Containment of direct canonical writeback during one retrospective pass
    - Execution-boundary delegation for what must be governed by a child spec before live retrospective
      writeback can proceed
    out:
    - Metric formulas or scoring weights
    - Batch refactor orchestration across many targets at once
    - Viewer UX for visualizing retrospective refactor waves
    - Fully automatic governance or ontology rewrites
    - Concrete live-region application artifact contracts, proposal-state readiness criteria, and review-gate
      pass/fail outcomes for pre-writeback, delegated to SG-SPEC-0013
    - Implicit region-wide canonical rewrites inferred only from adjacency to the selected target
  terminology:
    retrospective_refactor_pass: A bounded graph-refactoring pass aimed at improving an already-existing
      live graph region whose structure has become suboptimal after earlier growth.
    live_graph_region: A connected set of current canonical spec nodes that already participate in active
      refinement chains, proposals, or accepted graph structure.
    refactor_wave: An ordered sequence of bounded retrospective refactor passes and reconciliations over
      related live graph regions.
    accepted_child_work: Previously created or approved child specs whose stable IDs, lineage, and accepted
      refinement outcomes must not be silently invalidated by a later retrospective pass.
    retrospective_writeback_envelope: The explicit set of canonical spec nodes that one retrospective_refactor_pass
      may mutate directly, limited to the primary target parent, direct child outcomes rooted in that
      parent, and separately listed narrow ancestor reconciliations.
    retrospective_application_boundary: The execution boundary where SG-SPEC-0005 stops at target, lineage,
      local-versus-governance, and writeback-envelope policy and requires SG-SPEC-0013 to govern the concrete
      live-region application artifacts, proposal-state gates, and review gates before canonical writeback.
  retrospective_policy:
    target_selection:
    - Retrospective refactoring begins from one explicit target inside a live graph region rather than
      an unrestricted batch rewrite.
    - Candidate targets may arise from graph-health signals, approved proposals, or explicit operator
      intent, but the selected pass remains bounded to one primary parent spec at a time.
    - Explicit operator intent identifies the primary target parent and scope and takes priority over
      heuristic candidate ordering and signal ranking.
    safety:
    - A retrospective pass must preserve stable IDs for surviving parent and child specs unless a separate
      governance-class change explicitly authorizes supersession or replacement.
    - The pass must preserve or explicitly restate lineage so accepted_child_work remains traceable after
      restructuring.
    - Local retrospective refactor must not silently absorb governance-class ontology or policy changes.
    boundaries:
    - A local retrospective refactor remains parent-centric and bounded even when it triggers follow-up
      reconciliation in nearby ancestors.
    - Upstream ancestor reconciliation after retrospective change is limited to links, blockers, evidence,
      and status-readiness; it is not itself a license for a second broad restructuring pass.
    - If the desired restructuring would merge branches, replace stable IDs, or redefine ontology/policy,
      the work is governance-class and must move into proposal/review flow rather than local direct application.
    writeback_envelope:
    - Each retrospective pass must declare one retrospective_writeback_envelope before any live canonical
      writeback occurs.
    - The envelope may include exactly one primary target parent spec plus any direct child outcomes that
      narrow, split, or restate that parent within the same pass.
    - The envelope may also include explicitly named ancestor reconciliation nodes, but only for updates
      to links, blockers, acceptance_evidence, prompt wording, and status-readiness that become stale
      because of the target-parent change.
    - Existing sibling branches, cousin branches, and other adjacent nodes in the same live_graph_region
      remain read-only during the pass unless they become the explicit target of a later retrospective
      step or a separately governed proposal/application path.
    - If the intended direct edits cannot be fully described by one retrospective_writeback_envelope without
      treating multiple parent branches as co-equal targets, the work exceeds local retrospective scope
      and must decompose into later passes or escalate into proposal/governance flow.
    coordination:
    - Local retrospective refactor may trigger narrow ancestor reconciliation when upstream nodes become
      semantically unlocked or structurally stale after the change.
    - If the required restructuring exceeds one bounded parent-centric pass, the work must decompose into
      multiple explicit retrospective steps or escalate into proposal/governance flow.
    application_boundary:
    - SG-SPEC-0005 governs whether a retrospective change remains a bounded local pass and what direct
      canonical writes may fit inside one retrospective_writeback_envelope; it does not define the concrete
      live-region application artifacts or review checklist.
    - No live retrospective writeback may proceed from this node's policy alone; the selected pass must
      also satisfy the explicit pre-writeback readiness package defined by SG-SPEC-0013 for that envelope.
    - SG-SPEC-0005 constrains structural scope and candidate progression only; it does not define proposal-lane
      state transitions, gate algorithms, or proposal-artifact schemas. SG-SPEC-0013 owns the reviewable
      application package, pass/fail gate outcomes, and pre-writeback refusal conditions.
    - SG-SPEC-0013 owns the concrete live-region application artifact contract, proposal-state gate semantics,
      review-gate semantics, and refusal conditions for pre-writeback application readiness, while SG-SPEC-0005
      remains the overview and execution-boundary node.

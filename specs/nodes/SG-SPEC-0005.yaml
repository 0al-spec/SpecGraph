acceptance:
- Defines retrospective graph refactoring as a bounded pass over already-existing suboptimal spec regions,
  not only during creation-time refinement
- Defines how an existing oversized or weakly structured parent spec can be selected for retrospective
  split or narrowing without invalidating stable IDs, lineage, or already accepted child work
- Defines the boundary between local retrospective refactor, upstream ancestor reconciliation, and governance-class
  restructuring of the graph
- Defines which derived artifacts, proposals, and review gates must exist before retrospective refactors
  can be applied to live graph regions
- Remains implementation-agnostic about metric formulas, batch scheduling strategy, and viewer UX for
  refactor waves

acceptance:
- Defines SG-SPEC-0049 as the bounded derived-signal child under SG-SPEC-0003 for subtree shape and lower-boundary
  handoff interpretation.
- Defines first derived subtree-shape signals for serial ladders, over-atomized subtrees, missing aggregate
  grouping, depth without breadth, delegation-only chains, role-obscured nodes, and bookkeeping-only nodes.
- Defines lower-boundary handoff signals, their distinction from subtree-shape pressure, and their non-canonical
  meaning so further graph decomposition can be redirected without introducing a tracked Tech Spec layer.
- Defines how evaluator and supervisor may consume these signals as advisory penalties, rebalance or handoff
  hints, and proposal-first triggers while leaving formulas, thresholds, queue-control truth tables, and
  tracked-layer design out of scope.

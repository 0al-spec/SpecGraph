prompt: Materialize SG-SPEC-0049 as the bounded child beneath SG-SPEC-0003 for derived subtree-shape and
  lower-boundary handoff signals. It should let evaluator and supervisor consume advisory graph-health
  signals for over-serialized, role-obscured, or graph-layer-exhausted subtrees without introducing a
  tracked Tech Spec layer or concrete scoring formulas.
specification:
  objective: Define the bounded derived signal contract for subtree-shape pathologies and lower-boundary
    handoff detection so SG-SPEC-0003 can delegate detailed signal semantics, including human-readable
    node-role loss and bookkeeping-only decomposition drift, without expanding canonical ontology into
    tracked implementation-layer design.
  scope:
    in:
    - Derived signal families for subtree shape over bounded canonical subtrees
    - Role-legibility and bookkeeping-drift inspection for bounded canonical nodes within those subtrees
    - Derived lower-boundary handoff signals for subtrees whose remaining detail is no longer graph-native
    - Derivation boundary between regrouping pressure and lower-boundary handoff pressure
    - Advisory consumer contract for evaluator and supervisor
    - Non-canonical persistence and proposal-first redirection boundary for these signals
    out:
    - Numeric formulas, scoring weights, or hard thresholds
    - Automatic canonical rewrites, lifecycle transitions, or authority expansion
    - Tracked Tech Spec layer, Tech Spec schema, or implementation-task management
    - Queue-control semantics, continuation-selection truth tables, or viewer UX
  terminology:
    subtree_shape_signal: A derived graph-health signal about the navigability and grouped readability
      of a bounded canonical subtree rather than the atomicity of one node.
    lower_boundary_handoff_signal: A derived graph-health signal that a bounded subtree has likely captured
      its graph-native structure and that further decomposition would mostly express implementation-facing
      detail.
    graph_native_aggregate_concern: A concern whose next useful refinement still improves the graph as
      a concept map by introducing a readable aggregate or sibling grouping rather than a mostly serial
      technical ladder.
    handoff_candidate_artifact: A derived proposal or external-facing handoff artifact that may be suggested
      when lower_boundary_handoff_signal pressure persists, without itself becoming canonical graph truth.
    node_role: The human-comprehensible bounded responsibility a node plays in system meaning, independent
      of the fact that it owns, consumes, or delegates adjacent nodes.
    composed_function: The new system-facing function, invariant, or reviewable contract that a node synthesizes
      by composing child concerns plus its own boundary logic.
    bookkeeping_only_decomposition: A refinement move whose text mostly restates ownership, delegation,
      edge routing, or slice placement without making the node_role or composed_function more legible.
  signal_families:
    subtree_shape:
    - signal: serial_refinement_ladder
      meaning: A subtree is becoming mostly one vertical refinement path and is losing readable sibling
        grouping.
      indicative_evidence:
      - one-child `refines` chains keep growing across the same bounded region
      - breadth does not emerge as depth grows
      - intermediate nodes primarily restate delegation or handoff boundaries
    - signal: over_atomized_subtree
      meaning: Local atomicity has become too fine-grained for practical subtree comprehension.
      indicative_evidence:
      - many nodes have very small bounded payloads
      - the subtree is deeper than it is broad
      - no stable grouped cluster makes the region readable as one concern
    - signal: missing_aggregate_node
      meaning: Related child concerns are present or implied, but no stable aggregate node groups them
        into one readable cluster.
      indicative_evidence:
      - a readable cluster would benefit from one aggregate parent but no such node exists
      - sibling grouping is absent despite recurring related children or repeated delegation
    - signal: depth_without_breadth
      meaning: Depth is growing faster than effective breadth in a way that suggests serialization pressure.
      indicative_evidence:
      - subtree depth outpaces effective breadth across the same region
      - one-child internal nodes dominate the path
    - signal: delegation_only_chain
      meaning: Consecutive nodes mostly define ownership or handoff boundaries rather than distinct concept
        groups.
      indicative_evidence:
      - neighboring nodes repeat parent-child delegation language with little new grouping value
      - boundary-only or routing-only text dominates a serial chain
    - signal: role_obscured_node
      meaning: A node stops reading as a bounded role in the system and becomes understandable mainly
        through neighboring spec IDs, edge placement, or decomposition bookkeeping.
      indicative_evidence:
      - the title, objective, or acceptance focus on edge slices, segments, ownership, or child consumption
        more than on the node_role it serves
      - a human reader must inspect adjacent spec IDs to infer what system-facing responsibility the node
        actually carries
      - the node names what it delegates or owns but does not clearly state the composed_function or distinct
        invariant it adds
    - signal: bookkeeping_only_node
      meaning: A node primarily restates decomposition bookkeeping and contributes little distinct graph-native
        semantic value beyond ownership or handoff structure.
      indicative_evidence:
      - owns, consumes, delegates, edge, segment, slice, or handoff language dominates the node's bounded
        contract
      - neighboring nodes already express the same direct route or boundary and this node adds little
        new runtime-observable or review-observable meaning
      - deleting or merging the node would mostly collapse structural bookkeeping rather than erase a
        distinct named role or composed_function
    lower_boundary_handoff:
    - signal: lower_boundary_handoff_candidate
      meaning: A subtree has likely reached the lower boundary of useful graph-native refinement and should
        prefer proposal-first handoff or stop-or-redirect behavior over another canonical child unless
        a new aggregate concern appears.
      indicative_evidence:
      - subtree-shape signals recur in the same bounded region
      - remaining unresolved detail is increasingly execution-facing, sequencing-facing, payload-facing,
        or field-facing
      - new candidate children would mostly narrow technical mechanics rather than introduce graph-native
        aggregate structure
    - signal: graph_layer_exhausted_for_subtree
      meaning: Further canonical decomposition would mainly serialize implementation detail and no longer
        improve the graph as a readable concept map.
      indicative_evidence:
      - local atomicity improves while subtree readability worsens
      - sibling grouping stops emerging
      - the subtree is more useful as handoff context than as another graph-native branch
  derivation_contract:
    bounded_region_rules:
    - A derived signal instance must be attributable to one bounded canonical subtree or bounded path
      segment rather than to the graph as a whole.
    - Derivation may combine canonical subtree shape with bounded run-context observations about the type
      of unresolved detail that remains.
    - Derivation may inspect bounded node text such as title, objective, acceptance, and parent/child
      contract language when role legibility or bookkeeping drift is the concern.
    family_distinction:
    - Subtree-shape signals indicate weak graph-native grouping and still leave room for regrouping, aggregate-node
      creation, or sibling rebalance within the graph.
    - lower_boundary_handoff_candidate is appropriate only when subtree-shape pressure coexists with evidence
      that the next useful detail is no longer primarily graph-native.
    - graph_layer_exhausted_for_subtree is appropriate only when additional canonical decomposition is
      unlikely to restore readable sibling grouping or aggregate structure within the same bounded region.
    no_conflation_rules:
    - missing_aggregate_node by itself is not evidence that the graph layer is exhausted if a graph_native_aggregate_concern
      can still be named.
    - delegation_only_chain or serial_refinement_ladder by themselves are not evidence that implementation-facing
      handoff is correct unless the remaining unresolved detail has crossed the lower graph-native boundary.
    - role_obscured_node or bookkeeping_only_node indicate human-legibility failure and semantic drift,
      but do not by themselves prove that the correct next move is deeper decomposition.
    - Lower-boundary handoff signals remain advisory and proposal-first even when graph_layer_exhausted_for_subtree
      is present.
  signal_policy:
  - Subtree-shape and lower-boundary handoff signals are derived from canonical graph state plus bounded
    run context; they are rebuildable and non-canonical.
  - These signals evaluate subtree quality and graph-layer exhaustion, not single-node validity or acceptance.
  - Lower-boundary handoff signals may use subtree-shape signals as inputs, but shape problems and handoff
    readiness are not identical and must remain distinguishable.
  - Role-legibility signals may use node text as bounded evidence because human readability is itself
    a governed graph-quality property under SG-SPEC-0001.
  - A lower-boundary handoff signal does not imply that a tracked Tech Spec layer exists or must be materialized;
    it only indicates that further canonical graph refinement should be questioned.
  consumer_contract:
    evaluator:
    - Repeated subtree-shape signals may penalize continuing ordinary refinement along the same one-child
      ladder and may favor aggregate regrouping, sibling clustering, or retrospective subtree rebalance.
    - role_obscured_node or bookkeeping_only_node may favor rewrite, merge, or aggregate regrouping over
      another child slice when no new graph-native role can be named.
    - Lower-boundary handoff signals may prefer stop or redirect behavior, explicit proposal emission,
      or handoff-oriented follow-up rather than deeper canonical decomposition.
    supervisor:
    - Supervisor may surface these signals in run artifacts, summaries, and derived proposal or refactor
      queues under SG-SPEC-0003's first-persistence rules.
    - Supervisor may use these signals to avoid materializing another canonical child when the remaining
      concern is not graph-native under current policy.
    - Supervisor may treat role_obscured_node or bookkeeping_only_node as evidence that a subtree should
      be rewritten around clearer roles before any further bounded child materialization is attempted.
    - Supervisor must not treat these signals as authorization to create a tracked implementation layer,
      bypass review, or mutate canonical specs without an allowed direct or proposal path.
  parent_contract:
  - SG-SPEC-0003 retains shared graph-health vocabulary, first-persistence rules, and governance boundary
    for graph-health-derived actions.
  - SG-SPEC-0049 owns the detailed subtree-shape and lower-boundary handoff signal families beneath that
    boundary.
  - SG-SPEC-0049 does not redefine continuation-selection mechanics owned by SG-SPEC-0026 or queue-control
    semantics owned by SG-SPEC-0034.

id: SG-SPEC-0004
title: SpecGraph - Split Proposal Application Path
kind: spec
status: outlined
maturity: 0.18
depends_on: []
relates_to:
- SG-SPEC-0002
- SG-SPEC-0003
refines:
- SG-SPEC-0003
inputs:
- specs/nodes/SG-SPEC-0002.yaml
- specs/nodes/SG-SPEC-0003.yaml
- tasks.md
- tools/supervisor.py
outputs:
- specs/nodes/SG-SPEC-0004.yaml
allowed_paths:
- specs/nodes/SG-SPEC-0004.yaml
acceptance:
- Defines an explicit operator-controlled path to apply an approved split_oversized_spec proposal into
  canonical parent and child spec files
- Defines deterministic materialization rules for parent narrowing, child creation, acceptance redistribution,
  and lineage updates from a structured split proposal artifact
- Defines how proposal artifact and proposal_queue status change after successful application versus rejected
  application
- Defines validation requirements before writeback, including active proposal presence, artifact validity,
  non-seed target eligibility, and refusal to overwrite existing child spec files
- Remains implementation-agnostic about future generalized proposal application beyond split_oversized_spec
prompt: Define the first deterministic apply path for reviewed split proposals so SpecGraph can move from
  proposal-first graph refactoring into explicit canonical writeback without reintroducing free-form supervisor
  behavior.
specification:
  objective: Define how an approved split_oversized_spec proposal is applied into canonical spec files
    through an explicit operator-controlled supervisor path.
  scope:
    in:
    - Explicit operator-controlled application of one split_oversized_spec proposal
    - Deterministic writeback rules for parent and child spec files
    - Proposal artifact and proposal_queue status updates after application
    - Validation rules that must pass before canonical writeback
    out:
    - Automatic application without explicit operator intent
    - Merge, reparent, or generalized relinking proposals
    - Multi-proposal batch application
    - Governance changes to proposal semantics
  terminology:
    proposal_application_pass: A deterministic supervisor path that materializes a reviewed proposal artifact
      into canonical spec files without invoking free-form decomposition reasoning.
    applied_split_proposal: A split_oversized_spec proposal artifact whose parent/child structure has
      been written into canonical spec files and whose queue metadata has been marked as applied.
  application_policy:
    trigger:
    - The pass is started only by explicit operator intent against one target spec.
    - The pass requires an active split_oversized_spec proposal artifact for that target spec.
    validation:
    - The target spec must still be a non-seed spec node and must still satisfy oversized eligibility
      under current atomicity policy.
    - The structured proposal artifact must validate against the current target spec before any canonical
      writeback occurs.
    - Suggested child IDs and suggested child paths must not overwrite existing canonical spec files.
    writeback:
    - The parent keeps the same stable ID and title while narrowing prompt, acceptance, and depends_on
      according to the accepted proposal artifact.
    - Each suggested child becomes one new canonical spec file with its own ID, title, prompt, acceptance,
      acceptance_evidence, outputs, allowed_paths, and refines linkage back to the parent.
    - Acceptance and acceptance_evidence are redistributed deterministically from the accepted proposal
      mapping rather than regenerated by free-form reasoning during application.
    queue_and_artifact_status:
    - Successful application marks the structured proposal artifact as applied and updates the matching
      proposal_queue item to an applied state.
    - Rejected or failed application leaves canonical spec files unchanged and preserves the proposal
      as still pending review or repair.

    into canonical parent and child spec files
  evidence: 'tools/supervisor.py exposes the explicit operator path through `main(..., apply_split_proposal=True)`
    with `--target-spec`, and dispatches the execution to `_apply_split_proposal(...)` rather than the
    ordinary heuristic selector. tests/test_supervisor.py::test_main_apply_split_proposal_materializes_parent_and_children
    exercises the explicit path end to end.

    '
- criterion: Defines deterministic materialization rules for parent narrowing, child creation, acceptance
    redistribution, and lineage updates from a structured split proposal artifact
  evidence: 'tools/supervisor.py::apply_split_proposal_to_worktree deterministically rewrites the parent
    prompt, acceptance, acceptance_evidence, and depends_on from `parent_after_split`, then creates child
    spec files from `suggested_children` with explicit `refines: [parent]`. The same path reuses proposal
    acceptance mapping rather than generating new acceptance text during application. tests/test_supervisor.py::test_main_apply_split_proposal_materializes_parent_and_children
    verifies the resulting parent and child spec shapes.

    '
- criterion: Defines how proposal artifact and proposal_queue application state change after successful
    application versus deterministic application_refusal, including the weakest explicit applied record
    and without conflating apply refusal with proposal review rejection
  evidence: 'specification.terminology.application_refusal and specification.terminology.canonical_application_record
    distinguish successful canonical application from pre-write application refusal. specification.application_policy.application_recording
    and specification.application_policy.queue_and_artifact_status require the applied record to appear
    only after canonical writeback succeeds, keep refusal from producing an applied marker, and preserve
    separation between proposal review semantics and apply-path outcomes.

    '
- criterion: Defines validation requirements before writeback, including exactly one approved_for_application
    proposal input, artifact validity, non-seed target eligibility, and refusal to overwrite existing
    child spec files
  evidence: 'specification.application_policy.approval_gate requires exactly one active split proposal
    input whose tracked proposal authority is approved_for_application before writeback may begin. specification.application_policy.validation
    then re-checks target eligibility, artifact validity, and child-file collisions, and routes any pre-write
    failure into application_refusal rather than implicit review rejection.

    '
- criterion: Remains implementation-agnostic about future generalized proposal application beyond split_oversized_spec
  evidence: 'specification.scope.out excludes automatic application, proposal-lane review workflow, merge/reparent/generalized
    relinking, multi-proposal batch application, and governance changes to proposal semantics. The node

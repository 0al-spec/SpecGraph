    '
prompt: Define the first deterministic apply path for reviewed split proposals so SpecGraph can move from
  proposal-first graph refactoring into explicit canonical writeback without reintroducing free-form supervisor
  behavior.
specification:
  objective: Define how a review-approved split_oversized_spec proposal is applied into canonical spec
    files through an explicit operator-controlled supervisor path.
  scope:
    in:
    - Explicit operator-controlled application of one split_oversized_spec proposal
    - Consumption of one review-approved split proposal input
    - Deterministic writeback rules for parent and child spec files
    - Proposal artifact and proposal_queue status updates after application
    - Validation rules that must pass before canonical writeback
    out:
    - Automatic application without explicit operator intent
    - Proposal-lane review workflow or approval-state transitions
    - Merge, reparent, or generalized relinking proposals
    - Multi-proposal batch application
    - Governance changes to proposal semantics
  terminology:
    proposal_application_pass: A deterministic supervisor path that materializes a review-approved proposal
      artifact into canonical spec files without invoking free-form decomposition reasoning.
    applied_split_proposal: A split_oversized_spec proposal artifact whose parent/child structure has
      been written into canonical spec files and whose queue metadata has been marked as applied.
    application_refusal: A deterministic outcome in which the explicit apply path declines canonical writeback
      because the approved proposal input no longer validates against current canonical state or write-safety
      rules. It leaves canonical spec files unchanged and does not by itself alter proposal review authority.
    canonical_application_record: The weakest explicit applied marker produced by the split proposal apply
      path after canonical parent and child files have been written successfully. It records that approved
      proposal content was actually materialized, rather than merely reviewed or considered eligible for
      application.
  application_policy:
    trigger:
    - The pass is started only by explicit operator intent against one target spec.
    - The pass requires an active split_oversized_spec proposal artifact for that target spec.
    approval_gate:
    - The pass may consume only one proposal input whose corresponding tracked proposal authority state
      is approved_for_application.
    - Proposal review approval authorizes entry into the apply path but is not evidence that canonical
      materialization has already occurred.
    - Draft, under_review, rejected, or superseded proposal states are ineligible apply inputs and must
      be refused without rewriting review state.
    validation:
    - Exactly one active approved proposal input must resolve to the target spec and structured split
      artifact before any canonical writeback occurs.
    - The target spec must still be a non-seed spec node and must still satisfy oversized eligibility
      under current atomicity policy.
    - The structured proposal artifact must validate against the current target spec before any canonical
      writeback occurs.
    - Suggested child IDs and suggested child paths must not overwrite existing canonical spec files.
    writeback:
    - The parent keeps the same stable ID and title while narrowing prompt, acceptance, and depends_on
      according to the accepted proposal artifact.
    - Each suggested child becomes one new canonical spec file with its own ID, title, prompt, acceptance,
      acceptance_evidence, outputs, allowed_paths, and refines linkage back to the parent.
    - Acceptance and acceptance_evidence are redistributed deterministically from the accepted proposal
      mapping rather than regenerated by free-form reasoning during application.
    application_recording:
    - Canonical parent and child writeback must complete successfully before any canonical_application_record,
      applied proposal artifact state, or applied proposal_queue state is emitted.
    - The weakest explicit applied record for this path is one canonical_application_record associated
      with the consumed approved proposal input and produced only after successful materialization.
    - approved_for_application review state and apply-path input compatibility are not substitutes for
      canonical_application_record because review authorization, input compatibility, and canonical materialization
      are separate facts.
    queue_and_artifact_status:
    - Successful application emits canonical_application_record, marks the structured proposal artifact
      as applied, and updates the matching proposal_queue item to an applied state.
    - If pre-write validation fails, the result is application_refusal. Canonical spec files remain unchanged
      and no canonical_application_record or applied state is recorded.
    - application_refusal leaves the structured proposal artifact and matching proposal_queue item in
      a non-applied state so the proposal can be repaired, superseded, or re-reviewed by the appropriate
      path.
    - The apply path must not represent application_refusal as proposal rejection by implication, because
      review authorization and canonical application are separate facts.

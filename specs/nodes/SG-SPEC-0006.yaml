prompt: Define a tracked proposal layer for SpecGraph so supervisor can autonomously grow reviewable draft
  graph structure in the repository, while canonical spec nodes remain stable and viewer tooling can inspect
  both layers together.
specification:
  objective: Define the first repository-tracked proposal lane that sits between canonical SpecGraph nodes
    and ephemeral runtime artifacts.
  scope:
    in:
    - Proposal-lane semantics for tracked, reviewable draft graph structure
    - Boundary between canonical spec nodes, tracked proposal nodes, and ephemeral run artifacts
    - Supervisor authority inside the proposal lane
    - Viewer and graph-tooling visibility for proposal-layer nodes and edges
    out:
    - Exact repository directory layout for proposal nodes
    - Final ID minting algorithm or naming convention implementation
    - Viewer rendering details or UI controls
    - Metric formulas, versioning design, or full archival policy
  terminology:
    proposal_lane: A repository-tracked graph layer that holds draft or proposed nodes and edges which
      are reviewable and visible to tooling, but are not yet canonical accepted graph structure.
    proposal_node: A tracked node in the proposal lane representing a candidate new spec, refactor, or
      structural change that has not yet been applied into canonical spec nodes.
    proposal_target_region:
      meaning: The bounded canonical node, canonical graph region, or draft target area that a proposal-lane
        node claims as the scope of its intended change.
      required_components:
      - component: target_kind
        cardinality: exactly 1
        allowed_values:
        - canonical_node
        - canonical_region
        - draft_target_area
      - component: target_reference
        cardinality: exactly 1
        meaning: Stable reference to the specific node, region, or draft area named by target_kind.
      - component: change_scope
        cardinality: exactly 1
        meaning: Machine-readable statement of the bounded concern claimed within the referenced target.
      cardinality: Exactly one proposal_target_region must be declared per proposal-lane node.
    proposal_handle: A provisional repository-tracked identifier for a proposal-lane node that is stable
      for review and tooling within the proposal lane but does not claim canonical spec ID status.
    proposal_lineage_link:
      meaning: An explicit relationship from a proposal-lane node to the canonical node, canonical graph
        region, runtime artifact, or earlier proposal that motivated or redirected the proposal.
      required_components:
      - component: lineage_role
        cardinality: exactly 1
        allowed_values:
        - motivated_by
        - derived_from
        - supersedes
      - component: source_kind
        cardinality: exactly 1
        allowed_values:
        - canonical_node
        - canonical_region
        - runtime_artifact
        - proposal_handle
      - component: source_reference
        cardinality: exactly 1
        meaning: Stable reference to the specific source named by source_kind.
      cardinality: At least one proposal_lineage_link must be declared per proposal-lane node.
    canonical_graph: The current accepted graph stored in canonical spec nodes.
    runtime_artifact: An ephemeral or derived artifact under runs/ or similar runtime storage that supports
      execution, diagnostics, and queues but is not itself a tracked graph node.
    proposal_authority_state: A canonical enum for proposal-lane review authority, distinct from canonical
      lifecycle status, with allowed values draft, under_review, approved_for_application, rejected, and
      superseded.
  boundary_policy:
    layer_separation:
    - Canonical spec nodes remain the accepted graph of record.
    - Proposal-lane nodes are tracked in the repository so they can be reviewed, diffed, and visualized,
      but they do not become canonical truth by merely existing.
    - Runtime artifacts remain the first persistence for execution detail, logs, and transient queue state.
    - Proposal-lane nodes may summarize or stabilize selected runtime outputs, but they do not replace
      run logs or summaries.
    supervisor_authority:
    - Supervisor may autonomously create or refresh proposal-lane nodes when current canonical policy
      permits proposal emission for a bounded target.
    - Supervisor may not silently rewrite canonical spec nodes merely because a proposal-lane node exists.
    - Moving structure from the proposal lane into the canonical graph still requires explicit review
      and application under the current governance rules.
    proposal_visibility:
    - Proposal-lane nodes and their lineage to canonical nodes should remain available to graph tooling
      as a visible overlay or secondary layer.
    - Tooling and viewers must be able to distinguish canonical nodes from proposal-lane nodes so draft
      structure is not mistaken for accepted graph truth.
  proposal_lane_policy:
    node_semantics:
    - Proposal-lane nodes represent candidate structure, not accepted structure.
    - Proposal-lane nodes must preserve stable references to the canonical nodes, graph regions, signals,
      or proposals from which they were derived.
    - Proposal-lane state SHOULD distinguish proposal review state from canonical lifecycle status so
      draft review does not overload canonical maturity semantics.
    identity_and_lineage:
    - Each proposal-lane node must carry a proposal_handle that is unique within the proposal lane and
      remains stable across ordinary review updates to that same proposal node.
    - A proposal_handle is provisional only; it must not be interpreted by tooling or supervisor as a
      canonical spec ID reservation or as evidence that canonical materialization is approved.
    - Each proposal-lane node must declare exactly one proposal_target_region containing exactly one target_kind,
      exactly one target_reference, and exactly one change_scope.
    - proposal_target_region.target_reference must resolve according to proposal_target_region.target_kind,
      and proposal_target_region.change_scope must bound the intended change within that referenced target.
    - Each proposal-lane node must expose at least one proposal_lineage_link, and each such link must
      contain exactly one lineage_role, exactly one source_kind, and exactly one source_reference.
    - proposal_lineage_link.source_reference must resolve according to proposal_lineage_link.source_kind,
      and multiple lineage links are allowed only when each link contributes a distinct motivating, derivation,
      or supersession relationship.
    - When a proposal describes a candidate node not yet present in the canonical graph, the lineage still
      points back to the motivating canonical parent, target region, or originating proposal artifact
      rather than inventing canonical ancestry.
    conflict_precedence:
    - At most one active proposal-lane subgraph should own the same proposal_target_region for the same
      proposal class or pathology at a time.
    - When supervisor encounters new evidence for a proposal_target_region already owned by an active
      compatible proposal, it should refresh or extend that existing proposal-lane subgraph rather than
      mint a duplicate competing draft.
    - When supervisor encounters an overlapping but materially incompatible active proposal for the same
      proposal_target_region, it must preserve the overlap as visible review state and defer to explicit
      review, supersession, or redirection rather than silently merging the drafts.
    - If one proposal supersedes another inside the proposal lane, the newer proposal must retain visible
      lineage to the superseded proposal_handle so tooling can reconstruct ownership history.
    authority_states:
    - proposal_authority_state must use exactly one canonical enum value from draft, under_review, approved_for_application,
      rejected, and superseded.
    - draft is the initial state for newly created proposal-lane nodes that have tracked candidate structure
      but have not yet entered explicit review.
    - under_review means the proposal is an active review subject and remains non-canonical while review
      is pending.
    - approved_for_application means review has authorized the proposal to enter a separate explicit canonical
      application path; this state never mutates the canonical graph by itself.
    - rejected means the proposal is no longer an eligible candidate for canonical application in its
      current form but must remain visible as review history.
    - superseded means a newer proposal has taken over the same bounded concern and the older proposal
      remains visible through lineage as non-active review history.
    - Allowed forward transitions are draft to under_review or rejected; under_review to approved_for_application,
      rejected, or superseded; and approved_for_application to superseded.
    - Direct transitions from draft to approved_for_application or from any terminal state to a non-terminal
      state are not allowed.
    - rejected and superseded are terminal authority states for the proposal-lane node they label.
    - A proposal-lane node already in approved_for_application may receive clarifying non-substantive
      draft updates without changing state, but any substantive authority-relevant change must move that
      node back to under_review or be recorded as a newer superseding proposal.
    - Supervisor may autonomously move a proposal only from draft to under_review when the change reflects
      bounded preparation for review, or from under_review to superseded when a distinct reviewed owner
      has explicitly taken over the same proposal_target_region.
    - Moving a proposal into approved_for_application or rejected requires explicit review authority and
      must not be inferred solely from supervisor activity or proposal existence.
    - Rejection or supersession of a proposal-lane node must remain visible in the proposal lane so tooling
      can preserve review history and avoid mistaking inactive drafts for active candidates.
    lifecycle_boundary:
    - A proposal-lane node may be created before a canonical node exists for the same concern.
    - Approval or acceptance of a proposal-lane node does not automatically supersede or mutate canonical
      nodes until an explicit application path runs.
    graph_growth:
    - Proposal-lane nodes may form bounded subgraphs, including proposed children, proposed lineage edges,
      and proposed restructuring relationships around one target region.
    - This lane exists so supervisor can do more autonomous graph work safely without bypassing review.
    mutation_rules:
    - Supervisor may autonomously create a new proposal-lane node or extend an existing bounded proposal
      subgraph when the work stays within current ontology and policy and the affected concern has not
      already moved into a conflicting active proposal owned elsewhere.
    - Supervisor may autonomously update proposal authority metadata, lineage metadata, and bounded draft
      structure inside the proposal lane when those updates clarify review state without claiming canonical
      acceptance.
    - Supervisor should prefer refreshing the active proposal already owning a proposal_target_region
      over creating a second active draft for the same proposal class or pathology.
    - Supervisor must not silently consolidate materially incompatible overlapping proposals; it must
      leave the conflict reviewable through explicit overlap, superseded, or redirected state until a
      reviewed resolution path exists.
    - Supervisor must not treat proposal-lane approval metadata as self-executing authority for canonical
      writeback; canonical mutation still requires a separate explicit application path governed by current
      review rules.
    viewer_contract:
    - Proposal-lane nodes and edges should be queryable by graph tooling together with canonical nodes
      while remaining machine-distinguishable by lane and proposal_authority_state.
    - Viewer overlays should be able to show lineage from proposal-lane structure back to canonical targets
      and to suppress or de-emphasize rejected or superseded proposal states without deleting them from
      the tracked review record.
    - Graph analyses that operate over both layers must treat proposal-lane structure as non-canonical
      unless an explicit canonical application event has materialized the proposal into canonical spec
      nodes.

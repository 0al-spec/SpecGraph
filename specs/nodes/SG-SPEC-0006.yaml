acceptance:
- Defines a tracked proposal lane as a repository-backed layer between canonical spec nodes and ephemeral
  runtime artifacts so supervisor can grow reviewable proposal subgraphs without mutating canonical truth
- Defines the first semantics for proposal-lane nodes, including provisional identity, relationship to
  canonical nodes, and approval or authority state distinct from canonical lifecycle status
- Defines what supervisor may autonomously create or update inside the proposal lane versus what still
  requires explicit review or canonical application
- Defines how proposal-lane nodes and edges, including non-authorizing proposal_artifact_link bridge metadata,
  should remain visible to graph tooling and viewer overlays without being mistaken for canonical accepted
  graph structure
- Remains implementation-agnostic about exact file layout, rendering style, ID minting algorithm, and
  eventual convergence with metrics or versioning subsystems
acceptance_evidence:
- criterion: Defines a tracked proposal lane as a repository-backed layer between canonical spec nodes
    and ephemeral runtime artifacts so supervisor can grow reviewable proposal subgraphs without mutating
    canonical truth
  evidence: 'specification.objective defines the proposal lane as repository-tracked draft graph structure
    between canonical nodes and runtime artifacts. specification.terminology.proposal_repository_presence
    defines the weakest machine-readable repository contract for proposal-node presence, path classification,
    and review-visible persistence boundaries. specification.boundary_policy.layer_separation states that
    proposal-lane nodes are reviewable tracked structure while canonical spec nodes remain the accepted
    graph of record and runtime artifacts remain separate execution persistence.

    '
- criterion: Defines the first semantics for proposal-lane nodes, including provisional identity, relationship
    to canonical nodes, and approval or authority state distinct from canonical lifecycle status
  evidence: 'specification.terminology defines proposal_handle, proposal_target_region, proposal_lineage_link,
    and proposal_authority_state as a canonical enum. specification.terminology.proposal_handle.required_components,
    specification.terminology.proposal_handle.stability_rules, specification.terminology.proposal_handle.collision_handling,
    and specification.terminology.proposal_handle.repository_persistence_invariants define the minimal
    machine-readable structure, ordinary-update stability, duplicate handling, and weakest tracked persistence
    contract for provisional proposal identity. specification.terminology.proposal_target_region.required_components
    and specification.terminology.proposal_lineage_link.required_components make target and lineage metadata
    minimally machine-readable with explicit required components and cardinality. specification.proposal_lane_policy.identity_and_lineage
    requires each proposal node to carry a provisional handle, exactly one bounded target region, and
    at least one explicit lineage link. specification.proposal_lane_policy.authority_states separates
    proposal authority states from canonical lifecycle status and defines explicit state transitions and
    authority-change constraints.

    '
- criterion: Defines what supervisor may autonomously create or update inside the proposal lane versus
    what still requires explicit review or canonical application
  evidence: 'specification.boundary_policy.supervisor_authority allows bounded autonomous creation and
    refresh inside the proposal lane but forbids silent canonical rewrites. specification.proposal_lane_policy.conflict_precedence
    now defines active ownership of a proposal_target_region for review purposes, the weakest deterministic
    distinction between compatible and materially incompatible overlaps, and the requirement to keep incompatible
    overlaps review-visible rather than silently merged. specification.proposal_lane_policy.mutation_rules
    further limits autonomous updates to proposal-lane content, prefers refreshing the active owner of
    a target region over duplicating drafts, and requires explicit review before any canonical application
    path mutates accepted graph structure.

    '
- criterion: Defines how proposal-lane nodes and edges, including non-authorizing proposal_artifact_link
    bridge metadata, should remain visible to graph tooling and viewer overlays without being mistaken
    for canonical accepted graph structure
  evidence: 'specification.boundary_policy.proposal_visibility requires proposal structure to remain available
    as a visible overlay or secondary layer. specification.proposal_lane_policy.viewer_contract requires
    proposal nodes and edges to expose enough lane and state metadata for tooling to render them alongside
    canonical structure without treating them as accepted graph truth. specification.terminology.proposal_artifact_link
    defines the minimal machine-readable contract for proposal-lane references to explicit apply-path
    inputs and supporting runtime artifacts, including apply_path_compatibility for apply_path_input links.
    specification.proposal_lane_policy.application_artifact_bridge limits those references to non-authorizing
    bridge metadata that remains distinct from target, lineage, and canonical application semantics, and
    defines precedence so tracked proposal state remains authoritative for proposal review semantics.
    specification.boundary_policy.layer_separation states that these links do not collapse proposal state
    into runtime persistence or canonical truth.

    '
- criterion: Remains implementation-agnostic about exact file layout, rendering style, ID minting algorithm,
    and eventual convergence with metrics or versioning subsystems
  evidence: 'specification.scope.out explicitly excludes exact repository layout, final ID minting algorithm,
    viewer rendering details, metric formulas, versioning design, exact apply-path storage layout, and
    full archival policy. The node therefore defines governance semantics for the proposal lane without
    fixing the eventual implementation shape.

    '
prompt: Define a tracked proposal layer for SpecGraph so supervisor can autonomously grow reviewable draft
  graph structure in the repository, while canonical spec nodes remain stable and viewer tooling can inspect
  both layers together.
specification:
  objective: Define the first repository-tracked proposal lane that sits between canonical SpecGraph nodes
    and ephemeral runtime artifacts.
  scope:
    in:
    - Proposal-lane semantics for tracked, reviewable draft graph structure
    - Boundary between canonical spec nodes, tracked proposal nodes, and ephemeral run artifacts
    - Supervisor authority inside the proposal lane
    - Viewer and graph-tooling visibility for proposal-layer nodes and edges
    - Weakest machine-readable bridge from proposal-lane nodes to apply-path inputs and supporting runtime
      artifacts
    out:
    - Exact repository directory layout for proposal nodes
    - Final ID minting algorithm or naming convention implementation
    - Viewer rendering details or UI controls
    - Exact directory layout, file naming, storage backend, or full history/versioning design for apply-path
      inputs or runtime artifacts
    - Metric formulas, versioning design, or full archival policy
  terminology:
    proposal_lane: A repository-tracked graph layer that holds draft or proposed nodes and edges which
      are reviewable and visible to tooling, but are not yet canonical accepted graph structure.
    proposal_node: A tracked node in the proposal lane representing a candidate new spec, refactor, or
      structural change that has not yet been applied into canonical spec nodes.
    proposal_target_region:
      meaning: The bounded canonical node, canonical graph region, or draft target area that a proposal-lane
        node claims as the scope of its intended change.
      required_components:
      - component: target_kind
        cardinality: exactly 1
        allowed_values:
        - canonical_node
        - canonical_region
        - draft_target_area
      - component: target_reference
        cardinality: exactly 1
        meaning: Stable reference to the specific node, region, or draft area named by target_kind.
      - component: change_scope
        cardinality: exactly 1
        meaning: Machine-readable statement of the bounded concern claimed within the referenced target.
      cardinality: Exactly one proposal_target_region must be declared per proposal-lane node.
    proposal_handle:
      meaning: A provisional repository-tracked identifier for a proposal-lane node that is stable for
        review and tooling within the proposal lane but does not claim canonical spec ID status.
      required_components:
      - component: handle_value
        cardinality: exactly 1
        meaning: The repository-tracked proposal identifier string used to address the proposal-lane node.
      - component: handle_status
        cardinality: exactly 1
        meaning: Whether the handle instance is active or retired for that proposal-lane node.
      cardinality: Exactly one active proposal_handle must be declared per proposal-lane node.
      stability_rules:
      - The active proposal_handle must remain unchanged across ordinary review edits, metadata refreshes,
        and bounded draft-structure updates to the same proposal-lane node.
      - A proposal_handle may change only when the original handle is retired because of repository-tracked
        collision resolution or because a newer superseding proposal is intentionally created as a distinct
        proposal-lane node.
      collision_handling:
      - If repository-tracked state reveals two active proposal-lane nodes claiming the same handle_value,
        the collision must be treated as invalid review state until exactly one node retains that active
        handle_value.
      - Collision resolution must preserve repository-tracked history by retiring or superseding at least
        one conflicting handle instance rather than silently reassigning both nodes without trace.
      repository_persistence_invariants:
      - The active handle_value and any retired predecessor handles for a proposal-lane node must remain
        recoverable from repository-tracked proposal state without consulting ephemeral runtime artifacts.
      - Loss of a handle's repository-tracked history must not be treated as a no-op rename; the proposal
        must instead be considered identity-ambiguous until review or explicit repair restores a visible
        tracked mapping.
    proposal_lineage_link:
      meaning: An explicit relationship from a proposal-lane node to the canonical node, canonical graph
        region, runtime artifact, or earlier proposal that motivated or redirected the proposal.
      required_components:
      - component: lineage_role
        cardinality: exactly 1
        allowed_values:
        - motivated_by
        - derived_from
        - supersedes
      - component: source_kind
        cardinality: exactly 1
        allowed_values:
        - canonical_node
        - canonical_region
        - runtime_artifact
        - proposal_handle
      - component: source_reference
        cardinality: exactly 1
        meaning: Stable reference to the specific source named by source_kind.
      cardinality: At least one proposal_lineage_link must be declared per proposal-lane node.
    proposal_artifact_link:
      meaning: A weakest machine-readable bridge from a proposal-lane node to an explicit apply-path input
        or supporting runtime artifact that may be inspected during review or consumed by a separate canonical
        application path.
      required_components:
      - component: artifact_role
        cardinality: exactly 1
        allowed_values:
        - apply_path_input
        - supporting_runtime_artifact
      - component: reference_kind
        cardinality: exactly 1
        allowed_values:
        - repository_input
        - runtime_artifact
      - component: reference_value
        cardinality: exactly 1
        meaning: Stable reference to the specific input or artifact named by reference_kind.
      - component: apply_path_compatibility
        cardinality: exactly 1 when artifact_role is apply_path_input; otherwise omitted
        allowed_values:
        - separate_explicit_canonical_application_path
        meaning: Declares that the linked apply_path_input is intended only as compatible input for a
          separate explicit canonical application path and remains non-authoritative until a distinct
          application event occurs.
      cardinality: Zero or more proposal_artifact_link entries may be declared per proposal-lane node.
    proposal_repository_presence:
      meaning: The weakest machine-readable repository contract proving that a proposal-lane node exists
        as tracked review state rather than only as an ephemeral runtime artifact.
      required_components:
      - component: tracked_presence
        cardinality: exactly 1
        allowed_values:
        - repository_tracked
        meaning: Declares that the proposal node is persisted in repository-tracked state.
      - component: path_class
        cardinality: exactly 1
        allowed_values:
        - proposal_node_path
        meaning: Classifies the tracked location as belonging to the proposal-node lane without fixing
          any exact directory layout or naming algorithm.
      - component: persistence_boundary
        cardinality: exactly 1
        allowed_values:
        - review_visible_repository_separate_from_runtime
        meaning: Declares that proposal-node state must remain review-visible in repository-tracked form
          and must not rely on ephemeral runtime storage as its only persisted representation.
      cardinality: Exactly one proposal_repository_presence contract must be declared per proposal-lane
        node.
    canonical_graph: The current accepted graph stored in canonical spec nodes.
    runtime_artifact: An ephemeral or derived artifact under runs/ or similar runtime storage that supports
      execution, diagnostics, and queues but is not itself a tracked graph node.
    proposal_authority_state: A canonical enum for proposal-lane review authority, distinct from canonical
      lifecycle status, with allowed values draft, under_review, approved_for_application, rejected, and
      superseded.
  boundary_policy:
    layer_separation:
    - Canonical spec nodes remain the accepted graph of record.
    - Proposal-lane nodes are tracked in the repository so they can be reviewed, diffed, and visualized,
      but they do not become canonical truth by merely existing.
    - Runtime artifacts remain the first persistence for execution detail, logs, and transient queue state.
    - Proposal-lane nodes may summarize or stabilize selected runtime outputs, but they do not replace
      run logs or summaries.
    - A proposal-lane node is present for review only when repository-tracked state exposes exactly one
      proposal_repository_presence contract whose tracked_presence is repository_tracked, whose path_class
      is proposal_node_path, and whose persistence_boundary is review_visible_repository_separate_from_runtime.
    - For proposal review semantics, the authoritative state is the repository-tracked proposal-lane node,
      including proposal_authority_state, proposal_target_region, proposal_lineage_link, and proposal_repository_presence,
      rather than any linked apply-path input or runtime artifact.
    - proposal_artifact_link entries may reference apply-path inputs or runtime artifacts, but those references
      do not convert runtime persistence into repository-tracked proposal presence and do not make linked
      inputs canonical by association.
    supervisor_authority:
    - Supervisor may autonomously create or refresh proposal-lane nodes when current canonical policy
      permits proposal emission for a bounded target.
    - Supervisor may not silently rewrite canonical spec nodes merely because a proposal-lane node exists.
    - Moving structure from the proposal lane into the canonical graph still requires explicit review
      and application under the current governance rules.
    proposal_visibility:
    - Proposal-lane nodes and their lineage to canonical nodes should remain available to graph tooling
      as a visible overlay or secondary layer.
    - Tooling and viewers must be able to distinguish canonical nodes from proposal-lane nodes so draft
      structure is not mistaken for accepted graph truth.
  proposal_lane_policy:
    node_semantics:
    - Proposal-lane nodes represent candidate structure, not accepted structure.
    - Each proposal-lane node must expose exactly one proposal_repository_presence contract so tooling
      can determine that the node is repository-tracked proposal structure rather than only a runtime
      artifact.
    - Proposal-lane nodes must preserve stable references to the canonical nodes, graph regions, signals,
      or proposals from which they were derived.
    - Proposal-lane nodes may expose zero or more proposal_artifact_link entries to identify explicit
      apply-path inputs or supporting runtime artifacts without changing proposal-lane authority or target
      semantics.
    - Proposal-lane state SHOULD distinguish proposal review state from canonical lifecycle status so
      draft review does not overload canonical maturity semantics.
    identity_and_lineage:
    - Each proposal-lane node must carry a proposal_handle that is unique within the proposal lane and
      remains stable across ordinary review updates to that same proposal node.
    - A proposal_handle is provisional only; it must not be interpreted by tooling or supervisor as a
      canonical spec ID reservation or as evidence that canonical materialization is approved.
    - proposal_handle must expose exactly one handle_value and exactly one handle_status, and exactly
      one active proposal_handle must exist per proposal-lane node at any given time.
    - handle_status may distinguish active from retired handle instances for the same proposal-lane node,
      but retired handles remain review history and must not be reused as active identities for a different
      live proposal-lane node while their tracked history remains present.
    - If a proposal_handle collision is detected in repository-tracked proposal state, supervisor and
      tooling must preserve the conflict as visible invalid review state until one handle instance is
      retired, superseded, or otherwise explicitly repaired.
    - proposal_handle continuity must be recoverable from repository-tracked proposal content alone; runtime
      artifacts may help explain history but must not be the only source of handle persistence.
    - proposal_repository_presence.path_class classifies the tracked location only as proposal-node lane
      content; it must not be interpreted as fixing an exact directory structure, filename scheme, or
      naming algorithm.
    - proposal_repository_presence.persistence_boundary must keep proposal-node review state visibly recoverable
      from repository-tracked content even when related runtime artifacts are deleted, rotated, or unavailable.
    - Each proposal-lane node must declare exactly one proposal_target_region containing exactly one target_kind,
      exactly one target_reference, and exactly one change_scope.
    - proposal_target_region.target_reference must resolve according to proposal_target_region.target_kind,
      and proposal_target_region.change_scope must bound the intended change within that referenced target.
    - Each proposal-lane node must expose at least one proposal_lineage_link, and each such link must
      contain exactly one lineage_role, exactly one source_kind, and exactly one source_reference.
    - proposal_lineage_link.source_reference must resolve according to proposal_lineage_link.source_kind,
      and multiple lineage links are allowed only when each link contributes a distinct motivating, derivation,
      or supersession relationship.
    - When a proposal describes a candidate node not yet present in the canonical graph, the lineage still
      points back to the motivating canonical parent, target region, or originating proposal artifact
      rather than inventing canonical ancestry.
    conflict_precedence:
    - For review purposes, a proposal-lane subgraph is active only while it contains at least one proposal-lane
      node for the bounded concern whose proposal_authority_state is draft, under_review, or approved_for_application.
    - For review purposes, an active proposal-lane subgraph owns a proposal_target_region when one of
      its active nodes declares that exact proposal_target_region and no other active proposal-lane subgraph
      declares the same target_kind, the same target_reference, and the same change_scope without being
      connected into the same active subgraph through visible proposal lineage or draft-structure extension.
    - Ownership of a proposal_target_region grants review precedence only; supervisor and tooling should
      treat that owning active subgraph as the default location for compatible refreshes, clarifications,
      and bounded draft growth, but ownership does not authorize canonical mutation, suppress visibility
      of competing drafts, or override tracked bridge precedence.
    - Two active proposals are compatible only when they declare the same target_kind, the same target_reference,
      and the same change_scope, and repository-tracked proposal state already places them inside the
      same active proposal-lane subgraph through shared proposal lineage or explicit draft-structure extension.
    - Two active proposals are materially incompatible when both remain active and they either declare
      the same target_kind and target_reference but different change_scope values, or they declare the
      same full proposal_target_region while remaining in different active proposal-lane subgraphs with
      no visible lineage-based ownership unification.
    - At most one active proposal-lane subgraph should own the same proposal_target_region for the same
      proposal class or pathology at a time.
    - When supervisor encounters new evidence for a proposal_target_region already owned by an active
      compatible proposal, it should refresh or extend that existing proposal-lane subgraph rather than
      mint a duplicate competing draft.
    - When supervisor encounters an overlapping but materially incompatible active proposal for the same
      proposal_target_region, it must preserve the overlap as visible review state and defer to explicit
      review, supersession, or redirection rather than silently merging the drafts.
    - If one proposal supersedes another inside the proposal lane, the newer proposal must retain visible
      lineage to the superseded proposal_handle so tooling can reconstruct ownership history.
    authority_states:
    - proposal_authority_state must use exactly one canonical enum value from draft, under_review, approved_for_application,
      rejected, and superseded.
    - draft is the initial state for newly created proposal-lane nodes that have tracked candidate structure
      but have not yet entered explicit review.
    - under_review means the proposal is an active review subject and remains non-canonical while review
      is pending.
    - approved_for_application means review has authorized the proposal to enter a separate explicit canonical
      application path; this state never mutates the canonical graph by itself.
    - rejected means the proposal is no longer an eligible candidate for canonical application in its
      current form but must remain visible as review history.
    - superseded means a newer proposal has taken over the same bounded concern and the older proposal
      remains visible through lineage as non-active review history.
    - Allowed forward transitions are draft to under_review or rejected; under_review to approved_for_application,
      rejected, or superseded; and approved_for_application to superseded.
    - Direct transitions from draft to approved_for_application or from any terminal state to a non-terminal
      state are not allowed.
    - rejected and superseded are terminal authority states for the proposal-lane node they label.
    - A proposal-lane node already in approved_for_application may receive clarifying non-substantive
      draft updates without changing state, but any substantive authority-relevant change must move that
      node back to under_review or be recorded as a newer superseding proposal.
    - Supervisor may autonomously move a proposal only from draft to under_review when the change reflects
      bounded preparation for review, or from under_review to superseded when a distinct reviewed owner
      has explicitly taken over the same proposal_target_region.
    - Moving a proposal into approved_for_application or rejected requires explicit review authority and
      must not be inferred solely from supervisor activity or proposal existence.
    - Rejection or supersession of a proposal-lane node must remain visible in the proposal lane so tooling
      can preserve review history and avoid mistaking inactive drafts for active candidates.
    lifecycle_boundary:
    - A proposal-lane node may be created before a canonical node exists for the same concern.
    - Approval or acceptance of a proposal-lane node does not automatically supersede or mutate canonical
      nodes until an explicit application path runs.
    application_artifact_bridge:
    - proposal_artifact_link is bridge metadata only; it must not replace proposal_target_region, proposal_lineage_link,
      or proposal_repository_presence.
    - When a proposal_artifact_link is present, proposal-lane tracked state remains authoritative for
      proposal review semantics; linked artifacts may support inspection or later application, but they
      must not override proposal_authority_state, proposal_target_region, lineage, or repository presence
      by implication.
    - artifact_role apply_path_input identifies a concrete non-canonical input that a separate explicit
      canonical application path may consume, but the link itself does not authorize or execute that application
      path.
    - When artifact_role is apply_path_input, apply_path_compatibility must be present and must equal
      separate_explicit_canonical_application_path so tooling can distinguish compatibility with a separate
      explicit canonical application path from proposal-lane review authority.
    - A linked apply_path_input is compatible with proposal review only as consumable input for that separate
      explicit application path; it must not be interpreted as evidence that application has started,
      completed, or become authoritative for the proposal-lane node.
    - apply_path_compatibility expresses intended compatibility only; it must not be interpreted as an
      application event, as proof that a canonical application path exists in repository-tracked state,
      or as authority to prefer the linked input over repository-tracked proposal metadata.
    - artifact_role supporting_runtime_artifact identifies a runtime artifact that informs review, diagnosis,
      or preparation, but the proposal-lane node must remain reviewable even if the linked runtime artifact
      is rotated, deleted, or otherwise unavailable.
    - Supporting runtime artifacts are advisory to review and may explain or justify tracked proposal
      content, but if a linked runtime artifact conflicts with repository-tracked proposal state, the
      tracked proposal state remains authoritative until an allowed proposal-lane update or explicit application
      path changes that state.
    - reference_kind repository_input classifies the linked material as repository-tracked input without
      fixing exact directory layout, filename scheme, or storage backend.
    - reference_kind runtime_artifact classifies the linked material as runtime-produced or runtime-scoped
      support state without requiring that runtime storage become part of canonical or proposal-lane identity.
    - proposal_artifact_link.reference_value must resolve according to proposal_artifact_link.reference_kind,
      and multiple proposal_artifact_link entries are allowed only when each entry contributes a distinct
      apply-path input or supporting runtime reference.
    graph_growth:
    - Proposal-lane nodes may form bounded subgraphs, including proposed children, proposed lineage edges,
      and proposed restructuring relationships around one target region.
    - This lane exists so supervisor can do more autonomous graph work safely without bypassing review.
    mutation_rules:
    - Supervisor may autonomously create a new proposal-lane node or extend an existing bounded proposal
      subgraph when the work stays within current ontology and policy and the affected concern has not
      already moved into a conflicting active proposal owned elsewhere.
    - Supervisor may autonomously update proposal authority metadata, lineage metadata, and bounded draft
      structure inside the proposal lane when those updates clarify review state without claiming canonical
      acceptance.
    - Supervisor should prefer refreshing the active proposal already owning a proposal_target_region
      over creating a second active draft for the same proposal class or pathology.
    - Supervisor must not silently consolidate materially incompatible overlapping proposals; it must
      leave the conflict reviewable through explicit overlap, superseded, or redirected state until a
      reviewed resolution path exists.
    - Supervisor must not treat proposal-lane approval metadata as self-executing authority for canonical
      writeback; canonical mutation still requires a separate explicit application path governed by current
      review rules.
    viewer_contract:
    - Proposal-lane nodes and edges should be queryable by graph tooling together with canonical nodes
      while remaining machine-distinguishable by lane and proposal_authority_state.
    - Viewer overlays should be able to show lineage from proposal-lane structure back to canonical targets
      and to suppress or de-emphasize rejected or superseded proposal states without deleting them from
      the tracked review record.
    - Graph analyses that operate over both layers must treat proposal-lane structure as non-canonical
      unless an explicit canonical application event has materialized the proposal into canonical spec
      nodes.

- Defines the weakest integration contract by which continuation selection can consume execution readiness
  without inspecting concrete mechanics.
- Applies the topology-prose rule for this branch so child membership and direct-edge facts remain metadata
  rather than the main prose.
- Remains implementation-agnostic about viewer layout, queue ranking formulas, and runtime orchestration.

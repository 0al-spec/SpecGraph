prompt: Keep SG-SPEC-0027 as the bounded execution cluster beneath SG-SPEC-0026. It should group retrospective
  direct-update boundary and one proposal/split mechanics subcluster into one inspectable subtree, preserve
  their bounded roles, and give SG-SPEC-0026 one coherent dependency instead of several direct mechanics

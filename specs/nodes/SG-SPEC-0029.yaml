acceptance:
- Defines SG-SPEC-0029 as the single proposal/split mechanics child of SG-SPEC-0032 so SG-SPEC-0032 keeps
  one direct proposal/split gateway child and SG-SPEC-0027 does not expose SG-SPEC-0029 directly.
- Delegates parent-facing proposal/split prerequisite contract details to SG-SPEC-0030 while remaining
  the gateway boundary under SG-SPEC-0032.
- Delegates concrete proposal/split mechanics contracts to SG-SPEC-0028 without redefining its field-level
  payload, queue, or lane semantics.
- Remains implementation-agnostic about queue ranking formulas, proposal-lane orchestration, and runtime
  execution behavior.

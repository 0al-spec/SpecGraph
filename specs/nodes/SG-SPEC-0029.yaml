prompt: Keep SG-SPEC-0029 as the bounded proposal/split mechanics gateway under SG-SPEC-0027. It should
  separate the proposal/split subtree as one inspectable unit from the cluster-level mechanics child list
  while leaving concrete mechanics ownership to SG-SPEC-0028.
specification:
  objective: Define a bounded proposal/split mechanics gateway under SG-SPEC-0027 so SG-SPEC-0026 remains
    coupled to one execution-mechanics subtree without losing inspection-level access to concrete proposal/split
    mechanics.
  scope:
    in:
    - Proposal/split mechanics gateway role beneath SG-SPEC-0027
    - Parent integration contract that keeps SG-SPEC-0005 separate from proposal/split readiness
    - Delegation of concrete mechanics ownership to SG-SPEC-0028
    out:
    - Concrete split payload schema, queue field semantics, or proposal-lane runtime policy details already
      owned by SG-SPEC-0028
    - Continuation-selection policy or retrospective direct-update semantics
    - Viewer UX, persistence implementation, or runtime orchestration decisions
  gateway_role:
  - SG-SPEC-0029 is the proposal/split mechanics child beneath SG-SPEC-0027.
  - SG-SPEC-0029 provides one inspectable mechanism to preserve atomic boundaries between direct-update
    mechanics and proposal/split mechanics.
  mechanics_gateway:
    proposal_split_ownership:
    - SG-SPEC-0028 remains the concrete owner of split proposal lifecycle, split mechanics schema, and
      proposal-lane execution descendants.
    integration_surface:
    - SG-SPEC-0029 is the only direct descendant of SG-SPEC-0027 for proposal/split readiness.
  integration_boundaries:
  - SG-SPEC-0029 may not merge or redefine descendant contracts from SG-SPEC-0028.
  - SG-SPEC-0029 does not add field-level queue, ranking, or runtime orchestration rules.
  - SG-SPEC-0029 allows SG-SPEC-0027 to continue treating SG-SPEC-0005 and proposal/split concerns as
    independently bounded predecessors.
  parent_contract:
  - SG-SPEC-0027 may consume SG-SPEC-0029 as one bounded prerequisite for proposal/split mechanics readiness.
  - SG-SPEC-0027 must not depend_on SG-SPEC-0028 directly for proposal/split mechanics while SG-SPEC-0029
    is present.
  - SG-SPEC-0005 and its retrospective direct-update boundary semantics remain outside SG-SPEC-0029’s
    scope.

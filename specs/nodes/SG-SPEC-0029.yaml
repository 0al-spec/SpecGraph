prompt: Keep SG-SPEC-0029 as the bounded proposal/split mechanics gateway under SG-SPEC-0032. It should
  separate the proposal/split subtree as one inspectable unit from the subcluster-level mechanics boundary
  while leaving concrete mechanics ownership to SG-SPEC-0028.
specification:
  objective: Define a bounded proposal/split mechanics gateway under SG-SPEC-0032 so SG-SPEC-0032 remains
    coupled to one inspectable proposal/split readiness subtree while SG-SPEC-0028 remains the concrete
    mechanics owner.
  scope:
    in:
    - Proposal/split mechanics gateway role beneath SG-SPEC-0032
    - Parent-facing prerequisite contract boundary that is delegated to SG-SPEC-0030
    - Single inspectable gateway edge that preserves a standalone proposal/split mechanics subtree while
      preventing flattening into SG-SPEC-0032 or neighboring mechanics boundaries.
    - Parent integration contract that keeps subcluster-level mechanics separate from proposal/split readiness
      through the SG-SPEC-0032 subtree
    - Delegation of concrete mechanics ownership to SG-SPEC-0028
    out:
    - Concrete split payload schema, queue field semantics, or proposal-lane runtime policy details already
      owned by SG-SPEC-0028
    - Continuation-selection policy or retrospective direct-update semantics
    - Viewer UX, persistence implementation, or runtime orchestration decisions
  gateway_role:
  - SG-SPEC-0029 is the proposal/split mechanics child beneath SG-SPEC-0032.
  - SG-SPEC-0029 provides one inspectable boundary edge that keeps direct-update mechanics and proposal/split
    mechanics as separate atomic concerns.
  mechanics_gateway:
    proposal_split_ownership:
    - SG-SPEC-0028 remains the concrete owner of split proposal lifecycle, split mechanics schema, and
      proposal-lane execution descendants.
    integration_surface:
    - SG-SPEC-0029 is the only direct descendant of SG-SPEC-0032 for proposal/split readiness.
    - SG-SPEC-0032 must not expose SG-SPEC-0028 directly for proposal/split readiness while SG-SPEC-0029
      exists as the child-gateway.
    readiness_contract:
    - SG-SPEC-0030 formalizes the parent-facing prerequisite and non-bypass semantics for this gateway
      edge.
    - SG-SPEC-0032 must reach proposal/split readiness only through SG-SPEC-0029 for this subtree boundary.
  integration_boundaries:
  - SG-SPEC-0029 may not merge or redefine descendant contracts from SG-SPEC-0028.
  - SG-SPEC-0029 does not add field-level queue, ranking, or runtime orchestration rules.
  - SG-SPEC-0029 allows SG-SPEC-0032 to keep subcluster-level mechanics and proposal/split concerns as
    independently bounded predecessors.
  - SG-SPEC-0029 delegates parent-facing prerequisite semantics to SG-SPEC-0030.
  parent_contract:
  - SG-SPEC-0032 may consume SG-SPEC-0029 as one bounded prerequisite for proposal/split mechanics.
  - SG-SPEC-0032’s parent-facing prerequisite semantics are constrained by SG-SPEC-0030.
  - SG-SPEC-0032 must not depend_on SG-SPEC-0028 directly for proposal/split mechanics while SG-SPEC-0029
    is present.
  - Subcluster-level direct-update boundary semantics remain outside SG-SPEC-0029’s scope.

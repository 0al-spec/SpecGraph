prompt: Keep this node as the proposal/split mechanics availability contract. It should explain when proposal/split
  mechanics are available to the readiness branch, while concrete mechanics and prerequisite readiness
  remain separate inputs.
specification:
  objective: Define the proposal/split mechanics availability contract that lets the readiness branch
    know when proposal/split mechanics may be treated as available, without duplicating concrete split
    lifecycle, queue, or proposal-lane semantics.
  scope:
    in:
    - Proposal/split mechanics availability semantics.
    - Prerequisite readiness consumption.
    - Concrete mechanics ownership boundary.
    - Review-facing availability conditions for the readiness branch.
    - Topology-prose discipline for this branch.
    out:
    - Concrete split payload schema, queue field semantics, or proposal-lane runtime policy details already
      owned by downstream mechanics contracts
    - Continuation-selection policy or retrospective direct-update semantics
    - Viewer UX, persistence implementation, or runtime orchestration decisions
  availability_contract:
  - Proposal/split mechanics are available only when prerequisite readiness is satisfied and concrete
    mechanics ownership remains intact.
  - Availability is a reviewable readiness decision, not an invitation to inspect or duplicate split payload
    fields.
  readiness_inputs:
    prerequisite_readiness:
    - The prerequisite readiness input provides parent-facing admissibility semantics.
    concrete_mechanics:
    - The concrete mechanics input provides split lifecycle, split mechanics schema, and proposal-lane
      execution semantics.
  availability_conditions:
  - Prerequisite readiness must be satisfied by the prerequisite input.
  - Concrete mechanics ownership must remain with the concrete mechanics input.
  - If either side is missing or ambiguous, proposal/split mechanics availability is not satisfied for
    the readiness branch.
  mechanics_ownership:
  - The concrete mechanics surface remains responsible for split proposal lifecycle, split mechanics schema,
    and proposal-lane execution descendants.
  - This node may reference that ownership boundary but must not restate downstream field-level mechanics.
  topology_prose_policy:
  - Direct graph placement around this node is represented by canonical graph metadata.
  - This node's prose should explain availability semantics, not its position as a gateway, child, or
    edge.
  integration_boundaries:
  - This node may not merge or redefine downstream concrete mechanics contracts.
  - This node does not add field-level queue, ranking, or runtime orchestration rules.
  - This node keeps prerequisite readiness and concrete mechanics ownership distinct without turning their
    graph relation into the main prose.
  role_boundary:
  - This node owns only the availability decision that combines prerequisite readiness with concrete mechanics
    ownership.
  - This node does not own prerequisite admissibility policy, concrete split lifecycle, proposal-lane
    execution, payload fields, queue semantics, ranking, or runtime orchestration.
  - Graph placement is represented by metadata edges; prose should describe availability semantics rather
    than restating provider routes.
  parent_contract:
  - The readiness-region layer consumes this node as the proposal/split mechanics availability contract.
  - This node preserves prerequisite readiness and concrete mechanics ownership as separate inputs.
  - This node should be rewritten or merged rather than split again if a proposed child would only verbalize
    gateway, edge, or delegation facts.

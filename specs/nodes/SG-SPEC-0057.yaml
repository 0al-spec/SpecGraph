prompt: Define one readable downstream handoff contract beneath SG-SPEC-0043. The spec should say how
  the gateway boundary hands proposal/split readiness to SG-SPEC-0029, which alternate downstream routes
  are invalid, why review still stops at SG-SPEC-0043, and what remains outside this node.
specification:
  objective: Define SG-SPEC-0057 as the single downstream gateway-to-mechanics handoff contract beneath
    SG-SPEC-0043 so proposal/split readiness leaves the human-reviewable gateway boundary only as SG-SPEC-0043
    -> SG-SPEC-0029, without reopening the upstream gateway-entry chain or restating SG-SPEC-0029 field-level
    mechanics.
  scope:
    in:
    - Direct downstream handoff from the SG-SPEC-0043 gateway boundary to SG-SPEC-0029.
    - Downstream no-bypass rules that keep SG-SPEC-0029 as the only concrete mechanics leaf directly beneath
      SG-SPEC-0043 for this subtree.
    - Human-readable explanation of why review stops at SG-SPEC-0043 while concrete mechanics begin at
      SG-SPEC-0029.
    - One readable downstream role that keeps this handoff inspectable without reopening the upstream
      entry story already covered by SG-SPEC-0045.
    out:
    - The upstream gateway-entry chain from SG-SPEC-0026 to SG-SPEC-0043 owned by SG-SPEC-0045.
    - Full-chain no-bypass composition across both upstream and downstream segments already summarized
      by SG-SPEC-0044.
    - Concrete proposal/split payloads, lifecycle fields, queue ranking, or runtime orchestration owned
      downstream of SG-SPEC-0029.
    - Alternate routing semantics for cases where SG-SPEC-0043 is not the active gateway boundary.
  terminology:
    gateway_to_mechanics_handoff: The only allowed direct downstream route from the SG-SPEC-0043 gateway
      boundary to the concrete proposal/split mechanics leaf in SG-SPEC-0029.
    direct_mechanics_leaf: The single concrete mechanics dependency reached immediately after the human-reviewable
      gateway boundary in this subtree.
    downstream_bypass: Any alternate, parallel, or replacement route that would let this subtree reach
      proposal/split mechanics without the direct SG-SPEC-0043 -> SG-SPEC-0029 handoff.
    gateway_boundary: The human-reviewable proposal/split boundary at SG-SPEC-0043 where parent-facing
      review stops before concrete mechanics begin.
  handoff_contract:
  - For this subtree, the only direct downstream gateway_to_mechanics_handoff is SG-SPEC-0043 -> SG-SPEC-0029.
  - SG-SPEC-0029 is the direct_mechanics_leaf reached immediately after the gateway_boundary for proposal/split
    mechanics in this subtree.
  direct_handoff_steps:
  - SG-SPEC-0043 hands proposal/split readiness downstream only to SG-SPEC-0029.
  - SG-SPEC-0029 remains the first concrete proposal/split mechanics node beneath the gateway_boundary.
  gateway_boundary_rules:
  - SG-SPEC-0043 remains the human-reviewable gateway_boundary consumed directly by SG-SPEC-0032.
  - SG-SPEC-0057 does not replace SG-SPEC-0043 as the parent-facing gateway boundary; it only explains
    the direct downstream handoff beneath that boundary.
  invalid_handoffs:
  - No alternate direct mechanics leaf may replace SG-SPEC-0029 beneath SG-SPEC-0043 for this subtree.
  - No parallel downstream_bypass may expose proposal/split mechanics alongside SG-SPEC-0029 beneath SG-SPEC-0043.
  - No child of SG-SPEC-0043 may restate SG-SPEC-0029 field-level mechanics instead of the handoff contract
    unless a new runtime-observable invariant appears.
  boundaries:
  - SG-SPEC-0057 defines only the direct downstream handoff contract from SG-SPEC-0043 to SG-SPEC-0029.
  - SG-SPEC-0045 remains the upstream gateway-entry contract for how readiness reaches SG-SPEC-0043.
  - SG-SPEC-0044 remains the fuller parent contract for the complete no-bypass readiness chain across
    this subtree.
  - SG-SPEC-0029 remains the concrete mechanics leaf and continues to own downstream proposal/split mechanics
    boundaries beyond this handoff.
  invariants:
  - id: PSP-0057-1
    statement: The only direct downstream gateway_to_mechanics_handoff in this subtree is SG-SPEC-0043
      -> SG-SPEC-0029.
  - id: PSP-0057-2
    statement: SG-SPEC-0043 remains the human-reviewable gateway_boundary and SG-SPEC-0029 remains the
      direct_mechanics_leaf beneath it.
  - id: PSP-0057-3
    statement: Alternate or parallel downstream handoff routes that replace or parallel SG-SPEC-0043 ->
      SG-SPEC-0029 are invalid while this subtree shape remains active.
  - id: PSP-0057-4
    statement: SG-SPEC-0057 stays bounded to downstream handoff semantics and does not restate the upstream
      gateway-entry chain or SG-SPEC-0029 field-level mechanics.

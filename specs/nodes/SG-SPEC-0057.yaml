prompt: Refine SG-SPEC-0062 by externalizing the detailed `authority_class` semantics for governed nodes
  and explicit canonical edges. Keep this child implementation-agnostic and distinct from SG-SPEC-0024
  provenance-envelope field rules.
specification:
  objective: Define the cross-cutting semantic contract for `authority_class` so governed subjects can
    state how their current expression entered canonical truth without collapsing that label into review,
    correctness, or storage policy.
  scope:
    in:
    - Semantic meaning of `authority_class` on SG-SPEC-0001 seed node kinds
    - Semantic meaning of `authority_class` on explicit canonical edges
    - Class-specific assertions and non-assertions for authored, imported, inferred, and distilled
    - Single-class selection semantics for mixed-origin governed expressions
    - Bounded interaction with SG-SPEC-0019 revision and supersession lineage
    - Canonical-versus-derived boundary for authority-class projections and summaries
    out:
    - actor_id, source_ref, source_confidence, recorded_at, and other provenance-envelope field mechanics
      — covered by SG-SPEC-0024
    - Revision-record schemas, predecessor ordering, and lineage storage mechanics — covered by SG-SPEC-0019
    - Lifecycle status, linked readiness, review approval, or frozen-state policy
    - Trust scoring, ranking heuristics, or automatic promotion behavior
    - Span-level attribution, weighted multi-class mixtures, or per-fragment authority markup
    - Serialization layout, database schema, index design, viewer badging, or CLI implementation
  terminology:
    authority_class: A canonical origin label that states how the current governed expression of a node
      or explicit canonical edge entered canonical truth.
    authored_subject: A governed subject whose current expression was directly written or materially restated
      under human author intent.
    imported_subject: A governed subject whose current expression was brought in from an external source
      system as governed canonical content.
    inferred_subject: A governed subject whose current expression was synthesized from other available
      signals by machine reasoning and then explicitly admitted into canonical truth.
    distilled_subject: A governed subject whose current canonical act produced a governed source_bounded_compression
      of other governed or imported material.
    source_bounded_compression: A compression, synthesis, or summary whose operative meaning remains bounded
      to the source material being condensed and does not add a new claim, dependency, conclusion, or
      normative scope beyond that source set.
    composite_expression: A governed subject whose current expression incorporates more than one upstream
      contribution mode or source pattern but is still admitted as one canonical subject carrying exactly
      one authority_class.
    semantic_preservation: Preservation of an upstream claim or relation assertion without materially
      changing its operative meaning, despite normalization, transcription, field projection, or other
      representational reshaping.
    edge_assertion_subject: The governed relation assertion embodied by one explicit canonical edge instance,
      treated as an authority-bearing subject distinct from the authority classes of its endpoint nodes.
    authority_restatement: An explicit canonical revision or supersession that changes the authority_class
      attached to the current governed expression.
  authority_class_contract:
    applies_to:
    - intent
    - spec
    - requirement
    - decision
    - constraint
    - invariant
    - code_surface
    - test
    - release
    - explicit canonical edges
    class_catalog:
    - class: authored
      origin_assertion: The current governed expression was directly authored or materially restated by
        a human accountable for the canonical content.
      non_assertions:
      - The subject is automatically correct, approved, or reviewed.
      - No tools, imports, or machine assistance contributed upstream context.
      subject_examples:
      - A requirement node drafted directly by a product owner.
      - A supersedes edge written by a reviewer to record an intentional replacement.
    - class: imported
      origin_assertion: The current governed expression is canonically preserved from an external source
        system with governed import intent.
      non_assertions:
      - The external source is automatically trusted, complete, or immutable.
      - The imported content is exempt from later canonical editing or review.
      subject_examples:
      - An issue tracker record admitted into the graph as a requirement.
      - A release node imported from an external deployment registry.
    - class: inferred
      origin_assertion: The current governed expression was machine-derived from available evidence and
        then explicitly recorded as canonical content.
      non_assertions:
      - The inference is automatically approved, correct, or self-justifying.
      - Uncommitted model output or viewer guesses are canonical by default.
      subject_examples:
      - A machine-proposed dependency edge that is explicitly accepted into canonical graph state.
      - An inferred requirement wording that is promoted into a governed node with provenance.
    - class: distilled
      origin_assertion: The current governed expression is a governed source_bounded_compression of other
        source material while remaining semantically narrower than the full source set.
      non_assertions:
      - The distilled subject replaces its source lineage or deletes the underlying artifacts.
      - Distillation alone authorizes lifecycle progression or trust elevation.
      - The compression was performed by a particular actor type or with a particular tool.
      subject_examples:
      - A role pack or glossary node condensed from multiple underlying specs.
      - A summary edge explanation promoted as governed canonical context.
    selection_rules:
    - A composite_expression MUST still carry exactly one authority_class chosen from the canonical act
      that materially produced the current governed expression admitted into the graph.
    - Formatting normalization, schema migration, mechanical transcription, or clerical copying that preserve
      the external semantic content do not by themselves change imported content into authored, inferred,
      or distilled.
    - Human approval, review, or minor copyediting of an imported, inferred, or distilled expression does
      not by itself change authority_class; the class changes only when a canonical act materially restates
      or replaces the current governed expression.
    - When authored and inferred signals overlap, classify the expression as inferred if machine reasoning
      materially contributed the substantive new claim being admitted; classify it as authored only after
      a separate human-authored canonical act materially restates or replaces that claim.
    - Use authored when accountable human intent materially determines the current governed wording or
      relation assertion outside a source_bounded_compression, even if imports, summaries, or machine
      proposals informed the draft.
    - Use imported when the current governed expression is semantically preserved from an external source
      as the content being canonically admitted, even if tooling normalizes representation or wraps it
      in local metadata.
    - Use inferred when machine reasoning contributes the substantive new claim, relation assertion, or
      wording being canonically admitted rather than merely assisting a human-authored or externally preserved
      expression.
    - Use distilled when the current canonical act produces a governed source_bounded_compression of source
      material and remains semantically narrower than the source set, regardless of whether a human, tool,
      or model performed that canonical compression act.
    - A preserved external summary remains imported when the canonical act admits it unchanged under semantic_preservation;
      source_bounded_compression selects distilled only when the canonical act performs the compression.
    - A human-authored summary is distilled rather than authored when its canonical act is a source_bounded_compression;
      it becomes authored only when the human act materially restates, adds, removes, or normatively reshapes
      meaning beyond that compression boundary.
    - If the expression introduces a new latent claim, dependency, or conclusion beyond source_bounded_compression,
      use inferred rather than distilled when machine reasoning produced that new content, or authored
      when accountable human intent produced that new content as a canonical restatement.
    preservation_boundary_rules:
    - Imported applies only when the current governed expression remains in semantic_preservation with
      a specific external source claim or relation assertion being canonically admitted.
    - Normalizing syntax, casing, identifiers, ordering, or local envelope metadata MAY preserve imported
      classification when those changes do not materially change the source meaning.
    - Quoting, excerpting, projecting a field, or extracting an explicit relation from an external source
      remains imported only while the admitted governed expression preserves that source meaning without
      additional compression, combination, or interpretation.
    - Once a canonical act materially restates external content, merges multiple source statements into
      one governed expression, or compresses the source into a shorter governed summary, the result is
      no longer imported and MUST be classified by the act that produced it, typically authored, distilled,
      or inferred.
    - Translation or paraphrase MAY remain imported when canonical intent is still semantic_preservation
      of the same operative meaning; if the rewrite resolves ambiguity, adds connective conclusions, or
      changes operative scope, classify the result by the producing act rather than as imported.
    - For an explicit canonical edge, imported applies only when the external source already makes that
      relation assertion explicit; constructing the edge from implication, correlation, or interpretive
      reading is not imported and MUST be classified as authored, distilled, or inferred according to
      the producing act.
    semantic_rules:
    - Every governed node and every explicit canonical edge MUST carry exactly one authority_class.
    - authority_class classifies origin of the current governed expression; it MUST NOT be used as a synonym
      for lifecycle status, review state, correctness, or priority.
    - authority_class applies to the current expression of the subject, not to the entire upstream history
      taken as one undifferentiated blob.
    - If a subject is materially rewritten, re-imported, inferred anew, or newly distilled, the resulting
      authority_class must describe that new governed expression rather than the predecessor's class by
      default.
    edge_boundary_rules:
    - For an explicit canonical edge, authority_class classifies the origin of the governed relation assertion
      made by that edge instance, not the origin of either endpoint node.
    - An explicit canonical edge MAY carry a different authority_class from its source node, target node,
      or both, without creating a semantic contradiction.
    - Repointing an explicit canonical edge, changing its edge kind, or materially restating the governed
      relation assertion produces a new edge expression whose authority_class MUST describe that edge-level
      canonical act.
    - Endpoint lineage, node authorship, or graph-analysis heuristics MAY inform an editor, but they MUST
      NOT mechanically assign authority_class to an explicit canonical edge without an explicit canonical
      act.
    lineage_rules:
    - An in-place revision may preserve or change authority_class, but any resulting class value MUST
      be explicitly recorded through the canonical revision event rather than inferred from downstream
      tooling.
    - A superseding successor may carry a different authority_class from the superseded subject; the successor's
      class applies only to the successor expression and MUST NOT retroactively rewrite predecessor lineage.
    - Derived projections may suggest likely authority classes, but they remain advisory until an explicit
      canonical revision or supersession records the class on the governed subject.
    - A later imported, inferred, or distilled successor does not erase the fact that an earlier predecessor
      may have been authored, and vice versa; lineage preserves that sequence.
  boundary_policy:
  - authority_class answers how the current governed expression entered canonical truth, not whether the
    expression is good, complete, or approved.
  - For explicit canonical edges, the governed subject is the relation assertion itself; endpoint node
    provenance does not automatically determine the edge's authority_class.
  - SG-SPEC-0024 governs provenance-envelope fields and their conditional requirements for each authority_class;
    this child governs only class meaning.
  - SG-SPEC-0019 governs how authority-bearing changes are recorded in lineage; this child does not redefine
    predecessor ordering, revision storage, or supersession topology.
  - This child assigns one authority_class to each governed subject; span-level mixture accounting or
    weighted multi-class attribution is out of scope.
  - Derived badges, trust views, or class summaries may be useful, but they remain rebuildable interpretations
    rather than canonical facts unless explicitly governed.
  canonical_vs_derived_boundary:
    canonical:
    - The explicit authority_class value on each governed node
    - The explicit authority_class value on each explicit canonical edge
    - Authority-class changes recorded through canonical revision or supersession events
    derived:
    - Guessed or classifier-proposed authority labels before governed acceptance
    - Viewer badges, trust rollups, filters, and dashboards assembled from canonical authority facts
    - Bulk summaries that collapse multiple lineage steps into one convenience label
  invariants:
  - id: AUT-001
    statement: Every governed node and every explicit canonical edge must carry exactly one canonical
      authority_class.
  - id: AUT-002
    statement: authority_class must classify origin of the current governed expression and must not be
      reused as a proxy for correctness, review approval, or lifecycle readiness.
  - id: AUT-003
    statement: Any authority_class change must be introduced by an explicit canonical revision or supersession
      event, not by inferred viewer state or derived projection logic alone.
  - id: AUT-004
    statement: For an explicit canonical edge, authority_class must classify the edge's governed relation
      assertion itself and must not be inherited mechanically from either endpoint node.
  - id: AUT-005
    statement: A mixed-origin governed expression must still resolve to exactly one authority_class based
      on the canonical act that materially produced the current expression; source mixture, approval,
      or formatting normalization alone must not create multi-class canonical state.
  - id: AUT-006
    statement: A human or machine summary whose canonical act is a source_bounded_compression must be
      classified as distilled, not authored or inferred, unless the canonical act adds, removes, concludes,
      or normatively reshapes meaning beyond source_bounded_compression; an unchanged externally sourced
      summary remains imported under semantic_preservation.
  examples:
  - name: Authored revision of an imported requirement
    description: An imported requirement is materially rewritten by a human reviewer into a new governed
      expression. The successor or revision may now carry `authority_class = authored`, while SG-SPEC-0019
      lineage preserves that the predecessor expression had been imported.
  - name: Derived guess stays non-canonical
    description: A viewer notices repeated summarization patterns and proposes that a node is distilled.
      Until a governed canonical revision records `authority_class = distilled`, that guess remains derived
      UI state only.
  - name: Inferred edge requires explicit acceptance
    description: A tool suggests a new depends_on edge from graph analysis. The suggestion remains derived
      until a canonical explicit edge is created or revised with `authority_class = inferred` and SG-SPEC-0024-compatible
      provenance.
  - name: Imported edge preserves an explicit external relation
    description: An external compliance source explicitly states that requirement A depends on requirement
      B. Recording that same relation as one canonical depends_on edge may remain `authority_class = imported`
      if the governed edge preserves the source assertion rather than deriving a new relation from interpretation.
  - name: Authored edge between imported nodes
    description: Two requirement nodes may remain `authority_class = imported` from an external tracker,
      while a reviewer authors a new contradicts edge between them. The edge therefore carries `authority_class
      = authored` because the governed relation assertion was introduced by a human canonical act, not
      inherited from either imported endpoint.
  - name: Distilled summary versus inferred conclusion
    description: A governed node whose current canonical act compresses three imported requirement paragraphs
      into one shorter source_bounded_compression remains `authority_class = distilled` even when a human
      writes the summary. If an external source already provides that concise summary and SpecGraph imports
      it unchanged, the admitted expression remains `authority_class = imported`; if a model instead derives
      a new dependency claim from those paragraphs that was not already present as source_bounded_compression,
      the admitted expression is `authority_class = inferred`.

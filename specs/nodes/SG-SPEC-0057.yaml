acceptance:
- Defines the bounded role of `authority_class` as a cross-cutting origin tag for SG-SPEC-0001 nodes and
  explicit canonical edges without redefining provenance-envelope fields, lifecycle status, or trust-scoring
  algorithms
- Defines the semantic contract for the four root classes `authored`, `imported`, `inferred`, and `distilled`,
  including what each class asserts about origin and what it does not assert
- Defines how `authority_class` applies across revisions, supersession, and derived projections so class
  changes remain explicit canonical acts rather than inferred viewer state
- Keeps provenance field mechanics, storage layout, review policy, and implementation details delegated
  to SG-SPEC-0024, SG-SPEC-0019, or future children

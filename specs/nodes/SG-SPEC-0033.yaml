prompt: Materialize SG-SPEC-0033 as the bounded continuation-candidate selection child for SG-SPEC-0026.
  It must constrain derivation sources, enforce deterministic de-duplication and tie-break ordering, and
  emit only derived selection and handoff artifacts for SG-SPEC-0026.
specification:
  objective: Define deterministic continuation candidate derivation and selection mechanics so SG-SPEC-0026
    can integrate continuation handoff without owning execution-scoring or viewer behavior.
  scope:
    in:
    - Candidate derivation constraints from linked canonical frontier specs
    - De-duplication and tie-break rules for continuation candidates
    - Selection output contract used by SG-SPEC-0026 for handoff
    - Derived-only continuation records when no valid candidate or suppression applies
    out:
    - Concrete reflective execution mechanics owned by SG-SPEC-0027
    - Authority limits, proposal ownership, or gate suppression policies that control direct continuation
    - Scoring formulas, queue-priority engines, and viewer/UX design
  candidate_discovery:
  - SG-SPEC-0033 searches only linked canonical specs in the current reflective frontier.
  - 'Candidate candidates may be informed by status, maturity, and graph-health signal classes: repeated_split_required_candidate,
    stalled_maturity_candidate, weak_structural_linkage_candidate.'
  - Candidate derivation de-duplicates identical target regions before selection ranking.
  selection_contract:
  - SG-SPEC-0033 emits at most one selected_continuation_candidate per run context.
  - 'When multiple candidates survive, ordering is deterministic by signal class: repeated_split_required_candidate
    > stalled_maturity_candidate > weak_structural_linkage_candidate.'
  - If tie persists after signal-ordering, choose the lexicographically smallest linked candidate identifier.
  - All non-selected candidates are emitted as derived handoff entries, never direct canonical updates.
  output_contract:
  - 'SG-SPEC-0033 emits exactly one derived `continuation_selection` artifact per run context with fields:
    selected_candidate_id (or null), selection_rationale, and de-duplicated candidate_set.'
  - SG-SPEC-0033 emits derived `continuation_handoff` artifacts for each suppressed or non-selected candidate.
    Suppression handoff artifacts carry candidate_id, suppression_reason, and rerank_position.
  - SG-SPEC-0026 consumes only these derived continuation artifacts and this node performs no canonical
    status/maturity/backlog/ownership mutations.
  parent_contract:
  - SG-SPEC-0026 depends_on SG-SPEC-0033 for deterministic continuation candidate selection mechanics.
  - SG-SPEC-0026 retains suppression, gating, and handoff policy at integration level.
  - SG-SPEC-0033 must remain implementation-agnostic to scoring formulas, queue-priority engines, and
    viewer/UX.
  boundary_notes:
  - SG-SPEC-0033 is a bounded selection-mechanics node and does not redefine proposal ownership or direct
    execution contracts.

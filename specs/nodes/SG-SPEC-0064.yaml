prompt: Introduce the governance and vocabulary semantics cluster beneath SG-SPEC-0001 so root fan-out
  pressure can be reduced through a meaningful intermediate parent for refinement policy, graph-health
  governance, and vocabulary semantics.
specification:
  objective: Define the intermediate semantic cluster for governance and vocabulary semantics so SG-SPEC-0001
    can delegate refinement policy, reflective graph-health governance, and ubiquitous vocabulary concerns
    through one legible aggregate boundary while each concrete child keeps its stable bounded contract.
  scope:
    in:
    - Intermediate cluster role for governance and vocabulary semantics beneath SG-SPEC-0001
    - Grouping boundary for refinement/linkage policy, reflective governance, graph-health signals, and
      vocabulary primitives
    - Dependency routing from SG-SPEC-0001 through the cluster to concrete semantic children
    - Reparenting boundary for reducing root refinement fan-out without changing stable child IDs
    out:
    - Validator implementation, traversal implementation, or graph storage behavior
    - Supervisor workflow, queue control, continuation selection, or runtime execution
    - Vocabulary compiler behavior, generated adapter code, or model-specific interpretation
    - Viewer UI, graph layout, badges, alerts, or interaction design
  terminology:
    governance_vocabulary_cluster: The intermediate parent under SG-SPEC-0001 that groups core graph governance
      and vocabulary semantics without becoming runtime policy execution.
    governance_boundary: The semantic region that defines how specs refine, link, expose health signals,
      and stay readable as governed graph artifacts.
    vocabulary_boundary: The semantic region that defines shared executable vocabulary primitives without
      prescribing compiler or runtime behavior.
  cluster_contract:
    parent_boundary:
    - SG-SPEC-0001 remains the seed ontology and owns root layer, node kind, edge kind, lifecycle, and
      invariant semantics.
    - SG-SPEC-0064 owns the aggregate boundary for core governance and vocabulary semantics beneath that
      seed ontology.
    dependency_policy:
    - SG-SPEC-0001 may depend on SG-SPEC-0064 as the aggregate blocking descendant for governance and
      vocabulary semantics.
    - SG-SPEC-0064 depends on concrete member specs that define the detailed semantics required by the
      aggregate.
    - Member specs keep their stable IDs and may retain their existing own dependencies; the cluster does
      not rewrite those contracts.
    refinement_routing_policy:
    - Existing SG-SPEC-0001 children whose primary role is refinement policy, graph-health governance,
      or vocabulary semantics may be reparented to SG-SPEC-0064.
    - Reparenting a member under SG-SPEC-0064 must preserve the member's stable identity, acceptance,
      provenance, and own dependency semantics.
  member_contracts:
  - spec_id: SG-SPEC-0002
    member_role: Spec refinement and linkage policy.
    ownership_boundary: Defines spec-to-spec refinement, linkage coordination, and child governance without
      implementing validators or runtime generation.
  - spec_id: SG-SPEC-0003
    member_role: Reflective governance and graph-health signals.
    ownership_boundary: Defines reflective governance boundaries, first-persistence rules, graph-health
      signals, and their proposal-first constraints.
  - spec_id: SG-SPEC-0010
    member_role: Ubiquitous vocabulary meta-ontology primitives.
    ownership_boundary: Defines vocabulary primitive semantics for executable domain vocabularies without
      prescribing compiler or runtime behavior.
  non_goal_policy:
  - SG-SPEC-0064 must not redefine member procedures, graph-health formulas, vocabulary adapter behavior,
    or viewer affordances.
  - SG-SPEC-0064 must not claim runtime realization merely because its members govern supervisor-adjacent
    semantics.
  - SG-SPEC-0064 must not hide unresolved member gaps; backlog and evidence projections should continue
    to point to the concrete member when the gap is member-specific.

prompt: Define the first canonical child under SG-SPEC-0007 for the pre-spec semantic layer. Keep it focused
  on Intent, Hypothesis, Proposal, IntentFragment, IntentDraft, orthogonal provenance or authority axes,
  and promotion boundaries into Proposal or SpecDraft. Delegate explicit Proposal->SpecDraft review and
  non-silent transition constraints to child SG-SPEC-0051, and delegate concrete orthogonal axis value
  spaces plus traceability semantics to child SG-SPEC-0052. Do not define project-memory consultation
  policy, operator-request runtime execution semantics, tracked proposal-lane storage, GUI protocol, or
  repository layout here.
specification:
  objective: Define SG-SPEC-0050 as the first canonical child under SG-SPEC-0007 for the graph-native
    pre-spec semantic layer, keeping the overview integration and upstream promotion envelope above detailed
    primary-kind semantics delegated to SG-SPEC-0053 and concrete downstream promotion review delegated
    to SG-SPEC-0051.
  scope:
    in:
    - Overview integration for the first-class pre-spec semantic kinds Intent, Hypothesis, Proposal, IntentFragment,
      and IntentDraft
    - Parent observed-intent envelope from raw_input through IntentFragment and IntentDraft toward Intent,
      Proposal, or SpecDraft
    - Parent-level separation between primary kinds and orthogonal review axes
    - Upstream promotion boundary from IntentDraft toward Proposal or SpecDraft
    - Coordination of delegated child ownership for detailed primary-kind semantics in SG-SPEC-0053, concrete
      promotion review semantics in SG-SPEC-0051, and concrete axis value spaces plus traceability semantics
      in SG-SPEC-0052
    out:
    - Detailed primary-kind roles, immediate adjacency, and mixed-content split rules for Intent, Hypothesis,
      Proposal, IntentFragment, and IntentDraft
    - Concrete axis value spaces, defaulting rules, and traceability semantics
    - Concrete Proposal->SpecDraft review gates, non-silent transition records, and canonical materialization
      rules
    - Project-memory consultation policy or retrieval behavior
    - Supervisor-facing operator-request execution contract
    - Tracked proposal-lane repository persistence and authority states
    - GUI protocol, canvas layout, or renderer behavior
    - Final repository storage layout for pre-spec artifacts
    - Full natural-language understanding or model-specific interpretation logic
    - Detailed edge taxonomies for supporting kinds beyond the minimal semantic adjacency stated here
  coordination_envelope:
    parent_role:
    - SG-SPEC-0050 is the first canonical child under SG-SPEC-0007 for the pre-spec semantic layer.
    - SG-SPEC-0050 keeps the overview vocabulary and upstream observed-intent and promotion envelope that
      connect raw_input to later Proposal or SpecDraft work.
    - SG-SPEC-0050 MUST delegate detailed primary-kind semantics and immediate adjacency to SG-SPEC-0053,
      concrete Proposal->SpecDraft review procedure to SG-SPEC-0051, and concrete orthogonal axis value
      spaces plus traceability semantics to SG-SPEC-0052.
    shared_invariants:
    - Intent, Hypothesis, Proposal, IntentFragment, and IntentDraft remain the stable primary-kind vocabulary
      for this subtree and remain reviewable pre-canonical declarations rather than canonical graph truth.
    - Orthogonal review axes remain inspectable metadata adjacent to kind and MUST NOT replace the primary
      semantic kinds.
    - Promotion toward Proposal or SpecDraft remains explicit and bounded even when the concrete review
      procedure is delegated.
  terminology:
    pre_spec_layer: Graph-native, reviewable semantics that capture intent formation before canonical
      spec or proposal artifacts are accepted as governed graph truth.
    raw_input: A human-originated utterance, note, or selection-adjacent expression that has not yet been
      normalized into pre-spec graph structure.
    intent: A normative declaration of what should become true, remain possible, be preserved, or be prevented.
    hypothesis: An epistemic declaration of what may be true in the problem space.
    proposal: A candidate design move intended to operationalize one or more intents under constraints
      and assumptions. A Proposal is pre-canonical and remains non-authoritative until an explicit downstream
      review or promotion decision occurs.
    intent_fragment: The minimal extracted semantic unit from raw_input that appears to express part of
      an intent but is not yet stable enough to become a full draft.
    intent_draft: A synthesized pre-spec node assembled from one or more intent_fragment nodes plus optional
      supporting hypotheses or other reviewable context.
    spec_draft: A reviewable pre-canonical draft of later specification shape that may be promoted only
      from confirmed or explicitly reviewed pre-spec material.
  child_governance_map:
  - child_spec: SG-SPEC-0053
    concern: Detailed primary-kind semantics and immediate adjacency
    parent_summary:
    - This node establishes the overview vocabulary and observed-intent envelope for Intent, Hypothesis,
      Proposal, IntentFragment, and IntentDraft.
    - Detailed semantic roles, immediate adjacency, and mixed-content primary-kind separation rules live
      in SG-SPEC-0053 rather than in this overview node.
    detailed_governance_owned_by_child:
    - Detailed semantic roles and per-kind boundaries
    - Immediate adjacency among primary pre-spec kinds
    - Mixed-content separation and required kind-preserving edges
  - child_spec: SG-SPEC-0051
    concern: Concrete promotion boundary for Proposal, SpecDraft, and canonical materialization
    parent_summary:
    - This node establishes that IntentDraft is the last required observed-intent artifact before downstream
      promotion toward Proposal or SpecDraft.
    - Concrete Proposal->SpecDraft review, non-silent promotion constraints, and downstream canonical
      materialization rules live in SG-SPEC-0051 rather than in this node.
    detailed_governance_owned_by_child:
    - Explicit Proposal->SpecDraft review requirements
    - Non-silent transition constraints and required promotion records
    - Forbidden shortcut paths into canonical artifacts
  - child_spec: SG-SPEC-0052
    concern: Orthogonal axis value spaces and traceability semantics
    parent_summary:
    - This node establishes that phase, status, authority, confidence, provenance, context_tags, and supersedes
      remain inspectable review axes adjacent to kind.
    - Concrete axis value spaces, defaulting rules, lineage semantics, and supersession traceability live
      in SG-SPEC-0052 rather than in this node.
    detailed_governance_owned_by_child:
    - Allowed value spaces and defaults for pre-spec review axes
    - Traceability and lineage semantics across pre-spec nodes
    - Supersession and axis-update constraints
  node_axes:
    delegated_to: SG-SPEC-0052
    retained_parent_role:
    - phase, status, authority, confidence, provenance, context_tags, and supersedes remain explicit review
      axes adjacent to pre-spec kind, not separate primary semantic kinds.
    - This node only establishes that these axes exist for pre-spec nodes and must remain inspectable
      through review.
    - Concrete value spaces, defaulting rules, traceability requirements, and supersession immutability
      semantics are delegated to SG-SPEC-0052.
  primary_kind_model:
    detailed_semantics_delegated_to: SG-SPEC-0053
    retained_parent_role:
    - Intent, Hypothesis, Proposal, IntentFragment, and IntentDraft are the stable primary-kind vocabulary
      coordinated by SG-SPEC-0050 for this subtree.
    - SG-SPEC-0050 keeps the parent distinction between one primary kind per node and orthogonal review
      axes adjacent to kind.
    - SG-SPEC-0053 owns the detailed semantic roles, immediate adjacency, and mixed-content separation
      rules for those primary kinds.
  observation_model:
    detailed_path_semantics_delegated_to: SG-SPEC-0053
    path:
    - raw_input -> IntentFragment
    - IntentFragment -> IntentDraft
    - IntentDraft -> Intent
    - IntentDraft -> Proposal
    - IntentDraft -> SpecDraft
    retained_parent_role:
    - SG-SPEC-0050 keeps the overview observed-intent envelope from raw_input through IntentDraft toward
      downstream Intent, Proposal, or SpecDraft artifacts.
    - SG-SPEC-0050 does not restate the detailed immediate adjacency or mixed-kind extraction rules beneath
      that envelope.
    - Detailed primary-kind path semantics and immediate adjacency are delegated to SG-SPEC-0053.
    - Proposal and SpecDraft sit downstream from the observed-intent path defined here, but the concrete
      review gates for moving into or between those downstream artifacts are outside this node.
  promotion_envelope:
    delegated_to: SG-SPEC-0051
    parent_rules:
    - IntentDraft is the last required observed-intent artifact defined in this node before downstream
      promotion work begins.
    - Proposal is the first candidate operationalization target downstream from the observed-intent path
      defined here.
    - SpecDraft is a downstream pre-canonical target that may be entered only through explicit promotion
      rules governed outside this node.
    - Any concrete Proposal->SpecDraft review, non-silent promotion requirement, or canonical materialization
      gate is outside this node and delegated to SG-SPEC-0051.
    delegation_note: SG-SPEC-0050 defines the upstream semantic boundary out of IntentDraft toward Proposal
      or SpecDraft; SG-SPEC-0053 governs detailed primary-kind semantics and immediate adjacency, SG-SPEC-0051
      governs the concrete promotion gates, explicit Proposal->SpecDraft review, and non-silent transition
      requirements, while SG-SPEC-0052 governs concrete orthogonal axis value spaces and traceability
      semantics.
  boundary_policy:
    pre_canonical_status:
    - Pre-spec nodes are reviewable declarations, not canonical graph truth.
    - Presence in the pre-spec layer does not by itself mutate canonical intent or specification nodes.
    assistant_visibility:
    - Assistant-generated pre-spec nodes must preserve authority, confidence, and provenance so their
      synthesis remains inspectable.
    context_boundary:
    - Context should default to metadata, overlays, selectors, filters, or weighting lenses rather than
      to a separate primary semantic kind.
  adjacency_notes:
  - SG-SPEC-0053 defines the detailed primary-kind semantics, immediate adjacency, and mixed-content separation
    rules for Intent, Hypothesis, Proposal, IntentFragment, and IntentDraft beneath this overview.
  - SG-SPEC-0051 defines the concrete promotion boundary for IntentDraft, Proposal, SpecDraft, and canonical
    materialization, including explicit Proposal->SpecDraft review and non-silent transition constraints.
  - SG-SPEC-0052 defines the orthogonal axis value spaces and traceability semantics for pre-spec nodes
    using phase, status, authority, confidence, provenance, context_tags, and supersedes.
  - SG-SPEC-0008 remains the adjacent node for explicit project-memory consultation during mediated discovery.
  - SG-SPEC-0009 remains the adjacent node for one-run operator-request normalization and supervisor steering.
  - SG-SPEC-0006 remains the adjacent node for tracked proposal-lane persistence, review state, and application
    semantics.
  - This node defines overview integration and upstream promotion boundaries, not per-kind semantic detail,
    final repository storage layout, or viewer rendering.
  examples:
  - name: Intent-first draft
    description: A user says the original intent should survive formalization. The system captures fragments,
      synthesizes an intent_draft, and keeps it reviewable before any canonical spec node is created.
  - name: Hypothesis-backed proposal
    description: The system records a hypothesis that premature proposals bias framing, then links a proposal
      to that hypothesis and to the motivating intent rather than silently flattening both into one spec.

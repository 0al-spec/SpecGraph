  for Intent, Hypothesis, Proposal, IntentFragment, and IntentDraft as reviewable pre-canonical declarations
- Defines IntentFragment and IntentDraft as the minimal observed-intent path from raw user input toward
  later Proposal or SpecDraft material without collapsing directly into canonical graph truth
- Declares orthogonal pre-spec review axes for phase, status, authority, confidence, provenance, context_tags,

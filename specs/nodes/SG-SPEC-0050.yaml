prompt: Define the first canonical child under SG-SPEC-0007 for the pre-spec semantic layer. Keep it focused
  on Intent, Hypothesis, Proposal, IntentFragment, IntentDraft, orthogonal provenance or authority axes,
  and promotion boundaries into Proposal or SpecDraft. Delegate explicit Proposal->SpecDraft review and
  non-silent transition constraints to child SG-SPEC-0051. Do not define project-memory consultation policy,
  operator-request runtime execution semantics, tracked proposal-lane storage, GUI protocol, or repository
  layout here.
specification:
  objective: Define the minimal graph-native semantic layer that captures observable pre-spec intent formation
    before canonical spec or proposal promotion.
  scope:
    in:
    - Primary pre-spec semantic kinds Intent, Hypothesis, and Proposal
    - Auxiliary observed-intent kinds IntentFragment and IntentDraft
    - Orthogonal draft axes such as phase, status, authority, confidence, provenance, context_tags, and
      supersedes
    - Suggested edge semantics between pre-spec declarations
    out:
    - Project-memory consultation policy or retrieval behavior
    - Supervisor-facing operator-request execution contract
    - Tracked proposal-lane repository persistence and authority states
    - GUI protocol, canvas layout, or renderer behavior
    - Final repository storage layout for pre-spec artifacts
    - Full natural-language understanding or model-specific interpretation logic
  terminology:
    pre_spec_layer: Graph-native, reviewable semantics that capture intent formation before canonical
      spec or proposal artifacts are accepted as governed graph truth.
    raw_input: A human-originated utterance, note, or selection-adjacent expression that has not yet been
      normalized into pre-spec graph structure.
    intent: A normative declaration of what should become true, remain possible, be preserved, or be prevented.
    hypothesis: An epistemic declaration of what may be true in the problem space.
    proposal: A candidate design move intended to operationalize one or more intents under constraints
      and assumptions. A Proposal is pre-canonical and remains non-authoritative until explicitly linked
      to a Review or promotion decision.
    intent_fragment: The minimal extracted semantic unit from raw_input that appears to express part of
      an intent but is not yet stable enough to become a full draft.
    intent_draft: A synthesized pre-spec node assembled from one or more intent_fragment nodes plus optional
      linked constraints, questions, and hypotheses.
    spec_draft: A reviewable pre-canonical draft of later specification shape that may be promoted only
      from confirmed or explicitly reviewed pre-spec material.
  node_axes:
    phase:
    - pre-spec nodes must remain distinguishable from canonical intent, canonical spec, and runtime artifact
      phases.
    - The pre-spec layer may remain visible even when later canonical artifacts are created from the same
      underlying concern.
    status:
    - Pre-spec nodes may be inferred, confirmed, superseded, rejected, deferred, or promoted.
    - Status remains review semantics and must not be conflated with canonical lifecycle status.
    authority:
    - authority records whether a node is human-originated, assistant-inferred, mediator-normalized, or
      otherwise reviewable pre-canonical material.
    confidence:
    - confidence may express how stable or provisional a draft interpretation currently is.
    provenance:
    - provenance must retain the source utterances, graph elements, or other declared precursor artifacts
      that produced the pre-spec node.
    context_tags:
    - context_tags may express view or situational lenses without becoming separate primary semantic kinds.
    supersedes:
    - supersedes may relate later drafts or decisions to earlier pre-spec declarations without implying
      canonical promotion.
  observation_model:
    fragment_rules:
    - intent_fragment is the smallest extracted semantic unit that still carries observable intent meaning.
    - Fragments may preserve partial goals, objections, constraints, or questions without forcing one
      final interpretation too early.
    draft_rules:
    - intent_draft may synthesize one or more intent_fragment nodes plus linked constraints, questions,
      and hypotheses.
    - intent_draft remains the primary observed-intent object until explicit confirmation, review, or
      promotion occurs.
    - A single raw_input may produce multiple drafts when one utterance carries multiple bounded concerns.
  edge_semantics:
  - intent_fragment refines intent_draft
  - constraint constrains intent_draft or proposal
  - proposal operationalizes intent
  - proposal assumes hypothesis
  - question answers or blocks proposal
  - intent_draft derived_from raw_input or precursor graph context
  promotion_pipeline:
    delegated_to: SG-SPEC-0051
    delegation_note: SG-SPEC-0050 defines pre-spec semantic kinds and orthogonal axes; SG-SPEC-0051 governs
      the concrete pre-spec promotion gates, non-silent transition requirements, and explicit Proposal->SpecDraft
      review before canonical materialization.
  boundary_policy:
    pre_canonical_status:
    - Pre-spec nodes are reviewable declarations, not canonical graph truth.
    - Presence in the pre-spec layer does not by itself mutate canonical intent or specification nodes.
    assistant_visibility:
    - Assistant-generated pre-spec nodes must preserve authority, confidence, and provenance so their
      synthesis remains inspectable.
    context_boundary:
    - Context should default to metadata, overlays, selectors, filters, or weighting lenses rather than
      to a separate primary semantic kind.
  adjacency_notes:
  - SG-SPEC-0051 defines the concrete promotion boundary for IntentDraft, Proposal, SpecDraft, and canonical
    materialization, including explicit Proposal->SpecDraft review and non-silent transition constraints.
  - SG-SPEC-0008 remains the adjacent node for explicit project-memory consultation during mediated discovery.
  - SG-SPEC-0009 remains the adjacent node for one-run operator-request normalization and supervisor steering.
  - SG-SPEC-0006 remains the adjacent node for tracked proposal-lane persistence, review state, and application
    semantics.
  - This node defines semantic kinds and promotion boundaries, not final repository storage layout or
    viewer rendering.
  examples:
  - name: Intent-first draft
    description: A user says the original intent should survive formalization. The system captures fragments,
      synthesizes an intent_draft, and keeps it reviewable before any canonical spec node is created.
  - name: Hypothesis-backed proposal
    description: The system records a hypothesis that premature proposals bias framing, then links a proposal
      to that hypothesis and to the motivating intent rather than silently flattening both into one spec.

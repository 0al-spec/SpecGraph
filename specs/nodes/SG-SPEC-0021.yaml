acceptance:
- Defines the bounded role of derived metric families as diagnostic and evidence inputs adjacent to canonical
  ontology without defining formulas, thresholds, storage, dashboards, or scheduler behavior
- 'Defines the first metric family seeds in scope for this boundary: pre-SIB, SIB, Specification Verifiability,
  Process Observability, and Structural Observability'
- Defines how each metric family binds to a bounded subject and admissible input classes drawn from canonical
  graph state, runtime observability entities, and derived graph-health observations or signals
- Defines the canonical versus derived boundary for metric family definitions, computed values, threshold
  proposals, and trend artifacts so scores do not become canonical truth by default
acceptance_evidence:

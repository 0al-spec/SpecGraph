    to canonical ontology without defining formulas, thresholds, storage, dashboards, or scheduler behavior
  evidence: 'specification.scope.in limits this child to semantic metric-family boundaries, while specification.scope.out
    excludes formulas, weighting, threshold policy, dashboards, storage, scheduler behavior, and runtime
    collection mechanics. specification.boundary_policy then states that metric families are canonical
    semantic handles for derived assessment, not the computed assessments themselves.

    '
- criterion: 'Defines the first metric family seeds in scope for this boundary: pre-SIB, SIB, Specification
    Verifiability, Process Observability, and Structural Observability'
  evidence: 'specification.terminology defines derived_metric_family, metric_subject, metric_input_class,
    metric_snapshot, and threshold_candidate. specification.metric_family_catalog then materializes five
    concrete family seeds: pre-SIB, SIB, Specification Verifiability, Process Observability, and Structural
    Observability, each with role, subject_scope, admissible_input_classes, and boundary_notes.

    '
- criterion: Defines how each metric family binds to a bounded subject and admissible input classes drawn
    from canonical graph state, runtime observability entities, and derived graph-health observations
    or signals
  evidence: 'specification.metric_family_catalog assigns bounded subject_scope and admissible_input_classes
    to every family, and specification.relationship_policy requires every metric family to declare explicit
    subject binding before derived computation. Those rules separate canonical graph state, SG-SPEC-0017

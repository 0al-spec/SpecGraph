acceptance:
- Defines explicit, non-silent promotion transitions across IntentDraft, Proposal, SpecDraft, and canonical
  artifacts, including the direct `intent_draft -> spec_draft` boundary
- Makes Proposal->SpecDraft review a required and recorded step before any canonical materialization from
  that Proposal
- Forbids direct canonical materialization from IntentDraft or Proposal and requires an explicit transition
  record for every promotion edge
- Declares SpecDraft as the first pre-spec artifact that can be explicitly materialized into canonical
  artifacts when recorded review/confirmation is present
- Keeps primary kinds, auxiliary kinds, orthogonal draft axes, memory consultation policy, operator-request
  runtime steering, tracked proposal-lane persistence, GUI protocol, and storage layout out of scope

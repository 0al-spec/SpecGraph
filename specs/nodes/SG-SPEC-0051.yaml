    requires explicit `promotion_edge` and `gate_type` fields; and specification.promotion_records.transition_record_required.any_transition_requires_record
    requires an explicit transition record for every promotion_edge.
- criterion: Declares SpecDraft as the first pre-spec artifact that can be explicitly materialized into

prompt: Define the concrete promotion boundary between IntentDraft, Proposal, SpecDraft, and canonical
  materialization in the pre-spec layer. Specify explicit review gates and non-silent transition records.
  Do not redefine primary semantic kinds, orthogonal draft axes, memory policy, operator-request execution
  semantics, proposal-lane persistence, GUI protocol, or storage layout.
specification:
  objective: Define the narrow promotion contract that governs when and how IntentDraft may progress to
    Proposal or SpecDraft, and when Proposal or SpecDraft may progress toward canonical materialization.
  scope:
    in:
    - Transition constraints for `intent_draft -> proposal`, `intent_draft -> spec_draft`, `proposal ->
      spec_draft`, and `spec_draft -> canonical_artifact`
    - Explicit gates for direct `intent_draft -> spec_draft`, `proposal -> spec_draft`, and `spec_draft
      -> canonical_artifact`
    - Explicitly required transition records for every promotion edge
    - Non-silent promotion prohibitions for Proposal or IntentDraft shortcutting to canonical artifacts
    - Canonical eligibility boundary for SpecDraft within the pre-spec layer
    out:
    - Primary semantic-kind ontology for Intent, Hypothesis, Proposal, IntentFragment, or IntentDraft
    - Auxiliary-kind semantics beyond the promotion boundary itself
    - Orthogonal draft axes such as authority, provenance, confidence, and status
    - Project-memory consultation policy and operator-request runtime execution semantics
    - Tracked proposal-lane persistence, GUI protocol, repository layout, or viewer behavior
  terminology:
    promotion_edge: A directed transition from one pre-spec node to a later pre-spec or canonical node.
    transition_record: The explicit decision artifact containing promotion_edge, gate_type, actor, timestamp,
      outcome, rationale, source_ref, and target_ref for one promotion_edge.
    intent_draft_to_spec_draft_gate: The required direct-promotion gate for `intent_draft -> spec_draft`;
      it may be satisfied only by explicit confirmation or explicit review.
    proposal_to_spec_draft_review: The required review gate for `proposal -> spec_draft`.
    spec_draft_to_canonical_gate: The required review-or-confirmation gate for `spec_draft -> canonical_artifact`.
    non_silent_promotion: A promotion that executes only when it carries an explicit transition_record.
    canonical_materialization: A boundary transition from pre-spec material into canonical artifacts.
  promotion_rules:
    allowed_transitions:
    - intent_draft -> proposal
    - intent_draft -> spec_draft
    - proposal -> spec_draft
    - spec_draft -> canonical_artifact
    forbidden_transitions:
    - intent_draft -> canonical_artifact
    - proposal -> canonical_artifact
    intent_draft_to_spec_draft_gate:
      review_or_confirmation_required: true
      gate_types_allowed:
      - confirmation
      - review
      requirements:
      - explicit review or confirmation record must exist
      - review outcome `approved` or confirmation outcome `confirmed` is required
      - transition_record source_ref must point to the promoted intent_draft
      - transition_record target_ref must point to the resulting spec_draft
    proposal_to_spec_draft_review:
      review_required: true
      gate_types_allowed:
      - review
      requirements:
      - explicit review record must exist
      - review_outcome must be approved
      - proposal must preserve motivating intent_draft or intent lineage
    spec_draft_to_canonical:
      review_or_confirmation_required: true
      gate_types_allowed:
      - confirmation
      - review
      requirements:
      - explicit review or confirmation record must exist
      - transition_record must be complete
      - source spec_draft must already have one recorded ingress from `intent_draft -> spec_draft` or
        `proposal -> spec_draft`
      - a proposal-sourced spec_draft must carry review outcome `approved` on its recorded `proposal ->
        spec_draft` ingress
      - a direct intent_draft-sourced spec_draft must carry review outcome `approved` or confirmation
        outcome `confirmed` on its recorded `intent_draft -> spec_draft` ingress
      - no shortcut from proposal or intent_draft is permitted
  promotion_records:
    transition_record_required:
      any_transition_requires_record: true
      mandatory_record_fields:
      - transition_record_id
      - transition_identifier
      - promotion_edge
      - gate_type
      - reviewer_or_decider
      - decision_timestamp
      - outcome
      - rationale
      - source_ref
      - target_ref
      gate_type_values:
      - '`promotion` for a non-silent edge that requires explicit recording but no separate review or
        confirmation gate'
      - '`review` for an edge that requires an explicit review decision'
      - '`confirmation` for an edge that requires an explicit confirmation decision'
      non_silent_gating:
      - A promotion_edge without a complete transition record is invalid and rejected.
      - A `promotion` gate_type requires outcome `recorded`, a `review` gate_type requires outcome `approved`,
        and a `confirmation` gate_type requires outcome `confirmed` before the edge may advance.
      - Any outcome other than `recorded`, `approved`, or `confirmed` (`rejected`, `needs_revision`, `cancelled`)
        does not satisfy promotion gating and cannot advance the artifact stage.
  transition_checks:
  - If `intent_draft -> proposal` is attempted without a complete transition record carrying gate_type
    `promotion` and outcome `recorded`, the promotion edge is rejected.
  - If `intent_draft -> spec_draft` is attempted without a confirmation outcome `confirmed` or review
    outcome `approved`, the promotion edge is rejected.
  - If `proposal -> spec_draft` is attempted without approved review, the promotion edge is rejected.
  - If `spec_draft -> canonical_artifact` lacks a complete transition record, the canonical materialization
    is rejected as silent.
  - If `spec_draft -> canonical_artifact` is attempted from a SpecDraft without a recorded `intent_draft
    -> spec_draft` or `proposal -> spec_draft` ingress, the canonical materialization is rejected.
  - If a proposal is revised after rejection, the promotion edge may be retried only after a new review
    record exists.
  examples:
  - name: Direct intent draft promotion gated
    description: An IntentDraft may become SpecDraft only after an explicit confirmation or review record
      identifies the source IntentDraft, the target SpecDraft, and the direct `intent_draft -> spec_draft`
      edge.
  - name: Proposal review gate enforced
    description: A proposal remains reviewable until an explicit approved review record is created; only
      then may a transition record move it to SpecDraft.
  - name: Non-silent canonical materialization
    description: A SpecDraft without a complete canonical transition record and one recorded pre-spec
      ingress cannot be materialized as a canonical artifact, even if the draft text itself appears complete.
  - name: Direct shortcut blocked
    description: An IntentDraft or Proposal cannot jump directly to canonical artifacts; the path must
      pass through a recorded `spec_draft` that was itself reached through an allowed, gate-bound ingress.

  evidence: 'specification.terminology defines semantic_unlock, ancestor_reconciliation, and linked_readiness_evidence.
    specification.linkage_rules.specified_to_linked defines the core transition conditions, and specification.linkage_rules.readiness_decision_procedure
    orders the checks for current specified status, concrete descendant existence, explicit refines-chain

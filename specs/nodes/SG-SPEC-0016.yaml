prompt: Refine SG-SPEC-0002 by defining the conditions for moving a spec from specified to linked once
  concrete descendants exist, including semantic unlock, linked-readiness evidence, narrow ancestor reconciliation,
  and acceptance evidence alignment across refinement chains.
specification:
  objective: 'Define when concrete descendant specs make an ancestor eligible to move from specified to
    linked, and define the parent-side evidence and reconciliation needed before that status transition
    is valid.

    '
  scope:
    in:
    - Spec-node transition from specified to linked after declared blocking descendants exist
    - Semantic unlock conditions for refinement chains
    - Parent-side linked_readiness_evidence
    - Narrow ancestor reconciliation after descendant unlock
    - Acceptance and acceptance_evidence alignment across refinement chains
    out:
    - Initial edge selection rules for refines, depends_on, or relates_to
    - Delegation or atomic decomposition rules before concrete descendants exist
    - Validator implementation, queue behavior, supervisor scheduling, or storage schema design
    - Runtime code, test code, generated artifacts, or downstream implementation completion
  terminology:
    concrete_descendant_spec: 'A spec node that exists in the canonical graph and is connected to an ancestor
      through an explicit refines chain. A path may be cited as evidence, but the policy concerns the
      graph fact rather than a storage format.

      '
    semantic_unlock: 'A state in which every declared blocking refinement dependency for a specified ancestor
      is represented by a concrete_descendant_spec connected through refines, making the ancestor eligible
      for linked-readiness reconciliation.

      '
    linked_readiness_evidence: 'Parent-side acceptance_evidence that cites the concrete descendant spec
      IDs or paths satisfying each declared blocking refinement dependency and explains why those descendants
      resolve the ancestor''s delegated linkage gap.

      '
    ancestor_reconciliation: 'A narrow pass on one ancestor spec after semantic_unlock that aligns the
      ancestor''s links, blocker interpretation, acceptance_evidence, prompt wording, and status-readiness
      with the concrete descendant structure.

      '
    evidence_alignment: 'The requirement that each acceptance criterion in a spec has exactly one matching
      acceptance_evidence entry, and that cross-spec citations support the local criterion instead of
      replacing it with a child''s criterion.

      '
  linkage_rules:
    specified_to_linked:
    - A specified spec MAY move to linked only after every spec it declares in depends_on as a blocking
      refinement dependency exists as a concrete_descendant_spec.
    - Each blocking descendant MUST connect back into the ancestor refinement chain through refines, either
      by refining the ancestor directly or by refining another spec already in that chain.
    - A depends_on target that is missing, non-spec, or not connected through refines keeps the ancestor
      from semantic_unlock.
    - semantic_unlock creates eligibility for linked advancement, but it does not itself change the ancestor
      status.
    - The ancestor MUST remain specified until ancestor_reconciliation records linked_readiness_evidence
      on the parent.
    - The reconciled parent evidence MUST cite the concrete descendant spec IDs or paths that satisfy
      each declared blocking refinement dependency.
    - linked confirms that declared refinement edges are concrete and evidenced; it does not assert that
      child implementation work, runtime validation, or human review of unrelated work is complete.
    - A child spec does not need to be linked itself merely to unlock the ancestor, unless a separate
      acceptance criterion or blocking dependency requires that state.
    readiness_decision_procedure:
    - Evaluate specified-to-linked readiness from the ancestor's authored status and declared depends_on
      set, not from derived blockers, child work queues, or non-blocking related specs.
    - Confirm the ancestor is currently specified; earlier statuses must first satisfy their own lifecycle
      transitions, and later statuses are outside this policy.
    - For each declared depends_on entry, confirm the target exists, is a spec node, and is a concrete_descendant_spec
      connected to the ancestor by an explicit refines chain.
    - Confirm ancestor_reconciliation has updated the parent acceptance_evidence so every local criterion
      that depends on child refinement cites the concrete descendant ID or path and states the resolved
      parent gap.
    - Confirm linked_readiness_evidence does not cite a removed, renamed, or scope-diverged descendant
      as if it still satisfied the parent gap.
    - If all checks pass, the ancestor MAY advance to linked; otherwise the ancestor remains specified
      and the first missing readiness condition SHOULD be surfaced as the blocker.
    non_blocking_descendants:
    - A spec that only refines or relates_to an ancestor does not block the ancestor unless the ancestor
      declares it in depends_on.
    - Supporting child citations may appear in parent evidence, but they are not linked-readiness blockers
      unless they correspond to declared depends_on entries.
  reconciliation_policy:
    descendant_unlock:
    - When a declared blocking descendant becomes concrete and connects through refines, the affected
      ancestor becomes eligible for ancestor_reconciliation.
    - semantic_unlock eligibility is a derived readiness fact; it MUST NOT be written as a replacement
      for authored refines or depends_on edges.
    - One descendant may unlock more than one ancestor in a refinement chain, but each ancestor still
      requires its own reconciliation pass.
    ancestor_reconciliation:
    - Ancestor reconciliation MUST happen one spec node at a time.
    - The pass SHOULD update only links, blocker interpretation, acceptance_evidence, prompt wording,
      and status-readiness that directly depend on the unlocked descendants.
    - The pass MUST preserve stable IDs and inherited terminology unless a separate authorized spec refinement
      narrows a term.
    - The pass MUST NOT expand unresolved scope, absorb child detail into the parent, or treat unrelated
      future work as resolved.
    - If reconciliation reveals an additional independent unresolved area, the ancestor SHOULD keep its
      current status and surface the need for a separate child or later refinement instead of widening
      this pass.
  evidence_policy:
    rules:
    - acceptance and acceptance_evidence MUST remain 1:1 within each spec node.
    - Each acceptance_evidence entry MUST correspond to one local acceptance criterion and state where
      the local specification satisfies that criterion.
    - Parent linked_readiness_evidence MUST cite the concrete descendant spec IDs or paths that satisfy
      each declared blocking refinement dependency.
    - Parent evidence MAY cite child specs as supporting context outside status advancement, but those
      citations do not create blocking semantics without depends_on.
    - Child evidence SHOULD cite sections inside the child specification rather than runtime artifacts
      or parent evidence.
    - A parent MUST NOT use a child acceptance criterion as a substitute for its own acceptance_evidence;
      the parent evidence must explain the parent-side linkage condition being satisfied.
    acceptance_alignment:
    - Parent and child specs keep separate acceptance lists even when the child resolves a delegated parent
      gap.
    - When a parent criterion depends on child refinement, the parent evidence cites the child and states
      the resolved parent gap, while the child evidence proves the child''s local specification content.
    - If a child no longer satisfies the parent gap it was cited for, ancestor_reconciliation SHOULD update
      the parent evidence or leave the parent below linked rather than preserving stale linked_readiness_evidence.
  examples:
  - name: Linked readiness after child creation
    description: 'A specified parent declares depends_on on a child that resolves a delegated refinement
      gap. Once the child exists and lists refines back into the parent chain, the parent is semantically
      unlocked. The parent may move to linked only after its own acceptance_evidence cites that child
      as the concrete descendant satisfying the declared dependency.

      '
  - name: Evidence remains local
    description: 'A child spec can prove its own rules in its acceptance_evidence. The parent may cite
      that child for linked_readiness_evidence, but the parent still needs a local evidence entry explaining
      which parent acceptance criterion the child resolves.

      '

specification:
  objective: 'Define the overview conditions under which concrete descendant specs make an ancestor eligible
    to move from specified to linked, while delegating the detailed parent-side evidence and reconciliation
    contract to SG-SPEC-0055.

    '
  scope:
    in:
    - Overview conditions for moving a spec from specified to linked after declared blocking descendants
      exist
    - semantic_unlock as the overview readiness threshold for a specified ancestor
    - Core readiness checks for declared blocking depends_on coverage and explicit refines connectivity
    - Coordination of delegated child ownership for parent-side linked_readiness_evidence, ancestor_reconciliation,
      and refinement-chain evidence_alignment in SG-SPEC-0055
    out:
    - Detailed composition of parent-side linked_readiness_evidence
    - Step-by-step ancestor_reconciliation procedure and narrow parent mutation rules
    - Detailed acceptance and acceptance_evidence alignment rules across parent and child specs
    - Initial edge selection rules for refines, depends_on, or relates_to
    - Delegation or atomic decomposition rules before concrete descendants exist
    - Validator implementation, queue behavior, supervisor scheduling, or storage schema design
    - Runtime code, test code, generated artifacts, or downstream implementation completion
  terminology:
    concrete_descendant_spec: 'A spec node that exists in the canonical graph and is connected to an ancestor
      through an explicit refines chain. The policy concerns the graph fact of descendant existence and
      connectivity rather than any descendant lifecycle state.

      '
    semantic_unlock: 'A state in which every declared blocking refinement dependency for a specified ancestor
      is represented by a concrete_descendant_spec connected through refines, making the ancestor eligible
      for the parent-side readiness follow-up governed in this subtree.

      '
    linked_readiness_evidence: 'Parent-side acceptance_evidence that cites the concrete descendant specs
      satisfying each declared blocking refinement dependency. SG-SPEC-0016 keeps only the overview role
      of this evidence; SG-SPEC-0055 defines the detailed contract.

      '
    ancestor_reconciliation: 'A narrow parent-side follow-up pass after semantic_unlock that aligns parent
      evidence and status-readiness with the concrete descendant structure. SG-SPEC-0016 retains only
      the overview dependency on this pass; SG-SPEC-0055 defines the detailed rules.

      '
    evidence_alignment: 'The requirement that parent and child specs keep their own local acceptance and
      acceptance_evidence entries even when a child resolves a delegated parent gap. SG-SPEC-0016 preserves
      the overview boundary; SG-SPEC-0055 defines the detailed alignment rules.

      '
  child_governance_map:
  - child_spec: SG-SPEC-0055
    concern: Parent-side linked_readiness_evidence, ancestor_reconciliation, and refinement-chain evidence_alignment
    parent_summary:
    - SG-SPEC-0016 keeps the specified-to-linked readiness overview and semantic_unlock gate for this
      subtree.
    - SG-SPEC-0055 owns the detailed parent-side evidence, narrow reconciliation pass, and parent-child
      evidence alignment rules that must be satisfied after semantic_unlock and before linked advancement.
    detailed_governance_owned_by_child:
    - dependency-specific linked_readiness_evidence composition
    - narrow ancestor_reconciliation scope and update rules
    - parent-child acceptance and acceptance_evidence alignment across refinement chains
  readiness_overview:
    retained_parent_role:
    - SG-SPEC-0016 defines when a specified ancestor becomes semantically unlocked by concrete descendants.
    - SG-SPEC-0016 defines only the overview gate from descendant existence and refinement connectivity
      to linked-readiness eligibility.
    - SG-SPEC-0016 does not restate the detailed parent-side evidence wording or mutation sequence required
      after semantic_unlock.
    delegated_to: SG-SPEC-0055
  linkage_rules:
    specified_to_linked:
    - A specified spec MAY move to linked only after every declared blocking refinement dependency in
      depends_on exists as a concrete_descendant_spec.
    - Each blocking descendant MUST connect back into the ancestor refinement chain through refines, either
      by refining the ancestor directly or by refining another spec already in that chain.
    - A depends_on target that is missing, non-spec, or not connected through refines keeps the ancestor
      from semantic_unlock.
    - Descendant lifecycle state does not add requirements to specified-to-linked readiness unless explicitly
      introduced in the ancestor's own criteria.
    - semantic_unlock creates eligibility for parent-side linked-readiness follow-up, but it does not
      itself change the ancestor status.
    - The ancestor MUST remain below linked until the delegated linked_readiness_evidence and ancestor_reconciliation
      requirements owned by SG-SPEC-0055 are satisfied.
    - linked in this overview confirms that the declared blocking refinement path is concrete and that
      the parent-side readiness path is complete; it does not assert child implementation completion,
      unrelated review completion, or downstream runtime validation.
    readiness_decision_procedure:
    - Evaluate specified-to-linked readiness from the ancestor's authored status and declared depends_on
      set, not from derived blockers, child work queues, non-blocking related specs, or child lifecycle
      status.
    - Confirm the ancestor is currently specified; earlier and later lifecycle transitions remain outside
      this policy.
    - For each declared blocking depends_on entry, confirm the target exists, is a spec node, and is a
      concrete_descendant_spec connected to the ancestor by an explicit refines chain.
    - If every declared blocking dependency is concrete and connected, treat the ancestor as semantically
      unlocked at the overview layer.
    - Confirm the delegated linked_readiness_evidence and ancestor_reconciliation checks owned by SG-SPEC-0055
      are satisfied before advancing the ancestor to linked.
    - If all overview and delegated checks pass, the ancestor MAY advance to linked; otherwise the ancestor
      remains specified and the first missing readiness condition SHOULD be surfaced as the blocker.
    non_blocking_descendants:
    - A spec that only refines or relates_to an ancestor does not block the ancestor unless the ancestor
      declares it in depends_on.
    - Supporting child citations may appear in parent evidence, but they are not linked-readiness blockers
      unless they correspond to declared depends_on entries.
  boundary_rules:
  - SG-SPEC-0016 defines overview readiness gating and child ownership boundaries, not the detailed wording
    or mutation sequence of parent-side evidence updates.
  - SG-SPEC-0016 preserves stable terminology for semantic_unlock, linked_readiness_evidence, ancestor_reconciliation,
    and evidence_alignment across this refinement area.
  - Detailed parent-side evidence and reconciliation rules belong in SG-SPEC-0055 rather than being reabsorbed
    into this overview node.
  examples:
  - name: Semantic unlock before parent evidence follow-up
    description: 'A specified parent declares one blocking child in depends_on. Once that child exists
      and connects back through refines, the parent is semantically unlocked at the overview layer, but
      the parent still remains below linked until the delegated parent-side evidence and reconciliation
      contract is satisfied through SG-SPEC-0055.

      '
  - name: Non-blocking descendant does not control readiness
    description: 'A descendant that only refines an ancestor without being declared in depends_on may
      be cited as supporting context, but it does not by itself determine specified-to-linked readiness
      in this overview policy.

      '

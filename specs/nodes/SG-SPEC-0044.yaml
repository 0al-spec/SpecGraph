prompt: Define the proposal/split readiness admissibility contract under SG-SPEC-0043. The spec should
  say when readiness is reviewable, what semantic bypasses make it invalid, and what remains outside this
  node without turning the graph path into the main prose.
specification:
  objective: Define the proposal/split readiness admissibility rule for this subtree so readiness is valid
    only when continuation, execution readiness, readiness-region meaning, review boundary, and mechanics
    availability remain reviewable without bypass.
  scope:
    in:
    - Proposal/split readiness admissibility.
    - Semantic bypass conditions that invalidate readiness.
    - Review boundary semantics around SG-SPEC-0043.
    - Mechanics availability semantics around SG-SPEC-0029.
    - Topology-prose discipline for ordered readiness paths.
    out:
    - Concrete proposal/split mechanics schemas, lifecycle payloads, and readiness semantics owned by
      SG-SPEC-0029.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Queue ranking formulas and runtime orchestration policy.
    - Ordered path narration that duplicates graph metadata without adding readiness meaning.
    - Bookkeeping-only child-slice ownership or edge-segment decomposition.
  terminology:
    readiness_admissibility: The rule that says proposal/split readiness may be trusted only when required
      upstream meanings and downstream availability remain reviewable.
    semantic_bypass: Any shortcut that lets proposal/split readiness appear satisfied while skipping a
      required readiness meaning, review boundary, or mechanics availability decision.
    review_boundary: The human-reviewable point at which proposal/split readiness is checked before mechanics
      availability is consumed.
  admissibility_rule:
  - Proposal/split readiness is admissible only when continuation state, reflective execution readiness,
    proposal/split readiness meaning, review boundary, and mechanics availability are all preserved.
  - A direct or parallel graph edge is not a violation by itself; it becomes a violation when it makes
    one of those meanings unreviewable or ambiguous.
  required_readiness_meanings:
    continuation_state:
    - Continuation policy must remain separate from proposal/split mechanics readiness.
    execution_readiness:
    - Reflective execution readiness must remain reviewable before proposal/split readiness is consumed.
    proposal_split_readiness:
    - Proposal/split readiness must remain readable as a capability region.
    review_boundary:
    - SG-SPEC-0043 remains the review boundary for this subtree.
    mechanics_availability:
    - SG-SPEC-0029 remains the mechanics availability contract before concrete mechanics details.
  inadmissible_bypass_conditions:
  - Readiness is inadmissible if continuation selection can treat proposal/split mechanics as available
    without execution readiness.
  - Readiness is inadmissible if proposal/split readiness skips the review boundary and consumes concrete
    mechanics availability directly.
  - Readiness is inadmissible if mechanics availability is treated as field-level split lifecycle truth
    rather than a readiness decision.
  review_boundary:
  - SG-SPEC-0043 is the review boundary for proposal/split readiness in this subtree.
  - Review at that boundary checks admissibility of readiness meaning, not the literal text of every graph
    edge.
  mechanics_boundary:
  - SG-SPEC-0029 is the mechanics availability contract consumed after the review boundary.
  - Concrete proposal/split payload and schema semantics remain outside this admissibility rule.
  topology_prose_policy:
  - Ordered paths through SG-SPEC IDs are graph metadata and may be rendered by derived views.
  - SG-SPEC-0044 prose should explain readiness admissibility and semantic bypass, not recite the path
    as the main contract.
  boundaries:
  - SG-SPEC-0044 defines readiness admissibility and semantic bypass behavior for this subtree.
  - Concrete proposal/split payload and schema semantics remain owned by SG-SPEC-0029.
  - Continuation-selection policy remains owned by SG-SPEC-0026.
  - Queue ranking and runtime orchestration semantics remain outside this contract.
  - This node does not require separate child-slice specs merely to restate upstream, downstream, or direct-edge
    subsegments unless a new runtime-observable invariant appears.
  invariants:
  - id: PSP-0044-1
    statement: Proposal/split readiness is admissible only when continuation state, execution readiness,
      readiness-region meaning, review boundary, and mechanics availability remain reviewable.
  - id: PSP-0044-2
    statement: A shortcut is invalid when it makes a required readiness meaning, review boundary, or mechanics
      availability decision unreviewable or ambiguous.
  - id: PSP-0044-3
    statement: SG-SPEC-0043 remains the review boundary and SG-SPEC-0029 remains the mechanics availability
      contract for this subtree.
  - id: PSP-0044-4
    statement: SG-SPEC-0044 must not be decomposed into topology-only path slices unless a new runtime
      or review-observable invariant appears.

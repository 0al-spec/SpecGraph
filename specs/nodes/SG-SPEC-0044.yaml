prompt: Define one human-reviewable no-bypass proposal/split readiness contract under SG-SPEC-0043. The
  spec should say exactly how readiness moves from SG-SPEC-0026 to SG-SPEC-0029, what bypasses are forbidden,
  why SG-SPEC-0043 is the direct gateway boundary, and what remains outside this node.
specification:
  objective: 'Define one human-reviewable non-bypass proposal/split readiness contract for this subtree:
    SG-SPEC-0026 reaches concrete proposal/split mechanics only through SG-SPEC-0027 -> SG-SPEC-0032 ->
    SG-SPEC-0043 -> SG-SPEC-0029, without shorter or parallel bypass routes.'
  scope:
    in:
    - The full proposal/split readiness chain from SG-SPEC-0026 to SG-SPEC-0029 for this subtree.
    - Direct-gateway and no-bypass rules for SG-SPEC-0026, SG-SPEC-0027, and SG-SPEC-0032 while SG-SPEC-0043
      is present.
    - Gateway-boundary semantics that keep SG-SPEC-0043 human-reviewable and SG-SPEC-0029 concrete.
    - The single readable rule that governs this subtree without splitting it into bookkeeping-only child
      slices.
    out:
    - Concrete proposal/split mechanics schemas, lifecycle payloads, and readiness semantics owned by
      SG-SPEC-0029.
    - Continuation-selection policy owned by SG-SPEC-0026.
    - Queue ranking formulas and runtime orchestration policy.
    - Bookkeeping-only child-slice ownership or edge-segment decomposition that does not introduce a new
      runtime-observable path constraint.
  terminology:
    readiness_contract: The single human-reviewable rule that defines how proposal/split readiness moves
      through this subtree and which bypasses are forbidden.
    readiness_chain: The only allowed ordered proposal/split readiness route for this subtree from SG-SPEC-0026
      to concrete mechanics in SG-SPEC-0029.
    bypass_edge: Any shorter, parallel, or direct dependency that would let SG-SPEC-0026, SG-SPEC-0027,
      or SG-SPEC-0032 reach downstream proposal/split mechanics without traversing the full readiness_chain.
    direct_gateway_dependency: The one immediate proposal/split gateway dependency that SG-SPEC-0032 is
      allowed to consume while SG-SPEC-0043 remains present.
    human_reviewable_gateway_boundary: The last parent-facing readiness contract that reviewers inspect
      before concrete mechanics owned by SG-SPEC-0029 begin.
  readiness_contract:
  - For this subtree, proposal/split readiness moves only as SG-SPEC-0026 -> SG-SPEC-0027 -> SG-SPEC-0032
    -> SG-SPEC-0043 -> SG-SPEC-0029.
  - Any direct or parallel dependency that reaches downstream proposal/split readiness without traversing
    that ordered route is a bypass_edge and is forbidden while SG-SPEC-0043 remains present.
  readiness_chain:
  - The only allowed readiness_chain for this subtree is SG-SPEC-0026 -> SG-SPEC-0027 -> SG-SPEC-0032
    -> SG-SPEC-0043 -> SG-SPEC-0029.
  - SG-SPEC-0026 reaches proposal/split readiness only through SG-SPEC-0027.
  - SG-SPEC-0027 reaches proposal/split readiness only through SG-SPEC-0032.
  - SG-SPEC-0032 reaches proposal/split readiness only through SG-SPEC-0043.
  - SG-SPEC-0043 reaches concrete proposal/split mechanics only through SG-SPEC-0029.
  direct_gateway_rules:
  - While SG-SPEC-0043 exists, SG-SPEC-0032 must treat SG-SPEC-0043 as its sole direct gateway dependency
    for proposal/split readiness in this subtree.
  - SG-SPEC-0032 must not define a parallel direct proposal/split gateway alongside SG-SPEC-0043 for this
    subtree.
  forbidden_bypasses:
  - SG-SPEC-0026 must not depend on SG-SPEC-0032, SG-SPEC-0043, or SG-SPEC-0029 for proposal/split readiness
    in this subtree.
  - SG-SPEC-0027 must not depend on SG-SPEC-0043 or SG-SPEC-0029 for proposal/split readiness in this
    subtree.
  - SG-SPEC-0032 must not depend on SG-SPEC-0029 or any parallel direct proposal/split gateway in place
    of SG-SPEC-0043 for this subtree.
  - No shorter or parallel route than the readiness_chain is valid while SG-SPEC-0043 remains the active
    gateway boundary.
  gateway_boundary:
  - SG-SPEC-0043 is the human_reviewable_gateway_boundary between proposal/split path governance and concrete
    mechanics.
  - SG-SPEC-0029 remains the concrete mechanics leaf and is not exposed as a direct proposal/split readiness
    dependency above SG-SPEC-0043 in this subtree.
  gateway_rationale:
  - SG-SPEC-0043 is the direct gateway boundary because it is the single proposal/split readiness dependency
    consumed directly by SG-SPEC-0032 in this subtree.
  - Keeping review at SG-SPEC-0043 lets a human verify chain order and no-bypass conformance without inspecting
    concrete proposal/split payload or lifecycle mechanics owned by SG-SPEC-0029.
  - SG-SPEC-0029 remains downstream of the gateway boundary as the concrete mechanics leaf, so it satisfies
    the gateway contract rather than replacing it as the direct parent-facing readiness surface.
  boundaries:
  - SG-SPEC-0044 defines only path governance, direct-gateway rules, gateway-boundary rationale, and bypass
    behavior for this subtree.
  - Concrete proposal/split payload and schema semantics remain owned by SG-SPEC-0029.
  - Continuation-selection policy remains owned by SG-SPEC-0026.
  - Queue ranking and runtime orchestration semantics remain outside this contract.
  - This node does not require separate child-slice specs merely to restate upstream, downstream, or direct-edge
    subsegments of the same readiness_chain unless a new runtime-observable invariant appears.
  invariants:
  - id: PSP-0044-1
    statement: The only allowed proposal/split readiness chain in this subtree is SG-SPEC-0026 -> SG-SPEC-0027
      -> SG-SPEC-0032 -> SG-SPEC-0043 -> SG-SPEC-0029.
  - id: PSP-0044-2
    statement: While SG-SPEC-0043 exists, SG-SPEC-0032 consumes SG-SPEC-0043 as its sole direct proposal/split
      gateway dependency for this subtree.
  - id: PSP-0044-3
    statement: Direct proposal/split readiness edges from SG-SPEC-0026 to SG-SPEC-0032, SG-SPEC-0043,
      or SG-SPEC-0029; from SG-SPEC-0027 to SG-SPEC-0043 or SG-SPEC-0029; or from SG-SPEC-0032 to SG-SPEC-0029
      are invalid in this subtree while SG-SPEC-0043 remains present.
  - id: PSP-0044-4
    statement: Human review of proposal/split readiness conformance for this subtree stops at SG-SPEC-0043;
      SG-SPEC-0029 remains the downstream concrete mechanics leaf rather than a direct readiness dependency.

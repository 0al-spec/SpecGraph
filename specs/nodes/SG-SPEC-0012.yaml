acceptance:
- Defines context_pack as the authoritative, run-scoped ambient context for one supervisor run, derived
  from canonical graph vocabulary, adjacent spec lineage, and declared project-memory sources without
  becoming canonical graph truth
- Defines ambient vocabulary resolution for canonical terms, aliases, relation types, and unresolved operator
  wording so executor guidance stays grounded in canonical vocabulary while unresolved wording remains
  visibly unresolved
- Defines duplicate-avoidance and source-attribution expectations so the context pack preserves why existing
  canonical artifacts may already cover the requested concern, surfaces canonical candidates for unresolved
  wording without pretending it is already governed, and records which source class supplied each context
  element
- Defines authority ordering and SG-SPEC-0008 adjacency such that canonical graph vocabulary remains authoritative,
  adjacent lineage narrows local interpretation, and declared project memory can inform but not override
  canonical semantics
- Remains implementation-agnostic and bounded to one-run steering semantics without defining retrieval
  algorithms, embeddings, storage layout, or full evaluator metrics

acceptance:
- Defines the bounded role of the first bootstrap relation vocabulary slice as a canonical RelationType
  catalog for primitive binding within the ubiquitous vocabulary layer without defining a full domain
  relation taxonomy
- Defines the first canonical relation types in that slice, including `specializes`, `governed_by_state_family`,
  `resolved_by_alias`, and `constrained_by_invariant`
- Defines the admissible subject and object scopes plus minimal semantic contracts for those relation
  types, including bounded cardinality and uniqueness semantics, so later executable domain vocabularies
  can reuse them consistently
- Defines traceability and evolution constraints for this relation slice, including stable relation identity,
  alias-subordination, and invariant-attachment preservation
- Remains implementation-agnostic and explicitly out of scope for evaluator metrics, project-memory policy,
  viewer UX, storage layout, and broader domain-specific relation catalogs

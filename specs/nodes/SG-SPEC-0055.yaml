prompt: Define the bounded child beneath SG-SPEC-0016 for parent-side linked_readiness_evidence, narrow
  ancestor_reconciliation, and acceptance-evidence alignment across refinement chains. Keep the parent
  specified-to-linked readiness overview in SG-SPEC-0016 and do not restate its core semantic unlock gate
